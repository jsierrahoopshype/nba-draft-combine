<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Draft Combine Dashboard - HoopsHype</title>
    <meta name="description" content="26 years of NBA Draft Combine measurables (2000-2025), scored against each player's position cohort.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface-hover: #f0f0f2;
            --border: #d1d1d6;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent: #3b82f6;
            --accent-dim: rgba(59, 130, 246, 0.15);
            --green: #34c759;
            --green-dim: rgba(52, 199, 89, 0.15);
            --green-strong: rgba(52, 199, 89, 0.35);
            --orange: #f59e0b;
            --orange-dim: rgba(245, 158, 11, 0.15);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.15);
            --red-strong: rgba(239, 68, 68, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9375rem;
        }

        /* Filter bar */
        .filters {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding: 0.75rem 0 1rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .filter-row {
            display: grid;
            grid-template-columns: 2fr 1.1fr 1.4fr 1.3fr auto;
            gap: 0.75rem;
            align-items: end;
        }

        .filter-group { display: flex; flex-direction: column; gap: 0.375rem; }

        .filter-group label {
            font-size: 0.6875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        input[type="text"], select {
            width: 100%;
            padding: 0.55rem 0.875rem;
            font-size: 0.875rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            transition: all 0.15s;
        }

        input[type="text"]:hover, select:hover { border-color: var(--accent); }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .reset-group { justify-self: end; align-self: end; }
        .reset-btn {
            padding: 0.55rem 0.875rem;
            font-size: 0.75rem;
            font-family: inherit;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .reset-btn:hover {
            color: var(--text);
            border-color: var(--text-secondary);
            background: var(--surface-hover);
        }
        .reset-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .season-group { min-width: 0; }
        .season-range {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            gap: 0.4rem;
        }
        .season-cell { display: flex; flex-direction: column; gap: 0.375rem; min-width: 0; }
        .season-arrow {
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding-bottom: 0.6rem;
        }

        .filter-summary {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            text-align: right;
        }
        .filter-summary strong { color: var(--text); font-weight: 600; }

        /* Table */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table.leaderboard {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        table.leaderboard thead th {
            background: var(--surface-hover);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-size: 0.6875rem;
            font-weight: 600;
            padding: 0.75rem 0.625rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: color 0.15s;
        }
        table.leaderboard thead th:hover { color: var(--accent); }
        table.leaderboard thead th.active { color: var(--accent); }
        table.leaderboard thead th .sort-arrow { font-size: 0.6rem; opacity: 0.6; margin-left: 0.2rem; }
        table.leaderboard thead th.player-col { text-align: left; }

        table.leaderboard tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            cursor: pointer;
        }
        table.leaderboard tbody tr:last-child { border-bottom: none; }
        table.leaderboard tbody tr:hover { background: var(--surface-hover); }
        table.leaderboard tbody tr.expanded { background: var(--surface-hover); }

        table.leaderboard td {
            padding: 0.6rem 0.625rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            white-space: nowrap;
        }
        table.leaderboard td.rank {
            color: var(--text-secondary);
            font-size: 0.8125rem;
            width: 3rem;
        }
        table.leaderboard td.player {
            text-align: left;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            color: var(--text);
            max-width: 18rem;
        }
        .player-name { font-weight: 600; }
        .player-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .bucket-badge {
            display: inline-block;
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            background: var(--accent-dim);
            color: var(--accent);
            margin-left: 0.375rem;
            vertical-align: middle;
        }

        td.cell-score, td.cell-metric { position: relative; }
        td.cell-score .pct,
        td.cell-metric .pct {
            display: block;
            font-size: 0.625rem;
            color: var(--text-secondary);
            margin-top: 0.1rem;
        }

        .nodata { font-style: italic; color: var(--text-secondary); font-family: 'DM Sans', sans-serif; }

        /* Heat colors via inline background-color attribute would be cleaner, but we apply via class to keep lighter DOM */
        /* Heat colors are now applied as inline background-color via applyHeat()
           so the tint scales continuously with percentile. */

        /* Expanded panel */
        tr.detail-row > td {
            padding: 0;
            background: var(--bg);
        }
        .detail-panel {
            padding: 1.25rem 1.25rem 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .detail-panel h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid var(--accent);
        }
        .detail-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
        .detail-section.full { grid-column: 1 / -1; }

        .scores-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.625rem;
            margin-bottom: 0.5rem;
        }
        .score-tile {
            text-align: center;
            padding: 0.75rem 0.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .score-tile .label {
            font-size: 0.625rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .score-tile .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .score-tile.overall { background: var(--accent-dim); border-color: var(--accent); }
        .score-tile.overall .value { color: var(--accent); }

        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.4rem;
        }
        .metric-cell {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.625rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.8125rem;
        }
        .metric-cell .name { color: var(--text-secondary); }
        .metric-cell .v {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }
        .metric-cell .pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-secondary);
            margin-left: 0.5rem;
        }

        .drill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 0.4rem;
        }
        .drill-cell {
            padding: 0.5rem 0.625rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.75rem;
        }
        .drill-cell .name { color: var(--text-secondary); margin-bottom: 0.2rem; line-height: 1.2; }
        .drill-cell .num {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .drill-cell .meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-secondary);
        }

        .standout-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .standout-pill {
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
            border-radius: 999px;
            background: var(--green-dim);
            color: #1d8a40;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
            font-size: 0.9375rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-top: 1rem;
        }
        .empty-state .empty-msg {
            color: var(--text);
            margin-bottom: 1rem;
        }
        .empty-state .empty-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .empty-state .empty-action {
            padding: 0.5rem 0.875rem;
            font-size: 0.8125rem;
            font-family: inherit;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
        }
        .empty-state .empty-action:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }
        .empty-loading { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
        .empty-error { color: var(--red); font-weight: 600; }
        .empty-error-detail {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin: 0.5rem 0 1rem;
        }

        /* Disabled controls during load/error */
        #content[data-status="loading"] select,
        #content[data-status="loading"] input,
        #content[data-status="loading"] button:not(.empty-action),
        #content[data-status="error"]   select,
        #content[data-status="error"]   input,
        #content[data-status="error"]   button:not(.empty-action) {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #content[data-status="loading"] .table-wrap,
        #content[data-status="error"]   .table-wrap { display: none; }
        #content[data-status="loading"] .leaderboard-heading,
        #content[data-status="error"]   .leaderboard-heading { display: none !important; }
        #content[data-status="loading"] .filter-summary,
        #content[data-status="error"]   .filter-summary { visibility: hidden; }
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        .spinner {
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            margin: 0 auto 1rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .footer-stamp { font-family: 'JetBrains Mono', monospace; opacity: 0.8; }

        /* Mobile cards */
        .cards { display: none; }
        .player-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            margin-bottom: 0.625rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .player-card:hover { border-color: var(--accent); }
        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
            gap: 0.5rem;
        }
        .card-head .name { font-weight: 600; font-size: 0.95rem; }
        .card-head .meta { font-size: 0.75rem; color: var(--text-secondary); }

        /* Typeahead suggestions */
        .search-wrapper { position: relative; }
        .search-wrapper input { padding-right: 2rem; }
        .search-clear {
            position: absolute;
            right: 0.55rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1.4rem;
            height: 1.4rem;
            border-radius: 50%;
            border: 0;
            background: var(--surface-hover);
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.12s;
        }
        .search-clear:hover { background: var(--accent-dim); color: var(--accent); }
        .search-note {
            margin-top: 0.4rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-note button {
            background: transparent;
            border: 0;
            font: inherit;
            color: var(--accent);
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .search-note button:hover { color: #2563eb; }

        /* Toasts (top-of-table info banners) */
        .toast-stack {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            pointer-events: none;
            max-width: calc(100vw - 2rem);
        }
        .toast {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            border-radius: 8px;
            padding: 0.55rem 0.875rem;
            font-size: 0.8125rem;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.18s, transform 0.18s;
            pointer-events: auto;
        }
        .toast.in { opacity: 1; transform: translateY(0); }

        /* Row highlight pulse after search jump */
        @keyframes rowFlash {
            0%   { background-color: rgba(59, 130, 246, 0.30); }
            70%  { background-color: rgba(59, 130, 246, 0.30); }
            100% { background-color: transparent; }
        }
        tr.flash > td, .player-card.flash {
            animation: rowFlash 1.2s ease-out;
        }
        .suggestions {
            position: absolute;
            top: calc(100% + 2px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 8px;
            max-height: 320px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .suggestion {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.875rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
            gap: 0.75rem;
        }
        .suggestion:last-child { border-bottom: none; }
        .suggestion:hover, .suggestion.active { background: var(--surface-hover); }
        .suggestion .name { font-weight: 500; color: var(--text); flex: 1; min-width: 0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .suggestion .meta {
            display: flex; gap: 0.4rem; align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .suggestion .meta .bucket-badge { margin: 0; }

        /* Clickable in-row affordances */
        td.cell-score .val.clickable,
        td.cell-metric .val.clickable {
            cursor: pointer;
            border-radius: 4px;
            padding: 1px 3px;
            transition: background 0.12s;
        }
        td.cell-score .val.clickable:hover,
        td.cell-metric .val.clickable:hover {
            background: var(--accent-dim);
            color: var(--accent);
        }
        .clickable-name {
            cursor: pointer;
            transition: color 0.12s;
        }
        .clickable-name:hover {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* Advanced (multi) filter panel */
        .adv-filters { margin-top: 0.5rem; }
        .adv-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: transparent;
            border: 0;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0;
            transition: color 0.15s;
        }
        .adv-toggle:hover { color: var(--accent); }
        .adv-toggle-caret { transition: transform 0.15s; display: inline-block; font-size: 0.75rem; }
        .adv-toggle[aria-expanded="true"] .adv-toggle-caret { transform: rotate(90deg); }
        .adv-count {
            color: var(--accent);
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0;
            text-transform: none;
        }
        .adv-count::before { content: '('; }
        .adv-count::after  { content: ')'; }
        .adv-body {
            margin-top: 0.5rem;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
        }
        .adv-rows { display: flex; flex-direction: column; gap: 0.4rem; }
        .adv-row {
            display: grid;
            grid-template-columns: minmax(0, 2fr) auto minmax(0, 1fr) auto auto;
            gap: 0.4rem;
            align-items: center;
        }
        .adv-row select, .adv-row input {
            padding: 0.4rem 0.6rem;
            font-size: 0.8125rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            min-width: 0;
        }
        .adv-row input {
            font-family: 'JetBrains Mono', monospace;
        }
        .adv-row .adv-unit {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            min-width: 2.4rem;
        }
        .adv-row .adv-remove {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            padding: 0.3rem 0.5rem;
            cursor: pointer;
            font-size: 0.8125rem;
            transition: all 0.15s;
        }
        .adv-row .adv-remove:hover { color: var(--red); border-color: var(--red); }
        .adv-empty {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            padding: 0.25rem 0.1rem;
        }
        .adv-helper {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            padding-left: 0.1rem;
        }
        .adv-row.incomplete {
            opacity: 0.7;
            border-left: 2px solid var(--text-secondary);
            padding-left: 0.35rem;
            transition: opacity 0.15s, border-color 0.15s;
        }
        .adv-row.incomplete .adv-metric:invalid,
        .adv-row.incomplete .adv-value { border-color: var(--text-secondary); }
        .adv-row.row-focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 6px;
            transition: outline-color 0.4s;
        }
        .adv-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.625rem;
        }
        .adv-btn {
            padding: 0.4rem 0.75rem;
            font-size: 0.8125rem;
            font-family: inherit;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            transition: all 0.15s;
        }
        .adv-btn:hover { border-color: var(--accent); color: var(--accent); }
        .adv-btn-add { background: var(--accent-dim); color: var(--accent); border-color: transparent; }
        .adv-btn-add:hover { background: var(--accent); color: white; }
        .adv-btn-clear { color: var(--text-secondary); }
        .adv-btn-clear:hover { color: var(--red); border-color: var(--red); }

        @media (max-width: 768px) {
            .adv-row {
                grid-template-columns: 1fr 1fr;
                grid-template-areas:
                  "metric metric"
                  "op value"
                  "unit remove";
                gap: 0.4rem;
            }
            .adv-row > select:first-child { grid-area: metric; }
            .adv-row > select:nth-of-type(2) { grid-area: op; }
            .adv-row > input { grid-area: value; }
            .adv-row > .adv-unit { grid-area: unit; }
            .adv-row > .adv-remove { grid-area: remove; justify-self: end; }
        }

        /* Active filter chips (similarity, etc.) */
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            background: var(--accent-dim);
            color: var(--accent);
            padding: 0.25rem 0.4rem 0.25rem 0.625rem;
            border-radius: 999px;
            border: 1px solid transparent;
        }
        .chip button {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 0.875rem;
            line-height: 1;
            padding: 0 0.25rem;
            border-radius: 999px;
        }
        .chip button:hover { background: rgba(59, 130, 246, 0.25); }
        .chip .chip-label {
            font-family: inherit;
            font-size: inherit;
            background: transparent;
            border: 0;
            color: inherit;
            cursor: pointer;
            padding: 0;
            text-align: left;
        }
        .chip .chip-label:hover { text-decoration: underline; text-underline-offset: 2px; }
        /* Hide the chips wrapper entirely when there are no chips, so it
           doesn't introduce vertical space. */
        .chips:empty { display: none; }

        /* "Best of YYYY" heading */
        .leaderboard-heading {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.625rem;
            letter-spacing: -0.01em;
        }
        .leaderboard-heading .muted {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
            margin-left: 0.5rem;
        }

        /* Clickable in-detail interactions */
        .clickable {
            cursor: pointer;
            transition: color 0.15s, background 0.15s;
        }
        .clickable:hover { color: var(--accent); }
        .player-card .bucket-badge.clickable:hover,
        td.player .bucket-badge.clickable:hover { filter: brightness(0.92); }

        .player-meta .season-pill {
            cursor: pointer;
            font-weight: 600;
            color: inherit;
            transition: color 0.15s;
        }
        .player-meta .season-pill:hover { color: var(--accent); }

        .score-tile.clickable:hover { box-shadow: 0 0 0 2px var(--accent); }
        .metric-cell .v.clickable { text-decoration: underline dotted var(--text-secondary); text-underline-offset: 3px; }
        .metric-cell .v.clickable:hover { color: var(--accent); text-decoration-color: var(--accent); }

        /* Shooting sub-tables */
        .shot-block { margin-bottom: 1rem; }
        .shot-block:last-child { margin-bottom: 0; }
        .shot-block h4 {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .shot-table {
            display: grid;
            gap: 4px;
        }
        .shot-table.cols-5 { grid-template-columns: 78px repeat(5, minmax(0, 1fr)); }
        .shot-table.cols-3 { grid-template-columns: 78px repeat(3, minmax(0, 1fr)); }
        .shot-table.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
        .shot-cell {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.45rem 0.4rem;
            text-align: center;
            min-height: 56px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.1rem;
            background: var(--surface);
        }
        .shot-cell .pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
        }
        .shot-cell .ratio,
        .shot-cell .pctile {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            color: var(--text-secondary);
            line-height: 1.1;
        }
        .shot-cell.empty { background: transparent; border-style: dashed; opacity: 0.5; }
        .shot-cell.empty .pct { color: var(--text-secondary); font-weight: 400; }
        .shot-row-label {
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding-right: 0.4rem;
        }
        .shot-col-headers {
            display: grid;
            gap: 4px;
            margin-bottom: 4px;
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .shot-col-headers.cols-5 { grid-template-columns: 78px repeat(5, minmax(0, 1fr)); }
        .shot-col-headers.cols-3 { grid-template-columns: 78px repeat(3, minmax(0, 1fr)); }
        .shot-col-headers > span { text-align: center; }
        .shot-col-headers > span:first-child { text-align: left; }
        .shot-twocell-label {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            font-weight: 600;
            text-align: center;
            margin-bottom: 0.2rem;
        }
        .shot-twocell-cell { display: flex; flex-direction: column; }

        /* Doppelgängers */
        .dopp-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
        }
        .dopp-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.625rem 0.6rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .dopp-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px var(--accent-dim); }
        .dopp-card .name { font-weight: 600; font-size: 0.8125rem; line-height: 1.2; }
        .dopp-card .meta { font-size: 0.6875rem; color: var(--text-secondary); }
        .dopp-card .dist {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }
        .dopp-card .bucket-badge { margin: 0.2rem auto 0; }

        @media (max-width: 768px) {
            .container { padding: 1rem 0.875rem 3rem; }
            h1 { font-size: 1.25rem; }
            .subtitle { font-size: 0.8125rem; margin-bottom: 1rem; }

            .filter-row {
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
            }
            .filter-row .filter-group:first-child { grid-column: 1 / -1; }
            .filter-row .filter-group:nth-child(4) { grid-column: 1 / -1; }
            .filter-row .reset-group { grid-column: 1 / -1; justify-self: stretch; }
            .reset-btn { width: 100%; }

            .table-wrap { display: none; }
            .cards { display: block; }

            .detail-panel { grid-template-columns: 1fr; gap: 0.875rem; padding: 0.875rem; }
            .scores-summary { grid-template-columns: repeat(2, 1fr); }
            .metric-grid { grid-template-columns: 1fr; }

            .shot-table.cols-5,
            .shot-col-headers.cols-5 { grid-template-columns: 60px repeat(5, minmax(0, 1fr)); }
            .shot-table.cols-3,
            .shot-col-headers.cols-3 { grid-template-columns: 60px repeat(3, minmax(0, 1fr)); }
            .shot-cell { min-height: 50px; padding: 0.35rem 0.25rem; }
            .shot-cell .pct { font-size: 0.875rem; }
            .shot-row-label { font-size: 0.6875rem; padding-right: 0.25rem; }

            .dopp-grid { grid-template-columns: 1fr; }
        }
    </style>

<body>
    <div class="container">

                <div class="filter-group">

                    <select id="sort">

                        <option value="anthro">Anthro Score</option>
                        <option value="athletic">Athletic Score</option>

                        <option value="Standing Vertical Leap (in)">Standing Vertical</option>

                        <option value="Lane Agility (sec)">Lane Agility</option>
                        <option value="Bench Press (reps)">Bench Press</option>

                        Reset all

            </div>
            <div class="adv-filters">
                <button id="advToggle" class="adv-toggle" type="button" aria-expanded="false" aria-controls="advBody">
                    <span class="adv-toggle-caret">▸</span> Advanced filters

                        <button id="advClear" type="button" class="adv-btn adv-btn-clear">Clear filters</button>
                    </div>

        </div>

        <div id="content" data-status="loading">
            <div class="leaderboard-heading" id="leaderboardHeading" style="display:none"></div>
            <div class="table-wrap">

    </div>

    <script>
        const HEADERS = [
            { key: 'rank',       label: '#',         sortable: false, cls: 'rank' },
            { key: 'player',     label: 'Player',    sortable: true,  cls: 'player-col' },
            { key: 'overall',    label: 'Combine',   sortable: true,  type: 'score' },
            { key: 'anthro',     label: 'Anthro',    sortable: true,  type: 'score' },
            { key: 'athletic',   label: 'Athletic',  sortable: true,  type: 'score' },
            { key: 'shooting',   label: 'Shooting',  sortable: true,  type: 'score' },
            { key: 'Height without shoes (in)', label: 'Height',   sortable: true, type: 'metric', display: 'Height without shoes' },
            { key: 'Wingspan (in)',             label: 'Wingspan', sortable: true, type: 'metric', display: 'Wingspan' },
            { key: 'Standing reach (in)',       label: 'Reach',    sortable: true, type: 'metric', display: 'Standing reach' },
            { key: 'Max Vertical Leap (in)',    label: 'Max Vert', sortable: true, type: 'metric', unit: '"' },
            { key: '3/4 Court Sprint (sec)',    label: 'Sprint',   sortable: true, type: 'metric', unit: 's' },
            { key: 'Lane Agility (sec)',        label: 'Agility',  sortable: true, type: 'metric', unit: 's' },
        ];

        const ANTHRO_KEYS = [
            'Height without shoes (in)', 'Height with shoes (in)', 'Wingspan (in)',
            'Standing reach (in)', 'Weight (lbs)', 'Body Fat %', 'Hand Length (in)', 'Hand Width (in)',
        ];
        const ATHLETIC_KEYS = [
            'Max Vertical Leap (in)', 'Standing Vertical Leap (in)',
            '3/4 Court Sprint (sec)', 'Lane Agility (sec)', 'Modified Lane Agility (sec)', 'Bench Press (reps)',
        ];
        const RATIO_KEYS = ['wingspan_to_height', 'reach_to_height', 'hand_area'];

        const METRIC_LABELS = {
            'Height without shoes (in)': 'Height (no shoes)',
            'Height with shoes (in)': 'Height (shoes)',
            'Wingspan (in)': 'Wingspan',
            'Standing reach (in)': 'Standing reach',
            'Weight (lbs)': 'Weight',
            'Body Fat %': 'Body fat',
            'Hand Length (in)': 'Hand length',
            'Hand Width (in)': 'Hand width',
            'Max Vertical Leap (in)': 'Max vertical',
            'Standing Vertical Leap (in)': 'Standing vertical',
            '3/4 Court Sprint (sec)': '3/4 sprint',
            'Lane Agility (sec)': 'Lane agility',
            'Modified Lane Agility (sec)': 'Mod. lane agility',
            'Bench Press (reps)': 'Bench press',
            'wingspan_to_height': 'Wingspan : Height',
            'reach_to_height': 'Reach : Height',
            'hand_area': 'Hand area',
        };

        const METRIC_DISPLAY_KEYS = {
            'Height without shoes (in)': 'Height without shoes',
            'Wingspan (in)': 'Wingspan',
            'Standing reach (in)': 'Standing reach',
        };

        const METRIC_UNITS = {
            'Body Fat %': '%',
            'Weight (lbs)': ' lbs',
            'Bench Press (reps)': ' reps',
            'Max Vertical Leap (in)': '"',
            'Standing Vertical Leap (in)': '"',
            'Hand Length (in)': '"',
            'Hand Width (in)': '"',
            '3/4 Court Sprint (sec)': 's',
            'Lane Agility (sec)': 's',
            'Modified Lane Agility (sec)': 's',
            'hand_area': ' in²',
            'wingspan_to_height': '',
            'reach_to_height': '',
        };

        const SCORE_LABELS = {
            overall: 'Combine Rating',
            anthro: 'Anthro Score',
            athletic: 'Athletic Score',
            shooting: 'Shooting Score',
        };
        const SCORE_SIMILARITY_TOL = 5;

        // Tolerance windows (in raw metric units) for click-to-find-similar
        const SIMILARITY_TOLERANCE = {
            'Height without shoes (in)': 1.0,
            'Wingspan (in)': 1.0,
            'Standing reach (in)': 1.0,
            'Weight (lbs)': 5,
            'Body Fat %': 1,
            'Hand Length (in)': 0.25,
            'Hand Width (in)': 0.25,
            'Bench Press (reps)': 2,
            'Max Vertical Leap (in)': 2,
            'Standing Vertical Leap (in)': 2,
            '3/4 Court Sprint (sec)': 0.1,
            'Lane Agility (sec)': 0.2,
            'Modified Lane Agility (sec)': 0.2,
            'wingspan_to_height': 0.01,
            'reach_to_height': 0.01,
            'hand_area': 2,
        };

        // URL-friendly param keys per metric. Used for the multi-filter URL
        // encoding (e.g. ?height_gte=84&maxvert_gte=35).
        const METRIC_PARAM_KEY = {
            'Height without shoes (in)': 'height',
            'Wingspan (in)':              'wingspan',
            'Standing reach (in)':        'reach',
            'Weight (lbs)':               'weight',
            'Body Fat %':                 'bodyfat',
            'Hand Length (in)':           'handlen',
            'Hand Width (in)':            'handwidth',
            'Max Vertical Leap (in)':     'maxvert',
            'Standing Vertical Leap (in)':'standvert',
            '3/4 Court Sprint (sec)':     'sprint',
            'Lane Agility (sec)':         'agility',
            'Modified Lane Agility (sec)':'modagility',
            'Bench Press (reps)':         'bench',
            'wingspan_to_height':         'whratio',
            'reach_to_height':            'rhratio',
            'hand_area':                  'handarea',
        };
        const PARAM_KEY_TO_METRIC = Object.fromEntries(
            Object.entries(METRIC_PARAM_KEY).map(([m, k]) => [k, m])
        );

        // Metrics available in the multi-filter dropdown, ordered for sanity.
        const FILTER_METRICS = [
            'Height without shoes (in)',
            'Wingspan (in)',
            'Standing reach (in)',
            'Weight (lbs)',
            'wingspan_to_height',
            'reach_to_height',
            'hand_area',
            'Max Vertical Leap (in)',
            'Standing Vertical Leap (in)',
            'Bench Press (reps)',
            '3/4 Court Sprint (sec)',
            'Lane Agility (sec)',
            'Modified Lane Agility (sec)',
            'Body Fat %',
            'Hand Length (in)',
            'Hand Width (in)',
        ];

        // Per-metric labels for the advanced filter dropdown — include the
        // unit and a "lower is better" hint where relevant.
        const METRIC_LABELS_WITH_UNITS = {
            'Height without shoes (in)':   'Height (in)',
            'Wingspan (in)':               'Wingspan (in)',
            'Standing reach (in)':         'Standing reach (in)',
            'Weight (lbs)':                'Weight (lbs)',
            'Max Vertical Leap (in)':      'Max Vertical (in)',
            'Standing Vertical Leap (in)': 'Standing Vertical (in)',
            'Bench Press (reps)':          'Bench Press (reps)',
            '3/4 Court Sprint (sec)':      '3/4 Sprint (sec, lower is better)',
            'Lane Agility (sec)':          'Lane Agility (sec, lower is better)',
            'Modified Lane Agility (sec)': 'Modified Lane Agility (sec, lower is better)',
            'Body Fat %':                  'Body Fat (%, lower is better)',
            'Hand Length (in)':            'Hand Length (in)',
            'Hand Width (in)':             'Hand Width (in)',
            'wingspan_to_height':          'Wingspan : Height',
            'reach_to_height':             'Reach : Height',
            'hand_area':                   'Hand Area (in²)',
        };

        // Shooting sub-table layout. Range labels are matched against drill names.
        const SHOT_LAYOUTS = [
            {
                family: 'Spot-Up',
                title: 'Spot-Up',
                ranges: [
                    { label: 'College 3', match: 'Coll 3' },
                    { label: '15 ft',     match: '15ft'  },
                    { label: 'NBA 3',     match: 'NBA 3' },
                ],
                spots: [
                    { label: 'L Corner', match: 'Left Corner'  },
                    { label: 'L Wing',   match: 'Left Wing'    },
                    { label: 'Top',      match: 'Top'          },
                    { label: 'R Wing',   match: 'Right Wing'   },
                    { label: 'R Corner', match: 'Right Corner' },
                ],
            },
            {
                family: 'Off-Dribble',
                title: 'Off-the-Dribble',
                ranges: [
                    { label: 'College 3', match: 'Coll 3' },
                    { label: '15 ft',     match: '15ft'  },
                    { label: 'NBA 3',     match: 'NBA 3' },
                ],
                spots: [
                    { label: 'L Wing', match: 'Left Wing'  },
                    { label: 'Top',    match: 'Top'        },
                    { label: 'R Wing', match: 'Right Wing' },
                ],
            },
            {
                family: 'On-Move',
                title: 'On-the-Move',
                twoCells: [
                    { label: 'College 3', match: 'Coll 3' },
                    { label: '15 ft',     match: '15ft'  },
                ],
            },
        ];

        const state = {
            data: null,
            filtered: [],
            sort: { key: 'overall', dir: 'desc' },
            filters: { search: '', bucket: '', seasonMin: null, seasonMax: null, similarity: null, multi: [] },
            expanded: new Set(),
        };

        // Continuous percentile gradient. Centered at 50%ile (faint), saturating
        // at the extremes. Applied as inline background-color so it composes
        // cleanly with whatever class-based styling the cell already has.
        function heatStyle(pct) {
            if (pct == null || isNaN(pct)) return '';
            const t = (pct - 50) / 50;             // -1 to +1
            const alpha = 0.05 + Math.abs(t) * 0.30; // 5% near midpoint, 35% at extremes
            const rgb = t >= 0 ? '52, 199, 89' : '239, 68, 68';
            return `background-color: rgba(${rgb}, ${alpha});`;
        }

        function applyHeat(el, pct) {
            if (pct == null || isNaN(pct)) return;
            const t = (pct - 50) / 50;
            const alpha = 0.05 + Math.abs(t) * 0.30;
            const rgb = t >= 0 ? '52, 199, 89' : '239, 68, 68';
            el.style.backgroundColor = `rgba(${rgb}, ${alpha})`;
        }

        function fmtMetric(player, key) {
            const m = player.metrics[key];
            if (!m || m.raw == null) return null;
            const dispKey = METRIC_DISPLAY_KEYS[key];
            if (dispKey && player.display && player.display[dispKey]) {
                return player.display[dispKey];
            }
            const unit = METRIC_UNITS[key] || '';
            const v = typeof m.raw === 'number' ? m.raw : Number(m.raw);
            const decimals = (key === 'wingspan_to_height' || key === 'reach_to_height') ? 3 :
                            (key === 'hand_area') ? 2 :
                            Number.isInteger(v) || /reps|lbs/i.test(unit) ? 0 :
                            (key.includes('Sprint') || key.includes('Agility')) ? 2 :
                            (key === 'Body Fat %') ? 1 : 1;
            return v.toFixed(decimals) + unit;
        }

        function getSortValue(player, key) {
            if (['overall','anthro','athletic','shooting'].includes(key)) {
                return player.scores[key];
            }
            const m = player.metrics[key];
            if (!m || m.raw == null) return null;
            return typeof m.raw === 'number' ? m.raw : Number(m.raw);
        }

        function getSortPct(player, key) {
            if (['overall','anthro','athletic','shooting'].includes(key)) {
                return player.scores[key];
            }
            return player.metrics[key]?.pct ?? null;
        }

        function init(data) {
            state.data = data;
            const [smin, smax] = data.season_range;
            // Default view: most recent season only
            state.filters.seasonMin = smax;
            state.filters.seasonMax = smax;

            const seasonMinSel = document.getElementById('seasonMin');
            const seasonMaxSel = document.getElementById('seasonMax');
            for (let y = smax; y >= smin; y--) {
                seasonMinSel.appendChild(new Option(y, y));
                seasonMaxSel.appendChild(new Option(y, y));
            }
            seasonMinSel.value = smax;
            seasonMaxSel.value = smax;

            const subtitle = document.getElementById('subtitle');
            const total = data.rows.toLocaleString();
            subtitle.textContent = `${total} prospects, ${smin}–${smax}, scored against their position cohort`;

            renderHeader();
            attachEvents();

            // The loading placeholder shown by loadData() is hidden by the
            // empty-state renderer once render() runs (or replaced if the
            // result set is empty).
            document.getElementById('emptyState').style.display = 'none';

            // Apply ?player= and any URL params before first render
            const deepTarget = applyDeepLink();
            renderMultiFilters();
            applyFilters();

            // If the URL targeted a player, scroll their row into view
            if (deepTarget) {
                requestAnimationFrame(() => {
                    const pid = playerId(deepTarget);
                    const row = document.querySelector(`tr[data-pid="${cssEscape(pid)}"]`) ||
                                document.querySelector(`.player-card[data-pid="${cssEscape(pid)}"]`);
                    if (row) row.scrollIntoView({ behavior: 'auto', block: 'center' });
                });
            }

            // Browser back/forward: re-sync state from URL and re-render.
            window.addEventListener('popstate', () => {
                state.expanded.clear();
                state.filters.similarity = null;
                applyDeepLink();
                renderMultiFilters();
                applyFilters();
            });

            const ts = new Date(data.generated_at);
            const footer = document.getElementById('footer');
            footer.innerHTML =
                `<div class="footer-counts">Guards ${data.buckets.Guards} · Wings ${data.buckets.Wings} · Bigs ${data.buckets.Bigs}</div>` +
                `<div class="footer-stamp">Data generated ${ts.toISOString().slice(0,10)}</div>`;
        }

        function renderHeader() {
            const tr = document.getElementById('headerRow');
            tr.innerHTML = '';
            HEADERS.forEach(h => {
                const th = document.createElement('th');
                if (h.cls) th.className = h.cls;
                th.textContent = h.label;
                if (h.sortable) {
                    th.dataset.sortKey = h.key;
                    if (h.key === state.sort.key) {
                        th.classList.add('active');
                        const arrow = document.createElement('span');
                        arrow.className = 'sort-arrow';
                        arrow.textContent = state.sort.dir === 'desc' ? '▼' : '▲';
                        th.appendChild(arrow);
                    }
                    th.addEventListener('click', () => {
                        if (state.sort.key === h.key) {
                            state.sort.dir = state.sort.dir === 'desc' ? 'asc' : 'desc';
                        } else {
                            state.sort.key = h.key;
                            // For "lower-is-better" raw metrics (sprint, agility, body fat),
                            // ascending raw is intuitive; otherwise descending.
                            const meta = state.data.metrics_meta[h.key];
                            state.sort.dir = (meta && meta.higher_is_better === false) ? 'asc' : 'desc';
                        }
                        document.getElementById('sort').value =
                            ['overall','anthro','athletic','shooting'].includes(h.key) ? h.key : h.key;
                        renderHeader();
                        applyFilters();
                    });
                }
                tr.appendChild(th);
            });
        }

        function attachEvents() {
            const searchEl = document.getElementById('search');
            const searchClear = document.getElementById('searchClear');
            searchEl.addEventListener('input', e => {
                const raw = e.target.value;
                state.filters.search = raw.trim().toLowerCase();
                searchClear.hidden = raw.length === 0;
                hideSearchNote();
                applyFilters();
                renderSuggestions(raw.trim());
            });
            searchClear.addEventListener('click', () => {
                searchEl.value = '';
                state.filters.search = '';
                searchClear.hidden = true;
                hideSearchNote();
                hideSuggestions();
                // Clear ?player= and ?search= (the latter we don't actually
                // emit, but strip defensively in case future code adds it).
                const url = new URL(window.location.href);
                url.searchParams.delete('player');
                url.searchParams.delete('search');
                history.replaceState({}, '', url.pathname + (url.searchParams.toString() ? '?' + url.searchParams.toString() : ''));
                state.expanded.clear();
                applyFilters();
                searchEl.focus();
            });
            searchEl.addEventListener('keydown', e => {
                const box = document.getElementById('searchSuggestions');
                if (e.key === 'Escape') {
                    hideSuggestions();
                    hideSearchNote();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (!box.hidden) {
                        const active = box.querySelector('.suggestion.active') || box.querySelector('.suggestion');
                        if (active && active.dataset.pid) {
                            selectSuggestionByPid(active.dataset.pid);
                            return;
                        }
                    }
                    handleSearchEnter();
                } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                    if (box.hidden) return;
                    e.preventDefault();
                    const items = [...box.querySelectorAll('.suggestion')];
                    if (!items.length) return;
                    let idx = items.findIndex(i => i.classList.contains('active'));
                    items.forEach(i => i.classList.remove('active'));
                    idx = e.key === 'ArrowDown'
                        ? (idx + 1) % items.length
                        : (idx <= 0 ? items.length - 1 : idx - 1);
                    items[idx].classList.add('active');
                    items[idx].scrollIntoView({ block: 'nearest' });
                }
            });
            searchEl.addEventListener('focus', () => {
                if (searchEl.value.trim().length >= 2) renderSuggestions(searchEl.value.trim());
            });
            document.addEventListener('click', e => {
                if (!e.target.closest('.search-wrapper')) hideSuggestions();
            });

            document.getElementById('bucket').addEventListener('change', e => {
                state.filters.bucket = e.target.value;
                applyFilters();
                syncUrl();
            });
            document.getElementById('seasonMin').addEventListener('change', e => {
                const v = parseInt(e.target.value, 10);
                state.filters.seasonMin = v;
                // Inversion guard: bump end to match start silently.
                if (state.filters.seasonMax < v) {
                    state.filters.seasonMax = v;
                    document.getElementById('seasonMax').value = String(v);
                }
                applyFilters();
                syncUrl();
            });
            document.getElementById('seasonMax').addEventListener('change', e => {
                const v = parseInt(e.target.value, 10);
                state.filters.seasonMax = v;
                if (state.filters.seasonMin > v) {
                    state.filters.seasonMin = v;
                    document.getElementById('seasonMin').value = String(v);
                }
                applyFilters();
                syncUrl();
            });
            document.getElementById('sort').addEventListener('change', e => {
                state.sort.key = e.target.value;
                const meta = state.data.metrics_meta[e.target.value];
                state.sort.dir = (meta && meta.higher_is_better === false) ? 'asc' : 'desc';
                renderHeader();
                applyFilters();
            });

            // Advanced filters
            document.getElementById('advToggle').addEventListener('click', () => {
                const btn = document.getElementById('advToggle');
                const open = btn.getAttribute('aria-expanded') !== 'true';
                setAdvancedOpen(open);
            });
            document.getElementById('advAdd').addEventListener('click', addBlankMultiFilter);
            document.getElementById('advClear').addEventListener('click', clearMultiFilters);
            document.getElementById('resetAll').addEventListener('click', resetAll);
        }

        function renderSuggestions(query) {
            const box = document.getElementById('searchSuggestions');
            const search = document.getElementById('search');
            if (!query || query.length < 2) return hideSuggestions();
            const ql = query.toLowerCase();
            const all = state.data.players;
            const prefix = [], substring = [];
            for (const p of all) {
                const name = p.player.toLowerCase();
                if (name.startsWith(ql)) prefix.push(p);
                else if (name.includes(ql)) substring.push(p);
                if (prefix.length >= 8) break;
            }
            const merged = prefix.concat(substring).slice(0, 8);
            if (!merged.length) return hideSuggestions();

            box.innerHTML = '';
            merged.forEach((p, idx) => {
                const item = document.createElement('div');
                item.className = 'suggestion' + (idx === 0 ? ' active' : '');
                item.dataset.pid = playerId(p);
                item.setAttribute('role', 'option');
                const name = document.createElement('span');
                name.className = 'name';
                name.textContent = p.player;
                const meta = document.createElement('span');
                meta.className = 'meta';
                const yr = document.createElement('span');
                yr.textContent = p.season;
                const badge = document.createElement('span');
                badge.className = 'bucket-badge';
                badge.textContent = p.bucket;
                meta.appendChild(yr);
                meta.appendChild(badge);
                item.appendChild(name);
                item.appendChild(meta);
                // Use mousedown so we beat the input's blur handler.
                item.addEventListener('mousedown', e => {
                    e.preventDefault();
                    selectSuggestionByPid(item.dataset.pid);
                });
                box.appendChild(item);
            });
            box.hidden = false;
            search.setAttribute('aria-expanded', 'true');
        }

        function hideSuggestions() {
            const box = document.getElementById('searchSuggestions');
            box.hidden = true;
            box.innerHTML = '';
            document.getElementById('search').setAttribute('aria-expanded', 'false');
        }

        function selectSuggestionByPid(pid) {
            const sep = pid.lastIndexOf('|');
            const name = pid.slice(0, sep);
            const season = parseInt(pid.slice(sep + 1), 10);
            const target = state.data.players.find(p => p.player === name && p.season === season);
            if (!target) return;
            jumpToTarget(target, { fromSearch: true });
        }

        // Centralized "navigate to a player" routine. Broadens the season range
        // only when needed, never shrinks. Optional fromSearch flag installs
        // the player's name into the search box.
        function jumpToTarget(target, { fromSearch = false, fromComp = false } = {}) {
            const searchEl = document.getElementById('search');
            const searchClear = document.getElementById('searchClear');
            if (fromSearch) {
                searchEl.value = target.player;
                state.filters.search = target.player.toLowerCase();
                searchClear.hidden = false;
            }

            // Range expansion (never shrink). Note whether we changed it so
            // we can surface a toast.
            const oldMin = state.filters.seasonMin;
            const oldMax = state.filters.seasonMax;
            let expanded = false;
            if (state.filters.seasonMin > target.season) {
                state.filters.seasonMin = target.season;
                document.getElementById('seasonMin').value = String(target.season);
                expanded = true;
            }
            if (state.filters.seasonMax < target.season) {
                state.filters.seasonMax = target.season;
                document.getElementById('seasonMax').value = String(target.season);
                expanded = true;
            }
            if (state.filters.bucket && state.filters.bucket !== target.bucket) {
                state.filters.bucket = '';
                document.getElementById('bucket').value = '';
            }
            state.filters.similarity = null;
            state.expanded.clear();
            state.expanded.add(playerId(target));
            hideSuggestions();
            hideSearchNote();
            applyFilters();
            syncUrl({ player: slugify(target.player, target.season), pushExpand: true });

            if (expanded) {
                showToast(`Season range expanded to include ${target.player}.`, 4000);
            }

            requestAnimationFrame(() => {
                const pid = cssEscape(playerId(target));
                const row = document.querySelector(`tr[data-pid="${pid}"]`) ||
                            document.querySelector(`.player-card[data-pid="${pid}"]`);
                if (row) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    row.classList.remove('flash');
                    // Force reflow so the animation re-triggers when re-applied
                    void row.offsetWidth;
                    row.classList.add('flash');
                    setTimeout(() => row.classList.remove('flash'), 1300);
                }
            });
        }

        // Enter pressed in search with no autocomplete selected.
        function handleSearchEnter() {
            const q = state.filters.search;
            if (!q) return;
            // Players matching this search within the current filter set
            const inFilter = state.filtered.filter(p => p.player.toLowerCase().includes(q));
            if (inFilter.length === 1) {
                jumpToTarget(inFilter[0], { fromSearch: true });
                return;
            }
            if (inFilter.length > 1) {
                hideSearchNote();
                return;
            }
            // Zero in current filters — does the dataset have any match?
            const anywhere = state.data.players.find(p => p.player.toLowerCase().includes(q));
            if (anywhere) {
                showSearchNote('Match exists outside current filters.', 'Expand search', () => {
                    // Drop the position and season-range narrowing only.
                    const [smin, smax] = state.data.season_range;
                    state.filters.bucket = '';
                    document.getElementById('bucket').value = '';
                    state.filters.seasonMin = smin;
                    state.filters.seasonMax = smax;
                    document.getElementById('seasonMin').value = String(smin);
                    document.getElementById('seasonMax').value = String(smax);
                    hideSearchNote();
                    applyFilters();
                    syncUrl();
                });
            }
            // If no match anywhere, the empty-state card already covers it.
        }

        function showSearchNote(text, actionLabel, actionFn) {
            const note = document.getElementById('searchNote');
            note.innerHTML = '';
            const span = document.createElement('span');
            span.textContent = text;
            note.appendChild(span);
            if (actionLabel && actionFn) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = actionLabel;
                btn.addEventListener('click', actionFn);
                note.appendChild(btn);
            }
            note.hidden = false;
        }
        function hideSearchNote() {
            const note = document.getElementById('searchNote');
            note.hidden = true;
            note.innerHTML = '';
        }

        function showToast(message, ms = 3000) {
            const stack = document.getElementById('toastStack');
            if (!stack) return;
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = message;
            stack.appendChild(t);
            // Force reflow then animate in
            void t.offsetWidth;
            t.classList.add('in');
            setTimeout(() => {
                t.classList.remove('in');
                setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 220);
            }, ms);
        }

        // Is any filter narrower than the default view?
        function isAnyFilterActive() {
            const f = state.filters;
            const [smin, smax] = state.data.season_range;
            const seasonsAreDefault = f.seasonMin === smax && f.seasonMax === smax;
            return Boolean(
                f.search || f.bucket || f.similarity ||
                (f.multi && f.multi.length) ||
                !seasonsAreDefault
            );
        }

        // Are filters at the dataset-wide defaults? Used by URL hygiene.
        function isAtDefaultState() {
            const f = state.filters;
            const [smin, smax] = state.data.season_range;
            return !f.search && !f.bucket && !f.similarity &&
                (!f.multi || f.multi.length === 0) &&
                f.seasonMin === smax && f.seasonMax === smax &&
                state.expanded.size === 0;
        }

        // A multi-filter row applies to the table only when both metric is
        // chosen and value is a finite number. Incomplete rows live in state
        // (so the user can keep filling them in) but are skipped everywhere.
        function isCompleteFilter(f) {
            if (!f || !f.metric) return false;
            if (f.value === '' || f.value == null) return false;
            const num = Number(f.value);
            return Number.isFinite(num);
        }

        function applyFilters() {
            const f = state.filters;
            const players = state.data.players.filter(p => {
                if (f.bucket && p.bucket !== f.bucket) return false;
                if (f.seasonMin != null && p.season < f.seasonMin) return false;
                if (f.seasonMax != null && p.season > f.seasonMax) return false;
                if (f.search && !p.player.toLowerCase().includes(f.search)) return false;
                if (f.similarity) {
                    if (f.similarity.key.startsWith('score:')) {
                        const sk = f.similarity.key.slice(6);
                        const sv = p.scores[sk];
                        if (sv == null) return false;
                        if (sv < f.similarity.min || sv > f.similarity.max) return false;
                    } else {
                        const m = p.metrics[f.similarity.key];
                        if (!m || m.raw == null) return false;
                        const v = typeof m.raw === 'number' ? m.raw : Number(m.raw);
                        if (v < f.similarity.min || v > f.similarity.max) return false;
                    }
                }
                // Advanced multi-filters (AND across rows). Each row is
                // {metric, op, value}. Incomplete rows (no metric or no
                // numeric value) are skipped — they don't apply.
                for (const mf of f.multi) {
                    if (!isCompleteFilter(mf)) continue;
                    const m = p.metrics[mf.metric];
                    if (!m || m.raw == null) return false;
                    const v = typeof m.raw === 'number' ? m.raw : Number(m.raw);
                    const fv = Number(mf.value);
                    if (mf.op === 'gte' && !(v >= fv)) return false;
                    if (mf.op === 'lte' && !(v <= fv)) return false;
                    if (mf.op === 'eq'  && !(v === fv)) return false;
                }
                return true;
            });

            const { key, dir } = state.sort;
            const mult = dir === 'asc' ? 1 : -1;
            players.sort((a, b) => {
                const va = getSortValue(a, key);
                const vb = getSortValue(b, key);
                const aNull = va == null, bNull = vb == null;
                if (aNull && bNull) return 0;
                if (aNull) return 1;
                if (bNull) return -1;
                return (va - vb) * mult;
            });

            state.filtered = players;

            const summary = document.getElementById('filterSummary');
            const total = state.data.rows;
            const shown = players.length;
            const hasFilter = isAnyFilterActive();
            summary.innerHTML = hasFilter
                ? `<strong>${shown.toLocaleString()}</strong> of ${total.toLocaleString()} players shown`
                : `<strong>${shown.toLocaleString()}</strong> players shown`;

            renderChips();
            renderHeading();
            render();
        }

        function renderChips() {
            const wrap = document.getElementById('chips');
            wrap.innerHTML = '';
            const sim = state.filters.similarity;
            if (sim) {
                const chip = document.createElement('span');
                chip.className = 'chip';
                const label = document.createElement('span');
                if (sim.key.startsWith('score:')) {
                    const sk = sim.key.slice(6);
                    label.textContent = `${SCORE_LABELS[sk] || sk} ≈ ${sim.center} (±${sim.tol})`;
                } else {
                    label.textContent = `${METRIC_LABELS[sim.key] || sim.key} ≈ ${sim.center}`;
                }
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.setAttribute('aria-label', 'Clear similarity filter');
                btn.textContent = '×';
                btn.addEventListener('click', () => {
                    state.filters.similarity = null;
                    applyFilters();
                });
                chip.appendChild(label);
                chip.appendChild(btn);
                wrap.appendChild(chip);
            }

            // Multi-filter chips: one per *complete* row. Incomplete rows
            // (still being constructed) don't surface as chips.
            state.filters.multi.forEach((f, idx) => {
                if (!isCompleteFilter(f)) return;
                const chip = document.createElement('span');
                chip.className = 'chip chip-multi';
                chip.dataset.rowidx = String(idx);
                const numVal = Number(f.value);
                const valStr = (f.metric === 'wingspan_to_height' || f.metric === 'reach_to_height')
                    ? numVal.toFixed(3)
                    : (f.metric === 'hand_area') ? numVal.toFixed(2)
                    : String(numVal);
                const label = document.createElement('button');
                label.type = 'button';
                label.className = 'chip-label';
                label.textContent = `${METRIC_LABELS[f.metric] || f.metric} ${OPERATOR_LABEL[f.op]} ${valStr}`;
                label.title = 'Open in advanced filters';
                label.addEventListener('click', () => focusAdvRow(idx));
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'chip-x';
                btn.setAttribute('aria-label', 'Remove this filter');
                btn.textContent = '×';
                btn.addEventListener('click', () => {
                    state.filters.multi.splice(idx, 1);
                    renderMultiFilters();
                    onMultiFilterChange();
                });
                chip.appendChild(label);
                chip.appendChild(btn);
                wrap.appendChild(chip);
            });
        }

        // Open the advanced filter panel and visually focus the row at `idx`.
        function focusAdvRow(idx) {
            setAdvancedOpen(true);
            requestAnimationFrame(() => {
                const row = document.querySelector(`.adv-row[data-rowidx="${idx}"]`);
                if (!row) return;
                row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                row.classList.remove('row-focus');
                void row.offsetWidth;
                row.classList.add('row-focus');
                setTimeout(() => row.classList.remove('row-focus'), 1500);
                const sel = row.querySelector('.adv-metric');
                if (sel) sel.focus({ preventScroll: true });
            });
        }

        function renderHeading() {
            const heading = document.getElementById('leaderboardHeading');
            const f = state.filters;
            const isDefaultLike =
                !f.search && !f.bucket && !f.similarity &&
                f.seasonMin === f.seasonMax && f.seasonMin === state.data.season_range[1];
            if (isDefaultLike) {
                heading.style.display = '';
                heading.innerHTML = `Best of ${f.seasonMin} Combine ` +
                    `<span class="muted">— sorted by Combine Rating</span>`;
            } else if (f.seasonMin === f.seasonMax && f.seasonMin != null) {
                heading.style.display = '';
                heading.innerHTML = `${f.seasonMin} Combine ` +
                    `<span class="muted">— ${state.filtered.length} players</span>`;
            } else {
                heading.style.display = 'none';
            }
        }

        function render() {
            const tbody = document.getElementById('tbody');
            const cards = document.getElementById('cards');
            const empty = document.getElementById('emptyState');
            tbody.innerHTML = '';
            cards.innerHTML = '';

            if (state.filtered.length === 0) {
                renderEmptyState(empty);
                empty.style.display = '';
                return;
            }

            // Selected-player-hidden case: filtered has players, but the user's
            // expanded selection isn't among them.
            const hiddenSelected = findHiddenSelectedPlayer();
            if (hiddenSelected) {
                renderEmptyState(empty, hiddenSelected);
                empty.style.display = '';
                // We DO still render the table below so user sees the rest.
            } else {
                empty.style.display = 'none';
            }

            // Expansion is now strictly user-driven (typeahead pick, name click,
            // background row click). No auto-expand on narrow result sets.
            const isExpanded = (p) => state.expanded.has(playerId(p));

            const frag = document.createDocumentFragment();
            const cardFrag = document.createDocumentFragment();

            state.filtered.forEach((p, i) => {
                frag.appendChild(buildRow(p, i + 1, isExpanded(p)));
                if (isExpanded(p)) {
                    frag.appendChild(buildDetailRow(p));
                }
                cardFrag.appendChild(buildCard(p, isExpanded(p)));
            });
            tbody.appendChild(frag);
            cards.appendChild(cardFrag);
        }

        function playerId(p) { return `${p.player}|${p.season}`; }

        // ---- URL routing ---------------------------------------------------
        // Slug format: lowercase, accent-stripped, non-alnum -> '-', + '-{season}'.
        function slugify(name, season) {
            const base = String(name)
                .normalize('NFD').replace(/[̀-ͯ]/g, '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
            return `${base}-${season}`;
        }

        function getSlugIndex() {
            if (state._slugIndex) return state._slugIndex;
            const idx = new Map();
            for (const p of state.data.players) idx.set(slugify(p.player, p.season), p);
            state._slugIndex = idx;
            return idx;
        }

        function findPlayerBySlug(slug) {
            return getSlugIndex().get(slug) || null;
        }

        // Push the current state into the URL. `pushExpand` true => pushState
        // (creates a back-button entry); false => replaceState (silent update).
        function syncUrl({ player, pushExpand = false } = {}) {
            // Build the URL fresh from state — only emit params that aren't at
            // their default value, so the default view URL is just the
            // pathname with no query string.
            const url = new URL(window.location.href);
            const params = new URLSearchParams();

            // Player slug (if exactly one is expanded)
            let slug = null;
            if (player === undefined) {
                if (state.expanded.size === 1) {
                    const pid = [...state.expanded][0];
                    const sep = pid.lastIndexOf('|');
                    slug = slugify(pid.slice(0, sep), parseInt(pid.slice(sep + 1), 10));
                }
            } else if (player) {
                slug = player;
            }
            if (slug) params.set('player', slug);

            // Position
            if (state.filters.bucket) params.set('position', state.filters.bucket);

            // Season range (only when narrower than the dataset extents)
            const [smin, smax] = state.data.season_range;
            if (state.filters.seasonMin !== smin || state.filters.seasonMax !== smax) {
                // Default view = latest year only; encoded explicitly only when
                // the user has narrowed/widened past that.
                if (!(state.filters.seasonMin === smax && state.filters.seasonMax === smax)) {
                    params.set('season_start', String(state.filters.seasonMin));
                    params.set('season_end',   String(state.filters.seasonMax));
                }
            }

            // Multi-filter rows (skip incomplete rows so they don't pollute
            // the URL while the user is still constructing them)
            for (const f of state.filters.multi) {
                if (!isCompleteFilter(f)) continue;
                const pkey = METRIC_PARAM_KEY[f.metric];
                if (!pkey) continue;
                params.set(`${pkey}_${f.op}`, String(f.value));
            }

            const qs = params.toString();
            const newUrl = qs ? `${url.pathname}?${qs}` : url.pathname;
            if (pushExpand) history.pushState({}, '', newUrl);
            else            history.replaceState({}, '', newUrl);
        }

        const OPERATOR_LABEL = { gte: '≥', lte: '≤', eq: '=' };

        function metricUnitHint(key) {
            const u = METRIC_UNITS[key];
            if (u && u.trim()) return u.trim();
            if (/\(in\)$/.test(key)) return 'in';
            if (key === 'wingspan_to_height' || key === 'reach_to_height') return 'ratio';
            return '';
        }

        function setAdvancedOpen(open) {
