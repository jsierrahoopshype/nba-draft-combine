<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Draft Combine Dashboard - HoopsHype</title>
    <meta name="description" content="26 years of NBA Draft Combine measurables (2000-2025), scored against each player's position cohort.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface-hover: #f0f0f2;
            --border: #d1d1d6;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent: #3b82f6;
            --accent-dim: rgba(59, 130, 246, 0.15);
            --green: #34c759;
            --green-dim: rgba(52, 199, 89, 0.15);
            --green-strong: rgba(52, 199, 89, 0.35);
            --orange: #f59e0b;
            --orange-dim: rgba(245, 158, 11, 0.15);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.15);
            --red-strong: rgba(239, 68, 68, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9375rem;
        }

        /* Filter bar */
        .filters {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding: 0.75rem 0 1rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .filter-row {
            display: grid;
            grid-template-columns: 2fr 1.3fr 1.3fr 1.5fr;
            gap: 0.75rem;
            align-items: end;
        }

        .filter-group { display: flex; flex-direction: column; gap: 0.375rem; }

        .filter-group label {
            font-size: 0.6875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        input[type="text"], select {
            width: 100%;
            padding: 0.55rem 0.875rem;
            font-size: 0.875rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            transition: all 0.15s;
        }

        input[type="text"]:hover, select:hover { border-color: var(--accent); }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .season-group { min-width: 0; }
        .season-range {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            gap: 0.4rem;
        }
        .season-cell { display: flex; flex-direction: column; gap: 0.375rem; min-width: 0; }
        .season-arrow {
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding-bottom: 0.6rem;
        }

        .filter-summary {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            text-align: right;
        }
        .filter-summary strong { color: var(--text); font-weight: 600; }

        /* Table */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table.leaderboard {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        table.leaderboard thead th {
            background: var(--surface-hover);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-size: 0.6875rem;
            font-weight: 600;
            padding: 0.75rem 0.625rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: color 0.15s;
        }
        table.leaderboard thead th:hover { color: var(--accent); }
        table.leaderboard thead th.active { color: var(--accent); }
        table.leaderboard thead th .sort-arrow { font-size: 0.6rem; opacity: 0.6; margin-left: 0.2rem; }
        table.leaderboard thead th.player-col { text-align: left; }

        table.leaderboard tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            cursor: pointer;
        }
        table.leaderboard tbody tr:last-child { border-bottom: none; }
        table.leaderboard tbody tr:hover { background: var(--surface-hover); }
        table.leaderboard tbody tr.expanded { background: var(--surface-hover); }

        table.leaderboard td {
            padding: 0.6rem 0.625rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            white-space: nowrap;
        }
        table.leaderboard td.rank {
            color: var(--text-secondary);
            font-size: 0.8125rem;
            width: 3rem;
        }
        table.leaderboard td.player {
            text-align: left;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            color: var(--text);
            max-width: 18rem;
        }
        .player-name { font-weight: 600; }
        .player-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .bucket-badge {
            display: inline-block;
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            background: var(--accent-dim);
            color: var(--accent);
            margin-left: 0.375rem;
            vertical-align: middle;
        }

        td.cell-score, td.cell-metric { position: relative; }
        td.cell-score .pct,
        td.cell-metric .pct {
            display: block;
            font-size: 0.625rem;
            color: var(--text-secondary);
            margin-top: 0.1rem;
        }

        .nodata { font-style: italic; color: var(--text-secondary); font-family: 'DM Sans', sans-serif; }

        /* Heat colors via inline background-color attribute would be cleaner, but we apply via class to keep lighter DOM */
        /* Heat colors are now applied as inline background-color via applyHeat()
           so the tint scales continuously with percentile. */

        /* Expanded panel */
        tr.detail-row > td {
            padding: 0;
            background: var(--bg);
        }
        .detail-panel {
            padding: 1.25rem 1.25rem 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .detail-panel h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid var(--accent);
        }
        .detail-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
        .detail-section.full { grid-column: 1 / -1; }

        .scores-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.625rem;
            margin-bottom: 0.5rem;
        }
        .score-tile {
            text-align: center;
            padding: 0.75rem 0.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .score-tile .label {
            font-size: 0.625rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .score-tile .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .score-tile.overall { background: var(--accent-dim); border-color: var(--accent); }
        .score-tile.overall .value { color: var(--accent); }

        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.4rem;
        }
        .metric-cell {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.625rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.8125rem;
        }
        .metric-cell .name { color: var(--text-secondary); }
        .metric-cell .v {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }
        .metric-cell .pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-secondary);
            margin-left: 0.5rem;
        }

        .drill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 0.4rem;
        }
        .drill-cell {
            padding: 0.5rem 0.625rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.75rem;
        }
        .drill-cell .name { color: var(--text-secondary); margin-bottom: 0.2rem; line-height: 1.2; }
        .drill-cell .num {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .drill-cell .meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-secondary);
        }

        .standout-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .standout-pill {
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
            border-radius: 999px;
            background: var(--green-dim);
            color: #1d8a40;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        .spinner {
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            margin: 0 auto 1rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .footer-stamp { font-family: 'JetBrains Mono', monospace; opacity: 0.8; }

        /* Mobile cards */
        .cards { display: none; }
        .player-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            margin-bottom: 0.625rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .player-card:hover { border-color: var(--accent); }
        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
            gap: 0.5rem;
        }
        .card-head .name { font-weight: 600; font-size: 0.95rem; }
        .card-head .meta { font-size: 0.75rem; color: var(--text-secondary); }

        /* Typeahead suggestions */
        .search-wrapper { position: relative; }
        .suggestions {
            position: absolute;
            top: calc(100% + 2px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 8px;
            max-height: 320px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .suggestion {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.875rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
            gap: 0.75rem;
        }
        .suggestion:last-child { border-bottom: none; }
        .suggestion:hover, .suggestion.active { background: var(--surface-hover); }
        .suggestion .name { font-weight: 500; color: var(--text); flex: 1; min-width: 0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .suggestion .meta {
            display: flex; gap: 0.4rem; align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .suggestion .meta .bucket-badge { margin: 0; }

        /* Clickable in-row affordances */
        td.cell-score .val.clickable,
        td.cell-metric .val.clickable {
            cursor: pointer;
            border-radius: 4px;
            padding: 1px 3px;
            transition: background 0.12s;
        }
        td.cell-score .val.clickable:hover,
        td.cell-metric .val.clickable:hover {
            background: var(--accent-dim);
            color: var(--accent);
        }
        .clickable-name {
            cursor: pointer;
            transition: color 0.12s;
        }
        .clickable-name:hover {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* Advanced (multi) filter panel */
        .adv-filters { margin-top: 0.5rem; }
        .adv-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: transparent;
            border: 0;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0;
            transition: color 0.15s;
        }
        .adv-toggle:hover { color: var(--accent); }
        .adv-toggle-caret { transition: transform 0.15s; display: inline-block; font-size: 0.75rem; }
        .adv-toggle[aria-expanded="true"] .adv-toggle-caret { transform: rotate(90deg); }
        .adv-count {
            color: var(--accent);
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0;
            text-transform: none;
        }
        .adv-count::before { content: '('; }
        .adv-count::after  { content: ')'; }
        .adv-body {
            margin-top: 0.5rem;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
        }
        .adv-rows { display: flex; flex-direction: column; gap: 0.4rem; }
        .adv-row {
            display: grid;
            grid-template-columns: minmax(0, 2fr) auto minmax(0, 1fr) auto auto;
            gap: 0.4rem;
            align-items: center;
        }
        .adv-row select, .adv-row input {
            padding: 0.4rem 0.6rem;
            font-size: 0.8125rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            min-width: 0;
        }
        .adv-row input {
            font-family: 'JetBrains Mono', monospace;
        }
        .adv-row .adv-unit {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            min-width: 2.4rem;
        }
        .adv-row .adv-remove {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            padding: 0.3rem 0.5rem;
            cursor: pointer;
            font-size: 0.8125rem;
            transition: all 0.15s;
        }
        .adv-row .adv-remove:hover { color: var(--red); border-color: var(--red); }
        .adv-empty {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            padding: 0.25rem 0.1rem;
        }
        .adv-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.625rem;
        }
        .adv-btn {
            padding: 0.4rem 0.75rem;
            font-size: 0.8125rem;
            font-family: inherit;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            transition: all 0.15s;
        }
        .adv-btn:hover { border-color: var(--accent); color: var(--accent); }
        .adv-btn-add { background: var(--accent-dim); color: var(--accent); border-color: transparent; }
        .adv-btn-add:hover { background: var(--accent); color: white; }
        .adv-btn-clear { color: var(--text-secondary); }
        .adv-btn-clear:hover { color: var(--red); border-color: var(--red); }

        @media (max-width: 768px) {
            .adv-row {
                grid-template-columns: 1fr 1fr;
                grid-template-areas:
                  "metric metric"
                  "op value"
                  "unit remove";
                gap: 0.4rem;
            }
            .adv-row > select:first-child { grid-area: metric; }
            .adv-row > select:nth-of-type(2) { grid-area: op; }
            .adv-row > input { grid-area: value; }
            .adv-row > .adv-unit { grid-area: unit; }
            .adv-row > .adv-remove { grid-area: remove; justify-self: end; }
        }

        /* Active filter chips (similarity, etc.) */
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            background: var(--accent-dim);
            color: var(--accent);
            padding: 0.25rem 0.4rem 0.25rem 0.625rem;
            border-radius: 999px;
            border: 1px solid transparent;
        }
        .chip button {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 0.875rem;
            line-height: 1;
            padding: 0 0.25rem;
            border-radius: 999px;
        }
        .chip button:hover { background: rgba(59, 130, 246, 0.25); }

        /* "Best of YYYY" heading */
        .leaderboard-heading {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.625rem;
            letter-spacing: -0.01em;
        }
        .leaderboard-heading .muted {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
            margin-left: 0.5rem;
        }

        /* Clickable in-detail interactions */
        .clickable {
            cursor: pointer;
            transition: color 0.15s, background 0.15s;
        }
        .clickable:hover { color: var(--accent); }
        .player-card .bucket-badge.clickable:hover,
        td.player .bucket-badge.clickable:hover { filter: brightness(0.92); }

        .player-meta .season-pill {
            cursor: pointer;
            font-weight: 600;
            color: inherit;
            transition: color 0.15s;
        }
        .player-meta .season-pill:hover { color: var(--accent); }

        .score-tile.clickable:hover { box-shadow: 0 0 0 2px var(--accent); }
        .metric-cell .v.clickable { text-decoration: underline dotted var(--text-secondary); text-underline-offset: 3px; }
        .metric-cell .v.clickable:hover { color: var(--accent); text-decoration-color: var(--accent); }

        /* Shooting sub-tables */
        .shot-block { margin-bottom: 1rem; }
        .shot-block:last-child { margin-bottom: 0; }
        .shot-block h4 {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .shot-table {
            display: grid;
            gap: 4px;
        }
        .shot-table.cols-5 { grid-template-columns: 78px repeat(5, minmax(0, 1fr)); }
        .shot-table.cols-3 { grid-template-columns: 78px repeat(3, minmax(0, 1fr)); }
        .shot-table.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
        .shot-cell {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.45rem 0.4rem;
            text-align: center;
            min-height: 56px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.1rem;
            background: var(--surface);
        }
        .shot-cell .pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
        }
        .shot-cell .ratio,
        .shot-cell .pctile {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            color: var(--text-secondary);
            line-height: 1.1;
        }
        .shot-cell.empty { background: transparent; border-style: dashed; opacity: 0.5; }
        .shot-cell.empty .pct { color: var(--text-secondary); font-weight: 400; }
        .shot-row-label {
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding-right: 0.4rem;
        }
        .shot-col-headers {
            display: grid;
            gap: 4px;
            margin-bottom: 4px;
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .shot-col-headers.cols-5 { grid-template-columns: 78px repeat(5, minmax(0, 1fr)); }
        .shot-col-headers.cols-3 { grid-template-columns: 78px repeat(3, minmax(0, 1fr)); }
        .shot-col-headers > span { text-align: center; }
        .shot-col-headers > span:first-child { text-align: left; }
        .shot-twocell-label {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            font-weight: 600;
            text-align: center;
            margin-bottom: 0.2rem;
        }
        .shot-twocell-cell { display: flex; flex-direction: column; }

        /* Doppelgängers */
        .dopp-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
        }
        .dopp-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.625rem 0.6rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .dopp-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px var(--accent-dim); }
        .dopp-card .name { font-weight: 600; font-size: 0.8125rem; line-height: 1.2; }
        .dopp-card .meta { font-size: 0.6875rem; color: var(--text-secondary); }
        .dopp-card .dist {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }
        .dopp-card .bucket-badge { margin: 0.2rem auto 0; }

        @media (max-width: 768px) {
            .container { padding: 1rem 0.875rem 3rem; }
            h1 { font-size: 1.25rem; }
            .subtitle { font-size: 0.8125rem; margin-bottom: 1rem; }

            .filter-row {
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
            }
            .filter-row .filter-group:first-child { grid-column: 1 / -1; }
            .filter-row .filter-group:nth-child(4) { grid-column: 1 / -1; }

            .table-wrap { display: none; }
            .cards { display: block; }

            .detail-panel { grid-template-columns: 1fr; gap: 0.875rem; padding: 0.875rem; }
            .scores-summary { grid-template-columns: repeat(2, 1fr); }
            .metric-grid { grid-template-columns: 1fr; }

            .shot-table.cols-5,
            .shot-col-headers.cols-5 { grid-template-columns: 60px repeat(5, minmax(0, 1fr)); }
            .shot-table.cols-3,
            .shot-col-headers.cols-3 { grid-template-columns: 60px repeat(3, minmax(0, 1fr)); }
            .shot-cell { min-height: 50px; padding: 0.35rem 0.25rem; }
            .shot-cell .pct { font-size: 0.875rem; }
            .shot-row-label { font-size: 0.6875rem; padding-right: 0.25rem; }

            .dopp-grid { grid-template-columns: 1fr; }
        }

<body>

                    </div>

                <div class="filter-group">
                    <label for="bucket">Position</label>

                        <option value="Wingspan (in)">Wingspan</option>
                        <option value="Standing reach (in)">Standing Reach</option>

                        <option value="Max Vertical Leap (in)">Max Vertical</option>
                        <option value="Standing Vertical Leap (in)">Standing Vertical</option>
