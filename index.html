        // Continuous percentile gradient. Centered at 50%ile (faint), saturating
        // at the extremes. Applied as inline background-color so it composes
        // cleanly with whatever class-based styling the cell already has.
        function heatStyle(pct) {
            if (pct == null || isNaN(pct)) return '';
            const t = (pct - 50) / 50;             // -1 to +1
            const alpha = 0.05 + Math.abs(t) * 0.30; // 5% near midpoint, 35% at extremes
            const rgb = t >= 0 ? '52, 199, 89' : '239, 68, 68';
            return `background-color: rgba(${rgb}, ${alpha});`;
        }

        function applyHeat(el, pct) {
            if (pct == null || isNaN(pct)) return;
            const t = (pct - 50) / 50;
            const alpha = 0.05 + Math.abs(t) * 0.30;
            const rgb = t >= 0 ? '52, 199, 89' : '239, 68, 68';
            el.style.backgroundColor = `rgba(${rgb}, ${alpha})`;
        }

        function fmtMetric(player, key) {
            const m = player.metrics[key];
            if (!m || m.raw == null) return null;
            const dispKey = METRIC_DISPLAY_KEYS[key];
            if (dispKey && player.display && player.display[dispKey]) {
                return trimInchZeros(player.display[dispKey]);
            }
            const unit = METRIC_UNITS[key] || '';
            const v = typeof m.raw === 'number' ? m.raw : Number(m.raw);
            const isInch = key.endsWith('(in)') || key === 'hand_area';
            // Inch metrics format at 2 decimals so quarter-inches (8.75, 9.25)
            // survive the round-trip; the trim below drops trailing zeros.
            const decimals = (key === 'wingspan_to_height' || key === 'reach_to_height') ? 3 :
                            isInch ? 2 :
                            Number.isInteger(v) || /reps|lbs/i.test(unit) ? 0 :
                            (key.includes('Sprint') || key.includes('Agility')) ? 2 :
                            (key === 'Body Fat %') ? 1 : 1;
            const out = v.toFixed(decimals) + unit;
            // Inch-quantified metrics drop trailing zeros from the decimal so
            // values render as 6' 7'' / 7' 0.5'' instead of 6' 7.00'' / 7' 0.50''.
            // Ratios, sprints, weights, etc. keep their fixed precision.
            if (isInch) {
                return trimInchZeros(out);
            }
            return out;
        }

        // Strip trailing zeros from any "N.dddd" decimal in s, and drop a
        // bare trailing decimal point. "6' 7.00''" -> "6' 7''", "6' 7.50''" ->
        // "6' 7.5''", "6' 7.25''" unchanged.
        function trimInchZeros(s) {
            return String(s).replace(/(\d+)\.(\d+)/g, (_m, intPart, frac) => {
                const trimmed = frac.replace(/0+$/, '');
                return trimmed ? `${intPart}.${trimmed}` : intPart;
            });
        }

        function getSortValue(player, key) {
            if (['overall','anthro','athletic','shooting'].includes(key)) {
                return player.scores[key];
            }
            if (key === 'workouts') {
                return player.workouts ? player.workouts.length : null;
            }
            const m = player.metrics[key];
            if (!m || m.raw == null) return null;
            return typeof m.raw === 'number' ? m.raw : Number(m.raw);
        }

        function getSortPct(player, key) {
            if (['overall','anthro','athletic','shooting'].includes(key)) {
                return player.scores[key];
            }
            return player.metrics[key]?.pct ?? null;
        }

        function init(data) {
            state.data = data;

            // Backfill player_slug on the client if the JSON predates the
            // multi-combine schema change. Collision disambiguation is
            // skipped here (workflow-side does it properly); duplicates
            // just share the bare slug — the toggle would still show both
            // entries but mark them all as the same human, which is fine
            // for older datasets where no real collisions existed.
            const needsBackfill = data.players.length && !data.players[0].player_slug;
            if (needsBackfill) {
                for (const p of data.players) {
                    if (!p.player_slug) p.player_slug = slugifyName(p.player);
                }
            }
            const [smin, smax] = data.season_range;
            // Default view: most recent season only
            state.filters.seasonMin = smax;
            state.filters.seasonMax = smax;

            const seasonMinSel = document.getElementById('seasonMin');
            const seasonMaxSel = document.getElementById('seasonMax');
            for (let y = smax; y >= smin; y--) {
                seasonMinSel.appendChild(new Option(y, y));
                seasonMaxSel.appendChild(new Option(y, y));
            }
            seasonMinSel.value = smax;
            seasonMaxSel.value = smax;

            const subtitle = document.getElementById('subtitle');
            const total = data.rows.toLocaleString();
            subtitle.textContent = `${total} prospects, ${smin}–${smax}, scored against their position cohort`;

            renderHeader();
            attachEvents();
            attachBackToSelectedScroll();
            attachPlayerViewEvents();
            attachSortPickerEvents();

            // The loading placeholder shown by loadData() is hidden by the
            // empty-state renderer once render() runs (or replaced if the
            // result set is empty).
            document.getElementById('emptyState').style.display = 'none';

            // First-render router: pick view based on URL.
            routeFromUrl({ fromInit: true });

            // Browser back/forward: re-route from URL.
            window.addEventListener('popstate', () => {
                routeFromUrl({ fromPopstate: true });
            });

            const ts = new Date(data.generated_at);
            const footer = document.getElementById('footer');
            footer.innerHTML =
                `<div class="footer-counts">Guards ${data.buckets.Guards} · Wings ${data.buckets.Wings} · Bigs ${data.buckets.Bigs}</div>` +
                `<div class="footer-stamp">Data generated ${ts.toISOString().slice(0,10)}</div>`;
        }

        // Returns true if higher raw value = better player for the given sort
        // key. Score keys are always higher-is-better; metric keys consult
        // metrics_meta (which covers ratios too).
        function isHigherBetter(key) {
            if (['overall','anthro','athletic','shooting'].includes(key)) return true;
            // More workouts = better (player attracted more interest).
            if (key === 'workouts') return true;
            const meta = state.data && state.data.metrics_meta && state.data.metrics_meta[key];
            return meta ? meta.higher_is_better !== false : true;
        }

        // Pretty label used in subtitle / tooltips
        function sortKeyLabel(key) {
            if (key === 'workouts') return 'Workouts';
            if (SCORE_LABELS[key]) return SCORE_LABELS[key];
            return METRIC_LABELS_WITH_UNITS[key] || METRIC_LABELS[key] || key;
        }

        function renderHeader() {
            const tr = document.getElementById('headerRow');
            tr.innerHTML = '';
            const tagColKeys = activeTagColumnKeys();
            getEffectiveColumns().forEach(h => {
                const th = document.createElement('th');
                if (h.cls) th.className = h.cls;
                th.textContent = h.label;
                if (h.sortable) {
                    th.dataset.sortKey = h.key;
                    th.title = `Click to sort by ${sortKeyLabel(h.key)}`;
                    if (h.key === state.sort.key) {
                        th.classList.add('active');
                        th.classList.add('sorted-by');
                        const arrow = document.createElement('span');
                        arrow.className = 'sort-arrow';
                        arrow.textContent = state.sort.dir === 'best' ? '▼' : '▲';
                        th.appendChild(arrow);
                    }
                    // Tag-driven column gets a soft category-colored top
                    // border so the user sees which column the active tag
                    // filter is keyed off of.
                    if (tagColKeys.has(h.key)) {
                        const cat = tagColumnCategory(h.key);
                        if (cat) th.classList.add(`tag-col-${cat}`);
                    }
                    th.addEventListener('click', () => {
                        if (state.sort.key === h.key) {
                            state.sort.dir = state.sort.dir === 'best' ? 'worst' : 'best';
                        } else {
                            state.sort.key = h.key;
                            state.sort.dir = 'best';
                        }
                        document.getElementById('sort').value = h.key;
                        renderHeader();
                        applyFilters();
                    });
                }
                tr.appendChild(th);
            });

        function attachEvents() {
            const searchEl = document.getElementById('search');
            const searchClear = document.getElementById('searchClear');
            searchEl.addEventListener('input', e => {
                const raw = e.target.value;
                state.filters.search = raw.trim().toLowerCase();
                searchClear.hidden = raw.length === 0;
                hideSearchNote();
                applyFilters();
                renderSuggestions(raw.trim());
            });
            searchClear.addEventListener('click', () => {
                searchEl.value = '';
                state.filters.search = '';
                searchClear.hidden = true;
                hideSearchNote();
                hideSuggestions();
                // Clear ?player= and ?search= (the latter we don't actually
                // emit, but strip defensively in case future code adds it).
                const url = new URL(window.location.href);
                url.searchParams.delete('player');
                url.searchParams.delete('search');
                history.replaceState({}, '', url.pathname + (url.searchParams.toString() ? '?' + url.searchParams.toString() : ''));
                state.selected = null;
                applyFilters();
                searchEl.focus();
            });
            searchEl.addEventListener('keydown', e => {
                const box = document.getElementById('searchSuggestions');
                if (e.key === 'Escape') {
                    hideSuggestions();
                    hideSearchNote();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (!box.hidden) {
                        const active = box.querySelector('.suggestion.active') || box.querySelector('.suggestion');
                        if (active && active.dataset.pid) {
                            selectSuggestionByPid(active.dataset.pid);
                            return;
                        }
                    }
                    handleSearchEnter();
                } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                    if (box.hidden) return;
                    e.preventDefault();
                    const items = [...box.querySelectorAll('.suggestion')];
                    if (!items.length) return;
                    let idx = items.findIndex(i => i.classList.contains('active'));
                    items.forEach(i => i.classList.remove('active'));
                    idx = e.key === 'ArrowDown'
                        ? (idx + 1) % items.length
                        : (idx <= 0 ? items.length - 1 : idx - 1);
                    items[idx].classList.add('active');
                    items[idx].scrollIntoView({ block: 'nearest' });
                }
            });
            searchEl.addEventListener('focus', () => {
                if (searchEl.value.trim().length >= 2) renderSuggestions(searchEl.value.trim());
            });
            document.addEventListener('click', e => {
                if (!e.target.closest('.search-wrapper')) hideSuggestions();

            document.getElementById('bucket').addEventListener('change', e => {
                state.filters.bucket = e.target.value;

                syncUrl();

                    document.getElementById('seasonMax').value = String(v);

                applyFilters();
                syncUrl();

                const v = parseInt(e.target.value, 10);
                state.filters.seasonMax = v;

                    document.getElementById('seasonMin').value = String(v);

                applyFilters();
                syncUrl();
            });
            document.getElementById('sort').addEventListener('change', e => {
                state.sort.key = e.target.value;
                state.sort.dir = 'best';
                renderHeader();
                applyFilters();

            document.getElementById('advClear').addEventListener('click', clearMultiFilters);
            document.getElementById('resetAll').addEventListener('click', resetAll);

            // Mobile filter toggle. Default-collapsed; clicking flips both
            // aria-expanded and the [data-collapsed] attribute that the CSS

                const btn = document.getElementById('filtersToggle');

        // ---- Mobile sort picker (bottom sheet) ----------------------------
        // Reads its option list from the existing #sort dropdown so the two
        // controls stay in lockstep without duplicating the metric list.
        function openSortPicker() {
            const picker = document.getElementById('sortPicker');
            const list = document.getElementById('sortPickerList');
            list.innerHTML = '';
            const sortSel = document.getElementById('sort');
            const opts = [...sortSel.options];
            opts.forEach(opt => {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = 'sort-picker-item' + (opt.value === state.sort.key ? ' active' : '');
                item.dataset.sortKey = opt.value;
                const label = document.createElement('span');
                label.textContent = opt.textContent;
                const meta = document.createElement('span');
                meta.className = 'item-meta';
                if (opt.value === state.sort.key) {
                    meta.textContent = state.sort.dir === 'best' ? '▼ best first' : '▲ worst first';
                }
                item.appendChild(label);
                item.appendChild(meta);
                item.addEventListener('click', () => {
                    state.sort.key = opt.value;
                    state.sort.dir = 'best';
                    sortSel.value = opt.value;
                    renderHeader();
                    applyFilters();
                    closeSortPicker();
                });
                list.appendChild(item);
            });

            // attribute would conflict with the .sort-picker.open display:flex
            // rule and was leaving the picker as a transparent full-page

        function attachSortPickerEvents() {
            const picker = document.getElementById('sortPicker');

        // Build the summary text shown next to "Filters" on the mobile toggle.
        // "Filters · 79 players shown · Sorted by Combine Rating, best first"
        function updateFiltersToggleSummary() {
            const el = document.getElementById('filtersSummary');
            if (!el) return;
            const total = state.data ? state.data.rows : 0;
            const shown = state.filtered.length;
            const hasFilter = isAnyFilterActive();
            const countText = hasFilter
                ? `${shown.toLocaleString()} of ${total.toLocaleString()}`
                : `${shown.toLocaleString()}`;
            const sortLabel = sortKeyLabel(state.sort.key);
            const sortDirText = state.sort.dir === 'best' ? 'best first' : 'worst first';
            el.textContent = `· ${countText} · ${sortLabel}, ${sortDirText}`;
        }

        function renderSuggestions(query) {
            const box = document.getElementById('searchSuggestions');
            const search = document.getElementById('search');
            if (!query || query.length < 2) return hideSuggestions();
            const ql = query.toLowerCase();
            const all = state.data.players;
            const prefix = [], substring = [];
            for (const p of all) {
                const name = p.player.toLowerCase();
                if (name.startsWith(ql)) prefix.push(p);
                else if (name.includes(ql)) substring.push(p);
                if (prefix.length >= 8) break;
            }
            const merged = prefix.concat(substring).slice(0, 8);
            if (!merged.length) return hideSuggestions();

            box.innerHTML = '';
            merged.forEach((p, idx) => {
                const item = document.createElement('div');
                item.className = 'suggestion' + (idx === 0 ? ' active' : '');
                item.dataset.pid = playerId(p);
                item.setAttribute('role', 'option');
                const name = document.createElement('span');
                name.className = 'name';
                name.textContent = p.player;
                const meta = document.createElement('span');
                meta.className = 'meta';
                const yr = document.createElement('span');
                yr.textContent = p.season;
                const badge = document.createElement('span');
                badge.className = 'bucket-badge';
                badge.textContent = p.bucket;
                meta.appendChild(yr);
                meta.appendChild(badge);
                item.appendChild(name);
                item.appendChild(meta);
                // Use mousedown so we beat the input's blur handler.
                item.addEventListener('mousedown', e => {
                    e.preventDefault();
                    selectSuggestionByPid(item.dataset.pid);
                });
                box.appendChild(item);
            });
            box.hidden = false;
            search.setAttribute('aria-expanded', 'true');
        }

        function hideSuggestions() {
            const box = document.getElementById('searchSuggestions');
            box.hidden = true;
            box.innerHTML = '';
            document.getElementById('search').setAttribute('aria-expanded', 'false');
        }

        function selectSuggestionByPid(pid) {
            const sep = pid.lastIndexOf('|');
            const name = pid.slice(0, sep);
            const season = parseInt(pid.slice(sep + 1), 10);
            const target = state.data.players.find(p => p.player === name && p.season === season);
            if (!target) return;
            // v6: dashboard suggestion picks navigate to the dedicated player view.
            hideSuggestions();
            navigateToPlayer(target);
        }

        // Centralized "navigate to a player" routine. Broadens the season range
        // only when needed, never shrinks. Optional fromSearch flag installs
        // the player's name into the search box. fromComp pushes the current
        // selection onto the back-stack; keepHistory leaves the stack alone
        // (used by the back-link itself).
        function jumpToTarget(target, { fromSearch = false, fromComp = false, keepHistory = false } = {}) {
            const searchEl = document.getElementById('search');
            const searchClear = document.getElementById('searchClear');
            if (fromSearch) {
                searchEl.value = target.player;
                state.filters.search = target.player.toLowerCase();
                searchClear.hidden = false;
            }

            // Range expansion (never shrink). Note whether we changed it so
            // we can surface a toast.
            const oldMin = state.filters.seasonMin;
            const oldMax = state.filters.seasonMax;
            let expanded = false;
            if (state.filters.seasonMin > target.season) {
                state.filters.seasonMin = target.season;
                document.getElementById('seasonMin').value = String(target.season);
                expanded = true;
            }
            if (state.filters.seasonMax < target.season) {
                state.filters.seasonMax = target.season;
                document.getElementById('seasonMax').value = String(target.season);
                expanded = true;
            }
            if (state.filters.bucket && state.filters.bucket !== target.bucket) {
                state.filters.bucket = '';
                document.getElementById('bucket').value = '';
            }
            state.filters.similarity = null;

            // Comp clicks are an explicit "navigate to lineage" action. They
            // must always reveal the comp, so clear search and advanced
            // filters too if those would still hide the player. Toast when
            // multi-filters were dropped so the user knows what changed.
            let multiCleared = false;
            if (fromComp) {
                if (!passesSearch(target, state.filters)) {
                    state.filters.search = '';
                    if (searchEl) searchEl.value = '';
                    if (searchClear) searchClear.hidden = true;
                    hideSuggestions();
                }
                if (!passesMulti(target, state.filters)) {
                    state.filters.multi = [];
                    renderMultiFilters();
                    multiCleared = true;
                }
            }

            // Selection history bookkeeping. Comp clicks push the current
            // selection so the user can step back; manual navigation
            // (search, suggestion) clears it. Back-link sets keepHistory.
            const newPid = playerId(target);
            if (fromComp) {
                if (state.selected && state.selected !== newPid) {
                    state.selectionHistory.push(state.selected);
                    if (state.selectionHistory.length > 5) state.selectionHistory.shift();
                }
            } else if (!keepHistory) {
                state.selectionHistory = [];
            }
            state.selected = newPid;

            hideSuggestions();
            hideSearchNote();
            applyFilters();
            syncUrl({ player: target.player_slug, pushExpand: true });
            updateBackToSelectedButton();

            if (expanded) {
                showToast(`Season range expanded to include ${target.player}.`, 4000);
            }
            if (multiCleared) {
                showToast(`Cleared filters to show ${target.player}.`, 4000);
            }

            requestAnimationFrame(() => {
                const pid = cssEscape(newPid);
                const row = document.querySelector(`tr[data-pid="${pid}"]`) ||
                            document.querySelector(`.player-card[data-pid="${pid}"]`);
                if (row) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    row.classList.remove('flash');
                    // Force reflow so the animation re-triggers when re-applied
                    void row.offsetWidth;
                    row.classList.add('flash');
                    setTimeout(() => row.classList.remove('flash'), 1300);
                }
            });
        }

        // Enter pressed in search with no autocomplete selected.
        function handleSearchEnter() {
            const q = state.filters.search;
            if (!q) return;
            // Players matching this search within the current filter set
            const inFilter = state.filtered.filter(p => p.player.toLowerCase().includes(q));
            if (inFilter.length === 1) {
                // v6: navigate to player view rather than expanding inline.
                hideSuggestions();
                navigateToPlayer(inFilter[0]);
                return;
            }
            if (inFilter.length > 1) {
                hideSearchNote();
                return;
            }
            // Zero in current filters — does the dataset have any match?
            const anywhere = state.data.players.find(p => p.player.toLowerCase().includes(q));
            if (anywhere) {
                showSearchNote('Match exists outside current filters.', 'Expand search', () => {
                    // Drop the position and season-range narrowing only.
                    const [smin, smax] = state.data.season_range;
                    state.filters.bucket = '';
                    document.getElementById('bucket').value = '';
                    state.filters.seasonMin = smin;
                    state.filters.seasonMax = smax;
                    document.getElementById('seasonMin').value = String(smin);
                    document.getElementById('seasonMax').value = String(smax);
                    hideSearchNote();
                    applyFilters();
                    syncUrl();
                });
            }
            // If no match anywhere, the empty-state card already covers it.
        }

        function showSearchNote(text, actionLabel, actionFn) {
            const note = document.getElementById('searchNote');
            note.innerHTML = '';
            const span = document.createElement('span');
            span.textContent = text;
            note.appendChild(span);
            if (actionLabel && actionFn) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = actionLabel;
                btn.addEventListener('click', actionFn);
                note.appendChild(btn);
            }
            note.hidden = false;
        }
        function hideSearchNote() {
            const note = document.getElementById('searchNote');
            note.hidden = true;
            note.innerHTML = '';
        }

        // ---- Selection-related UI helpers --------------------------------
        function selectedPlayer() {
            if (!state.selected) return null;
            const sep = state.selected.lastIndexOf('|');
            const name = state.selected.slice(0, sep);
            const season = parseInt(state.selected.slice(sep + 1), 10);
            return state.data.players.find(p => p.player === name && p.season === season) || null;
        }

        function selectedRowEl() {
            if (!state.selected) return null;
            const pid = cssEscape(state.selected);
            return document.querySelector(`tr[data-pid="${pid}"]`) ||
                   document.querySelector(`.player-card[data-pid="${pid}"]`);
        }

        // Floating button is visible when a player is selected AND their row
        // is currently outside the viewport.
        let _backBtnTick = 0;
        function updateBackToSelectedButton() {
            const btn = document.getElementById('backToSelected');
            if (!btn) return;
            if (!state.selected) {
                btn.hidden = true;
                btn.classList.remove('visible');
                return;
            }
            const target = selectedPlayer();
            if (!target) {
                btn.hidden = true;
                btn.classList.remove('visible');
                return;
            }
            const row = selectedRowEl();
            if (!row) {
                btn.hidden = true;
                btn.classList.remove('visible');
                return;
            }
            const rect = row.getBoundingClientRect();
            const inView = rect.bottom > 0 && rect.top < window.innerHeight;
            // Truncate long names so the button stays compact
            const name = target.player.length > 26
                ? target.player.replace(/^(.).+ (.+)$/, '$1. $2')
                : target.player;
            btn.textContent = `← ${name}`;
            btn.title = `Scroll to ${target.player} ${target.season}`;
            if (!inView) {
                btn.hidden = false;
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
                // Keep `hidden` false during fade-out so the transition runs
                setTimeout(() => {
                    if (!btn.classList.contains('visible')) btn.hidden = true;
                }, 200);
            }
        }

        function attachBackToSelectedScroll() {
            const onScroll = () => {
                if (_backBtnTick) return;
                _backBtnTick = setTimeout(() => {
                    _backBtnTick = 0;
                    updateBackToSelectedButton();
                }, 100);
            };
            window.addEventListener('scroll', onScroll, { passive: true });
            window.addEventListener('resize', onScroll, { passive: true });
            const btn = document.getElementById('backToSelected');
            if (btn) {
                btn.addEventListener('click', () => {
                    const row = selectedRowEl();
                    if (!row) return;
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    row.classList.remove('flash');
                    void row.offsetWidth;
                    row.classList.add('flash');
                    setTimeout(() => row.classList.remove('flash'), 1300);
                });
            }
        }

        // ---- Hidden-by-filters banner ------------------------------------
        function renderSelectionBanner() {
            const banner = document.getElementById('selectionHiddenBanner');
            if (!banner) return;
            const hidden = findHiddenSelectedPlayer();
            if (!hidden) {
                banner.hidden = true;
                banner.innerHTML = '';
                return;
            }
            banner.innerHTML = '';
            const msg = document.createElement('div');
            msg.className = 'msg';
            msg.textContent = `${hidden.player} is hidden by the current filters.`;
            const actions = document.createElement('div');
            actions.className = 'actions';

            const showAnyway = document.createElement('button');
            showAnyway.type = 'button';
            showAnyway.textContent = 'Show selected player anyway';
            showAnyway.addEventListener('click', () => {
                // Broaden position + season range only. Search and advanced
                // multi-filters are intentional user input; leave them alone.
                if (state.filters.bucket && state.filters.bucket !== hidden.bucket) {
                    state.filters.bucket = '';
                    document.getElementById('bucket').value = '';
                }
                if (state.filters.seasonMin > hidden.season) {
                    state.filters.seasonMin = hidden.season;
                    document.getElementById('seasonMin').value = String(hidden.season);
                }
                if (state.filters.seasonMax < hidden.season) {
                    state.filters.seasonMax = hidden.season;
                    document.getElementById('seasonMax').value = String(hidden.season);
                }
                applyFilters();
                syncUrl();
            });

            const clearF = document.createElement('button');
            clearF.type = 'button';
            clearF.textContent = 'Clear filters';
            clearF.addEventListener('click', () => clearAllFiltersExceptSearch());

            const closeBtn = document.createElement('button');
            closeBtn.type = 'button';
            closeBtn.className = 'close-btn';
            closeBtn.textContent = 'Close';
            closeBtn.title = 'Deselect player';
            closeBtn.addEventListener('click', () => {
                state.selected = null;
                state.selectionHistory = [];
                applyFilters();
                syncUrl();
                updateBackToSelectedButton();
            });

            actions.appendChild(showAnyway);
            actions.appendChild(clearF);
            actions.appendChild(closeBtn);

            const top = document.createElement('div');
            top.className = 'banner-top';
            top.appendChild(msg);
            top.appendChild(actions);
            banner.appendChild(top);

            // The selected player isn't in the table. Render the full detail
            // panel inside the banner so the user can still read the data.
            // Same structure as the inline panel — including the close × in
            // its header (which closes the selection entirely).
            const detailWrap = document.createElement('div');
            detailWrap.className = 'banner-detail';
            detailWrap.appendChild(buildDetailContent(hidden));
            banner.appendChild(detailWrap);

            banner.hidden = false;
        }

        function hideSelectionBanner() {
            const banner = document.getElementById('selectionHiddenBanner');
            if (banner) { banner.hidden = true; banner.innerHTML = ''; }
        }

        function showToast(message, ms = 3000) {
            const stack = document.getElementById('toastStack');
            if (!stack) return;
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = message;
            stack.appendChild(t);
            // Force reflow then animate in
            void t.offsetWidth;
            t.classList.add('in');
            setTimeout(() => {
                t.classList.remove('in');
                setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 220);
            }, ms);
        }

        // Is any filter narrower than the default view?
        function isAnyFilterActive() {
            const f = state.filters;
            const [smin, smax] = state.data.season_range;
            const seasonsAreDefault = f.seasonMin === smax && f.seasonMax === smax;
            return Boolean(
                f.search || f.bucket || f.similarity ||
                (f.multi && f.multi.length) ||
                (f.tags && f.tags.length) ||
                (f.workoutTeams && f.workoutTeams.length) ||
                !seasonsAreDefault
            );
        }

        // Are filters at the dataset-wide defaults? Used by URL hygiene.
        function isAtDefaultState() {
            const f = state.filters;
            const [smin, smax] = state.data.season_range;
            return !f.search && !f.bucket && !f.similarity &&
                (!f.multi || f.multi.length === 0) &&
                (!f.tags || f.tags.length === 0) &&
                (!f.workoutTeams || f.workoutTeams.length === 0) &&
                f.seasonMin === smax && f.seasonMax === smax &&
                state.selected == null;
        }

        // A multi-filter row applies to the table only when both metric is
        // chosen and value is a finite number. Incomplete rows live in state
        // (so the user can keep filling them in) but are skipped everywhere.
        function isCompleteFilter(f) {
            if (!f || !f.metric) return false;
            if (f.value === '' || f.value == null) return false;
            const num = Number(f.value);
            return Number.isFinite(num);
        }

        // Single-filter predicates — used by both applyFilters() and the
        // comp-click reveal logic that needs to know which specific filters
        // would exclude a player.
        function passesBucket(p, f)   { return !f.bucket || p.bucket === f.bucket; }
        function passesSeasons(p, f) {
            if (f.seasonMin != null && p.season < f.seasonMin) return false;
            if (f.seasonMax != null && p.season > f.seasonMax) return false;
            return true;
        }
        function passesSearch(p, f) {
            return !f.search || p.player.toLowerCase().includes(f.search);
        }
        function passesSimilarity(p, f) {
            if (!f.similarity) return true;
            if (f.similarity.key.startsWith('score:')) {
                const sk = f.similarity.key.slice(6);
                const sv = p.scores[sk];
                if (sv == null) return false;
                return sv >= f.similarity.min && sv <= f.similarity.max;
            }
            const m = p.metrics[f.similarity.key];
            if (!m || m.raw == null) return false;
            const v = typeof m.raw === 'number' ? m.raw : Number(m.raw);
            return v >= f.similarity.min && v <= f.similarity.max;
        }
        function passesMulti(p, f) {
            for (const mf of f.multi) {
                if (!isCompleteFilter(mf)) continue;
                const m = p.metrics[mf.metric];
                if (!m || m.raw == null) return false;
                const v = typeof m.raw === 'number' ? m.raw : Number(m.raw);
                const fv = Number(mf.value);
                if (mf.op === 'gte' && !(v >= fv)) return false;
                if (mf.op === 'lte' && !(v <= fv)) return false;
                if (mf.op === 'eq'  && !(v === fv)) return false;
            }
            return true;
        }
        function passesTags(p, f) {
            if (!f.tags || !f.tags.length) return true;
            const tags = p.profile_tags || [];
            // AND composition — player must hold every active tag filter.
            for (const slug of f.tags) {
                if (!tags.includes(slug)) return false;
            }
            return true;
        }
        function passesWorkoutTeams(p, f) {
            if (!f.workoutTeams || !f.workoutTeams.length) return true;
            const w = p.workouts || [];
            // AND composition — player must have worked out with every
            // listed team.
            for (const team of f.workoutTeams) {
                if (!w.includes(team)) return false;
            }
            return true;
        }
        function passesAllFilters(p, f) {
            return passesBucket(p, f) && passesSeasons(p, f) && passesSearch(p, f)
                && passesSimilarity(p, f) && passesMulti(p, f) && passesTags(p, f)
                && passesWorkoutTeams(p, f);
        }

        function applyFilters() {
            const f = state.filters;
            const players = state.data.players.filter(p => passesAllFilters(p, f));

            const { key, dir } = state.sort;
            // dir is 'best' | 'worst'. Map to numeric direction based on
            // whether higher raw value = better player for this metric.
            const numericDesc = dir === 'best' ? isHigherBetter(key) : !isHigherBetter(key);
            const mult = numericDesc ? -1 : 1;
            players.sort((a, b) => {
                const va = getSortValue(a, key);
                const vb = getSortValue(b, key);
                const aNull = va == null, bNull = vb == null;
                if (aNull && bNull) return 0;
                if (aNull) return 1;
                if (bNull) return -1;
                return (va - vb) * mult;
            });

            state.filtered = players;

            const summary = document.getElementById('filterSummary');
            const total = state.data.rows;
            const shown = players.length;
            const hasFilter = isAnyFilterActive();
            summary.innerHTML = hasFilter
                ? `<strong>${shown.toLocaleString()}</strong> of ${total.toLocaleString()} players shown`
                : `<strong>${shown.toLocaleString()}</strong> players shown`;

            renderChips();
            renderHeading();
            // Header may need rebuilding because the active sort key or tag
            // filters affect column order (v8 + v10 dynamic columns).
            renderHeader();
            updateFiltersToggleSummary();
            render();
        }

        function renderChips() {
            const wrap = document.getElementById('chips');
            wrap.innerHTML = '';
            const sim = state.filters.similarity;
            if (sim) {
                const chip = document.createElement('span');
                chip.className = 'chip';
                const label = document.createElement('span');
                if (sim.key.startsWith('score:')) {
                    const sk = sim.key.slice(6);
                    label.textContent = `${SCORE_LABELS[sk] || sk} ≈ ${sim.center} (±${sim.tol})`;
                } else {
                    label.textContent = `${METRIC_LABELS[sim.key] || sim.key} ≈ ${sim.center}`;
                }
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.setAttribute('aria-label', 'Clear similarity filter');
                btn.textContent = '×';
                btn.addEventListener('click', () => {
                    state.filters.similarity = null;
                    applyFilters();
                });
                chip.appendChild(label);
                chip.appendChild(btn);
                wrap.appendChild(chip);
            }

            // Multi-filter chips: one per *complete* row. Incomplete rows
            // (still being constructed) don't surface as chips.
            state.filters.multi.forEach((f, idx) => {
                if (!isCompleteFilter(f)) return;
                const chip = document.createElement('span');
                chip.className = 'chip chip-multi';
                chip.dataset.rowidx = String(idx);
                const numVal = Number(f.value);
                const valStr = (f.metric === 'wingspan_to_height' || f.metric === 'reach_to_height')
                    ? numVal.toFixed(3)
                    : (f.metric === 'hand_area') ? numVal.toFixed(2)
                    : String(numVal);
                const label = document.createElement('button');
                label.type = 'button';
                label.className = 'chip-label';
                label.textContent = `${METRIC_LABELS[f.metric] || f.metric} ${OPERATOR_LABEL[f.op]} ${valStr}`;
                label.title = 'Open in advanced filters';
                label.addEventListener('click', () => focusAdvRow(idx));
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'chip-x';
                btn.setAttribute('aria-label', 'Remove this filter');
                btn.textContent = '×';
                btn.addEventListener('click', () => {
                    state.filters.multi.splice(idx, 1);
                    renderMultiFilters();
                    onMultiFilterChange();
                });
                chip.appendChild(label);
                chip.appendChild(btn);
                wrap.appendChild(chip);
            });

            // Tag filter chips — one per active slug, AND composition.
            (state.filters.tags || []).forEach(slug => {
                const meta = state.data && state.data.tag_meta && state.data.tag_meta[slug];
                if (!meta) return;
                const chip = document.createElement('span');
                chip.className = 'chip chip-tag';
                chip.dataset.tag = slug;
                const labelEl = document.createElement('span');
                labelEl.textContent = `Tag: ${meta.label}`;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'chip-x';
                btn.setAttribute('aria-label', `Remove tag filter ${meta.label}`);
                btn.textContent = '×';
                btn.addEventListener('click', () => {
                    state.filters.tags = state.filters.tags.filter(t => t !== slug);
                    applyFilters();
                    syncUrl();
                });
                chip.appendChild(labelEl);
                chip.appendChild(btn);
                wrap.appendChild(chip);
            });

            // Workout-team filter chips — body is non-interactive (no advanced
            // filter row to focus on), only × is wired.
            (state.filters.workoutTeams || []).forEach(team => {
                const chip = document.createElement('span');
                chip.className = 'chip chip-workout';
                chip.dataset.workoutTeam = team;
                const labelEl = document.createElement('span');
                labelEl.textContent = `Worked out with: ${team}`;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'chip-x';
                btn.setAttribute('aria-label', `Remove workout team filter ${team}`);
                btn.textContent = '×';
                btn.addEventListener('click', () => {
                    state.filters.workoutTeams = state.filters.workoutTeams.filter(t => t !== team);
                    applyFilters();
                    syncUrl();
                });
                chip.appendChild(labelEl);
                chip.appendChild(btn);
                wrap.appendChild(chip);
            });
        }

        // Open the advanced filter panel and visually focus the row at `idx`.
        function focusAdvRow(idx) {
            setAdvancedOpen(true);
            requestAnimationFrame(() => {
                const row = document.querySelector(`.adv-row[data-rowidx="${idx}"]`);
                if (!row) return;
                row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                row.classList.remove('row-focus');
                void row.offsetWidth;
                row.classList.add('row-focus');
                setTimeout(() => row.classList.remove('row-focus'), 1500);
                const sel = row.querySelector('.adv-metric');
                if (sel) sel.focus({ preventScroll: true });
            });
        }

        function renderHeading() {
            const heading = document.getElementById('leaderboardHeading');
            const f = state.filters;
            const sortLabel = sortKeyLabel(state.sort.key);
            const sortDirText = state.sort.dir === 'best' ? 'best first' : 'worst first';
            const sortSubtitle = `Sorted by ${sortLabel}, ${sortDirText}`;

            const isDefaultLike =
                !f.search && !f.bucket && !f.similarity &&
                f.seasonMin === f.seasonMax && f.seasonMin === state.data.season_range[1];
            if (isDefaultLike) {
                heading.style.display = '';
                heading.innerHTML = `Best of ${f.seasonMin} Combine ` +
                    `<span class="muted">— ${sortSubtitle}</span>`;
            } else if (f.seasonMin === f.seasonMax && f.seasonMin != null) {
                heading.style.display = '';
                heading.innerHTML = `${f.seasonMin} Combine ` +
                    `<span class="muted">— ${sortSubtitle}</span>`;
            } else {
                heading.style.display = '';
                heading.innerHTML = `<span class="muted">${sortSubtitle}</span>`;
            }
        }

        function render() {
            const tbody = document.getElementById('tbody');
            const cards = document.getElementById('cards');
            const empty = document.getElementById('emptyState');
            tbody.innerHTML = '';
            cards.innerHTML = '';

            if (state.filtered.length === 0) {
                renderEmptyState(empty);
                empty.style.display = '';
                return;
            }
            empty.style.display = 'none';

            // v6: dashboard view has no inline panels and no persistent
            // selection. Clicking a row navigates to the dedicated player
            // view (?player=…), so we always render rows in their default
            // collapsed state.
            const frag = document.createDocumentFragment();
            const cardFrag = document.createDocumentFragment();

            state.filtered.forEach((p, i) => {
                frag.appendChild(buildRow(p, i + 1, false));
                cardFrag.appendChild(buildCard(p, false, i + 1));
            });
            tbody.appendChild(frag);
            cards.appendChild(cardFrag);
        }

        function playerId(p) { return `${p.player}|${p.season}`; }

        // ---- URL routing ---------------------------------------------------
        // Two slug shapes coexist:
        //   - player_slug (canonical, stable per human, no year) — built in
        //     build_data.py and stored on each record. Multi-combine players
        //     share this. Disambiguated as `-2`, `-3` when two humans collide.
        //   - legacy `${base}-${season}` slug (`adem-bona-2024`) — what older
        //     URLs in the wild use; we redirect them to canonical in place.
        // Canonical URL: ?player=<player_slug>&season=<YYYY> (season optional;
        // omitted = most recent combine for that player).
        function slugifyName(name) {
            return String(name)
                .normalize('NFD').replace(/[̀-ͯ]/g, '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }
        // Legacy slug = name-slug + '-' + season. Used only for back-compat
        // URL parsing and as an internal stable key for history.state.prev;
        // new URLs never emit this form to the user.
        function slugify(name, season) {
            return `${slugifyName(name)}-${season}`;
        }
        const slugifyLegacy = slugify;

        // player_slug -> array of records, sorted by season descending
        // (most-recent-first so the default pick is the latest combine).
        function getPlayerSlugIndex() {
            if (state._playerSlugIndex) return state._playerSlugIndex;
            const idx = new Map();
            for (const p of state.data.players) {
                const key = p.player_slug;
                if (!key) continue;
                if (!idx.has(key)) idx.set(key, []);
                idx.get(key).push(p);
            }
            for (const arr of idx.values()) arr.sort((a, b) => b.season - a.season);
            state._playerSlugIndex = idx;
            return idx;
        }

        // Resolve a `?player=…&season=…` URL to a concrete player-season
        // record. Returns:
        //   { player, exactSeason, isLegacy, requestedSeason }
        // where exactSeason=false signals the season filter didn't match a
        // record (caller renders the most-recent fallback with a notice),
        // and isLegacy=true signals the caller should replaceState to the
        // canonical form.
        function resolvePlayerSlug(slug, season) {
            if (!slug) return { player: null, exactSeason: false, isLegacy: false, requestedSeason: season };
            const idx = getPlayerSlugIndex();

            // Canonical lookup: player_slug match.
            const matches = idx.get(slug);
            if (matches && matches.length) {
                if (season != null) {
                    const exact = matches.find(p => p.season === season);
                    if (exact) return { player: exact, exactSeason: true, isLegacy: false, requestedSeason: season };
                    return { player: matches[0], exactSeason: false, isLegacy: false, requestedSeason: season };
                }
                return { player: matches[0], exactSeason: true, isLegacy: false, requestedSeason: null };
            }

            // Legacy: slug ends in -YYYY. Only treat as legacy when no
            // explicit ?season= was given (the new format never combines
            // a season suffix in the slug with a season query param).
            if (season == null) {
                const m = slug.match(/^(.+)-((?:19|20)\d{2})$/);
                if (m) {
                    const baseSlug = m[1];
                    const yr = parseInt(m[2], 10);
                    const byBase = idx.get(baseSlug);
                    if (byBase) {
                        const exact = byBase.find(p => p.season === yr);
                        if (exact) return { player: exact, exactSeason: true, isLegacy: true, requestedSeason: yr };
                    }
                    // Fall back to legacy name-based slugify in case
                    // player_slug for that record was renumbered by
                    // collision disambiguation (e.g., tony-mitchell-2013 ->
                    // canonical is tony-mitchell-2 season 2013).
                    for (const p of state.data.players) {
                        if (slugifyLegacy(p.player, p.season) === slug) {
                            return { player: p, exactSeason: true, isLegacy: true, requestedSeason: p.season };
                        }
                    }
                }
            }

            return { player: null, exactSeason: false, isLegacy: false, requestedSeason: season };
        }

        // Back-compat shim — older call sites only need the player record.
        function findPlayerBySlug(slug) {
            const r = resolvePlayerSlug(slug, null);
            return r.player;
        }

        // Build the canonical ?player=…[&season=…] query string for a record.
        // When the player has multiple combines we always include the season
        // so the deep-link is precise; for single-combine humans we omit it.
        function playerQueryParams(p) {
            const params = new URLSearchParams();
            params.set('player', p.player_slug);
            const matches = getPlayerSlugIndex().get(p.player_slug) || [p];
            if (matches.length > 1) params.set('season', String(p.season));
            return params;
        }
        function playerUrl(p) {
            return '?' + playerQueryParams(p).toString();
        }

        // Push the current state into the URL. `pushExpand` true => pushState
        // (creates a back-button entry); false => replaceState (silent update).
        function syncUrl({ player, pushExpand = false } = {}) {
            // Build the URL fresh from state — only emit params that aren't at
            // their default value, so the default view URL is just the
            // pathname with no query string.
            const url = new URL(window.location.href);
            const params = new URLSearchParams();

            // Player slug (if a player is selected)
            let slug = null;
            if (player === undefined) {
                if (state.selected != null) {
                    const pid = state.selected;
                    const sep = pid.lastIndexOf('|');
                    const sName = pid.slice(0, sep);
                    const sSeason = parseInt(pid.slice(sep + 1), 10);
                    const rec = state.data.players.find(p => p.player === sName && p.season === sSeason);
                    if (rec) slug = rec.player_slug;
                }
            } else if (player) {
                slug = player;
            }
            if (slug) params.set('player', slug);

            // Position
            if (state.filters.bucket) params.set('position', state.filters.bucket);

            // Season range (only when narrower than the dataset extents).
            // Single-year ranges emit the compact ?season=Y alias; multi-year
            // ranges keep the ?season_start=Y&season_end=Z pair.
            const [smin, smax] = state.data.season_range;
            if (state.filters.seasonMin !== smin || state.filters.seasonMax !== smax) {
                if (!(state.filters.seasonMin === smax && state.filters.seasonMax === smax)) {
                    if (state.filters.seasonMin === state.filters.seasonMax) {
                        params.set('season', String(state.filters.seasonMin));
                    } else {
                        params.set('season_start', String(state.filters.seasonMin));
                        params.set('season_end',   String(state.filters.seasonMax));
                    }
                }
            }

            // Active sort (only when non-default).
            if (state.sort && state.sort.key && state.sort.key !== 'overall') {
                params.set('sort', state.sort.key);
            }

            // Multi-filter rows (skip incomplete rows so they don't pollute
            // the URL while the user is still constructing them)
            for (const f of state.filters.multi) {
                if (!isCompleteFilter(f)) continue;
                const pkey = METRIC_PARAM_KEY[f.metric];
                if (!pkey) continue;
                params.set(`${pkey}_${f.op}`, String(f.value));
            }

            // Tag filters — emit one ?tag=slug param per active tag,
            // multi-value AND composition.
            for (const slug of (state.filters.tags || [])) {
                params.append('tag', slug);
            }

            // Workout-team filters — one ?workout_team=Name per active team,
            // multi-value AND composition. URLSearchParams handles spaces.
            for (const team of (state.filters.workoutTeams || [])) {
                params.append('workout_team', team);
            }

            const qs = params.toString();
            const newUrl = qs ? `${url.pathname}?${qs}` : url.pathname;
            if (pushExpand) history.pushState({}, '', newUrl);
            else            history.replaceState({}, '', newUrl);
            updatePageMeta();
        }

        // ---- Per-URL page meta (title + description + OG + Twitter) ------
        // Recomputed on every route change so social-share preview and the
        // browser tab reflect the current filter/sort/player. Tool brand
        // is "NBA Draft Prospect Central"; "NBA Draft Combine" in titles
        // refers to the actual event, not the tool.
        const META_SUFFIX = ' | HoopsMatic';
        const META_DEFAULT_DESC =
            'Explore measurements, athletic scores, shooting drills, and historical comparisons for ' +
            'every NBA Draft Combine attendee since 2000.';

        function _setMetaByName(name, content) {
            let el = document.head.querySelector(`meta[name="${name}"]`);
            if (!el) {
                el = document.createElement('meta');
                el.setAttribute('name', name);
                document.head.appendChild(el);
            }
            el.setAttribute('content', content);
        }
        function _setMetaByProperty(prop, content) {
            let el = document.head.querySelector(`meta[property="${prop}"]`);
            if (!el) {
                el = document.createElement('meta');
                el.setAttribute('property', prop);
                document.head.appendChild(el);
            }
            el.setAttribute('content', content);
        }

        // Convert metric labels like "Lane agility" -> "Lane Agility" without
        // disturbing already-cased tokens ("Wingspan : Height").
        function _titleCaseLabel(s) {
            return String(s).replace(/\b([a-z])/g, (_, c) => c.toUpperCase());
        }

        function _hasAnyMeasurements(p) {
            const s = p.scores || {};
            if (['anthro', 'athletic', 'shooting'].some(k => s[k] != null)) return true;
            const metrics = p.metrics || {};
            for (const k in metrics) {
                const m = metrics[k];
                if (m && m.raw != null) return true;
            }
            return false;
        }
        function _hasWorkouts(p) {
            return Array.isArray(p.workouts) && p.workouts.length > 0;
        }

        function computePageMeta() {
            if (!state.data) {
                return {
                    title: 'NBA Draft Prospect Central' + META_SUFFIX,
                    description: META_DEFAULT_DESC,
                };
            }

            // Player view — adaptive based on what data the record actually has.
            if (state.view === 'player' && state.currentPlayer) {
                const p = state.currentPlayer;
                const hasM = _hasAnyMeasurements(p);
                const hasW = _hasWorkouts(p);
                let title, description;
                if (hasM && hasW) {
                    title = `${p.player} ${p.season} NBA Draft Combine Measurements + Workout List`;
                    description = `${p.player}'s ${p.season} NBA Draft Combine measurements, athletic scores, shooting drills, historical comparisons, and confirmed pre-draft workouts.`;
                } else if (hasM) {
                    title = `${p.player} ${p.season} NBA Draft Combine Measurements`;
                    description = `${p.player}'s ${p.season} NBA Draft Combine measurements, athletic scores, shooting drills, and historical comparisons.`;
                } else if (hasW) {
                    title = `${p.player} ${p.season} NBA Draft Workout List`;
                    description = `${p.player}'s confirmed pre-draft workouts before the ${p.season} NBA Draft.`;
                } else {
                    // Neither measurements nor workouts — extremely rare, but
                    // we still want a sensible title.
                    title = `${p.player} ${p.season} NBA Draft Profile`;
                    description = `${p.player}'s ${p.season} NBA Draft profile.`;
                }
                return { title: title + META_SUFFIX, description };
            }

            // Dashboard. A URL with no query string is the brand-default
            // landing experience; otherwise compose from state.
            if (!window.location.search) {
                return {
                    title: 'NBA Draft Prospect Central' + META_SUFFIX,
                    description: META_DEFAULT_DESC,
                };
            }

            const f = state.filters || {};
            const [smin, smax] = state.data.season_range;
            const isSingleYear = (f.seasonMin === f.seasonMax);
            const seasonStr = isSingleYear
                ? String(f.seasonMin)
                : `${f.seasonMin}-${f.seasonMax}`;
            // Full-dataset range (e.g., a tag-only URL where applyDeepLink
            // broadens to smin–smax) is treated as "no season filter" —
            // we drop the year prefix in those titles. Any other window
            // is a real filter and gets prefixed.
            const isFullRange = (f.seasonMin === smin && f.seasonMax === smax);
            const seasonPrefix = isFullRange ? '' : `${seasonStr} `;

            const tags = f.tags || [];
            const tagMeta = (state.data.tag_meta) || {};
            const tagLabels = tags.map(s => (tagMeta[s] && tagMeta[s].label) || s);

            const sortKey = state.sort && state.sort.key;
            const sortIsDefault = !sortKey || sortKey === 'overall';
            const multiActive = (f.multi || []).some(isCompleteFilter);
            const workoutTeamsActive = (f.workoutTeams || []).length > 0;

            // Filter precedence: tag > position > season-narrow > sort-only.
            // Combinations: the most specific filter wins; sort surfaces
            // only when nothing else is active.
            if (tagLabels.length) {
                const tagPhrase = tagLabels.length === 1
                    ? `with ${tagLabels[0]}`
                    : `matching ${tagLabels.length} traits`;
                return {
                    title: (`${seasonPrefix}NBA Draft Prospects ${tagPhrase}`).trim() + META_SUFFIX,
                    description: tagLabels.length === 1
                        ? `${seasonPrefix}NBA Draft prospects with ${tagLabels[0]}. Combine measurements, athletic scores, and historical comparisons.`.trim()
                        : `${seasonPrefix}NBA Draft prospects matching ${tagLabels.length} traits: ${tagLabels.join(', ')}. Combine measurements, athletic scores, and historical comparisons.`.trim(),
                };
            }
            if (f.bucket) {
                return {
                    title: (`${seasonPrefix}NBA Draft Prospects: ${f.bucket}`).trim() + META_SUFFIX,
                    description: isFullRange
                        ? `${f.bucket} measurements and athletic scores from the NBA Draft Combine.`
                        : `${f.bucket} measurements and athletic scores from the ${seasonStr} NBA Draft Combine.`,
                };
            }
            // Sort-only — only thing non-default is the sort key. The default
            // landing year (smax single year) doesn't qualify as a "filter"
            // for this branch — sort-only URLs still produce "Sorted by X".
            const seasonAtInit = (f.seasonMin === smax && f.seasonMax === smax);
            if (seasonAtInit && !sortIsDefault && !multiActive && !workoutTeamsActive) {
                // Prefer the short METRIC_LABELS form ("Lane agility") over
                // sortKeyLabel ("Lane Agility (sec, lower is better)") — the
                // unit + direction suffix is noise inside a page title.
                const rawLbl = (SCORE_LABELS[sortKey] || METRIC_LABELS[sortKey] || sortKey);
                const sortLbl = _titleCaseLabel(rawLbl);
                return {
                    title: `NBA Draft Prospects Sorted by ${sortLbl}` + META_SUFFIX,
                    description: `NBA Draft Combine prospects ranked by ${sortLbl}. Measurements, athletic scores, and historical comparisons.`,
                };
            }
            // Season-only filter (single year or range).
            if (isSingleYear) {
                return {
                    title: `${seasonStr} NBA Draft Prospects` + META_SUFFIX,
                    description: `Measurements, athletic scores, and shooting drills for prospects from the ${seasonStr} NBA Draft Combine.`,
                };
            }
            return {
                title: `NBA Draft Prospects ${seasonStr}` + META_SUFFIX,
                description: `Measurements, athletic scores, and shooting drills for prospects from the ${seasonStr} NBA Draft Combines.`,
            };
        }

        function updatePageMeta() {
            const m = computePageMeta();
            document.title = m.title;
            _setMetaByName('description', m.description);
            _setMetaByProperty('og:title', m.title);
            _setMetaByProperty('og:description', m.description);
            _setMetaByProperty('og:url', window.location.href);
            _setMetaByName('twitter:title', m.title);
            _setMetaByName('twitter:description', m.description);
        }

        const OPERATOR_LABEL = { gte: '≥', lte: '≤', eq: '=' };

        function metricUnitHint(key) {
            const u = METRIC_UNITS[key];
            if (u && u.trim()) return u.trim();
            if (/\(in\)$/.test(key)) return 'in';
            if (key === 'wingspan_to_height' || key === 'reach_to_height') return 'ratio';
            return '';
        }

        function setAdvancedOpen(open) {
            const btn = document.getElementById('advToggle');
            const body = document.getElementById('advBody');
            btn.setAttribute('aria-expanded', open ? 'true' : 'false');
            body.hidden = !open;
        }

        function renderMultiFilters() {
            const rows = document.getElementById('advRows');
            const count = document.getElementById('advCount');
            if (!rows) return;
            rows.innerHTML = '';

            const helper = document.createElement('div');
            helper.className = 'adv-helper';
            helper.textContent = 'Stack filters to narrow the table. All filters apply together (AND).';
            rows.appendChild(helper);

            if (!state.filters.multi.length) {
                const empty = document.createElement('div');
                empty.className = 'adv-empty';
                empty.textContent = 'No advanced filters yet. Click "+ Add filter" to stack a condition.';
                rows.appendChild(empty);
            } else {
                state.filters.multi.forEach((f, idx) => {
                    rows.appendChild(buildAdvRow(f, idx));
                });
            }
            // Count = complete (active) rows only
            const activeCount = state.filters.multi.filter(isCompleteFilter).length;
            if (activeCount) { count.hidden = false; count.textContent = `${activeCount} active`; }
            else             { count.hidden = true;  count.textContent = ''; }
            // Auto-open the panel when at least one row exists so the user
            // can see what they've drafted (complete or not).
            if (state.filters.multi.length) setAdvancedOpen(true);
        }

        function buildAdvRow(f, idx) {
            const row = document.createElement('div');
            row.className = 'adv-row';
            row.dataset.rowidx = String(idx);
            if (!isCompleteFilter(f)) row.classList.add('incomplete');

            const metricSel = document.createElement('select');
            metricSel.className = 'adv-metric';
            // "Select metric…" placeholder option (disabled, selected when blank)
            const placeholder = new Option('Select metric…', '');
            placeholder.disabled = true;
            placeholder.selected = !f.metric;
            metricSel.appendChild(placeholder);
            FILTER_METRICS.forEach(k => {
                const label = METRIC_LABELS_WITH_UNITS[k] || METRIC_LABELS[k] || k;
                const opt = new Option(label, k);
                if (k === f.metric) opt.selected = true;
                metricSel.appendChild(opt);
            });
            metricSel.addEventListener('change', () => {
                state.filters.multi[idx].metric = metricSel.value;
                onRowEdited(idx);
            });
            row.appendChild(metricSel);

            const opSel = document.createElement('select');
            opSel.className = 'adv-op';
            ['gte', 'lte', 'eq'].forEach(op => {
                const opt = new Option(OPERATOR_LABEL[op], op);
                if (op === f.op) opt.selected = true;
                opSel.appendChild(opt);
            });
            opSel.addEventListener('change', () => {
                state.filters.multi[idx].op = opSel.value;
                onRowEdited(idx);
            });
            row.appendChild(opSel);

            const valInput = document.createElement('input');
            valInput.type = 'number';
            valInput.min = '0';                         // negatives are nonsensical for our metrics
            valInput.inputMode = 'decimal';
            valInput.placeholder = 'value';
            valInput.className = 'adv-value';
            valInput.step = numericStepFor(f.metric);
            valInput.value = (f.value === '' || f.value == null) ? '' : String(f.value);
            // Select-on-first-focus per session (let subsequent clicks place caret)
            valInput.addEventListener('focus', e => {
                if (e.target.dataset.focused === '1') return;
                e.target.dataset.focused = '1';
                requestAnimationFrame(() => e.target.select());
            });
            valInput.addEventListener('blur', e => { delete e.target.dataset.focused; });
            valInput.addEventListener('input', () => {
                const raw = valInput.value;
                state.filters.multi[idx].value = raw === '' ? '' : Number(raw);
                onRowEdited(idx);
            });
            row.appendChild(valInput);

            const unit = document.createElement('span');
            unit.className = 'adv-unit';
            unit.textContent = metricUnitHint(f.metric);
            row.appendChild(unit);

            const remove = document.createElement('button');
            remove.type = 'button';
            remove.className = 'adv-remove';
            remove.textContent = '×';
            remove.title = 'Remove this filter';
            remove.addEventListener('click', () => {
                state.filters.multi.splice(idx, 1);
                renderMultiFilters();
                onMultiFilterChange();
            });
            row.appendChild(remove);

            return row;
        }

        function numericStepFor(metric) {
            return (metric === 'wingspan_to_height' || metric === 'reach_to_height') ? '0.001' :
                   (metric === 'hand_area') ? '0.5' :
                   (metric && (metric.includes('Sprint') || metric.includes('Agility'))) ? '0.01' :
                   (metric === 'Body Fat %') ? '0.1' : '0.5';
        }

        // After the user edits a single row (metric/op/value): de-duplicate
        // against existing complete rows, then apply.
        function onRowEdited(idx) {
            const f = state.filters.multi[idx];

            // If a row's metric just changed and the value's previous step
            // doesn't suit the new metric, refresh the input step. We re-render
            // wholesale only when state was mutated by dedup; a step refresh
            // can be done in place but it's simpler to re-render once below.

            if (isCompleteFilter(f)) {
                // 1. Same-metric+same-op replacement (only for gte/lte; eq stacks).
                if (f.op === 'gte' || f.op === 'lte') {
                    for (let i = 0; i < state.filters.multi.length; i++) {
                        if (i === idx) continue;
                        const g = state.filters.multi[i];
                        if (!isCompleteFilter(g)) continue;
                        if (g.metric === f.metric && g.op === f.op) {
                            // Drop the old row; the user's most recent edit wins.
                            // Maintain idx so the focused row stays put.
                            state.filters.multi.splice(i, 1);
                            if (i < idx) idx--;
                            showToast('Updated existing filter.', 3000);
                            renderMultiFilters();
                            onMultiFilterChange();
                            return;
                        }
                    }
                }
                // 2. Exact duplicate (metric+op+value) → drop the new one.
                for (let i = 0; i < state.filters.multi.length; i++) {
                    if (i === idx) continue;
                    const g = state.filters.multi[i];
                    if (!isCompleteFilter(g)) continue;
                    if (g.metric === f.metric && g.op === f.op && Number(g.value) === Number(f.value)) {
                        state.filters.multi.splice(idx, 1);
                        showToast('That filter is already active.', 3000);
                        renderMultiFilters();
                        onMultiFilterChange();
                        return;
                    }
                }
            }

            // No dedup; just sync UI state (toggle .incomplete) and re-apply.
            const rowEl = document.querySelector(`.adv-row[data-rowidx="${idx}"]`);
            if (rowEl) rowEl.classList.toggle('incomplete', !isCompleteFilter(f));
            // Refresh the step attribute on the value input if the metric changed
            const valEl = rowEl ? rowEl.querySelector('input.adv-value') : null;
            if (valEl) valEl.step = numericStepFor(f.metric);
            // Refresh the unit hint
            const unitEl = rowEl ? rowEl.querySelector('.adv-unit') : null;
            if (unitEl) unitEl.textContent = metricUnitHint(f.metric);
            onMultiFilterChange();
        }

        function onMultiFilterChange() {
            applyFilters();
            syncUrl();
        }

        function addBlankMultiFilter() {
            state.filters.multi.push({ metric: '', op: 'gte', value: '' });
            renderMultiFilters();
            // Auto-open and scroll the new (last) row into view
            setAdvancedOpen(true);
            requestAnimationFrame(() => {
                const rows = document.querySelectorAll('.adv-row');
                const last = rows[rows.length - 1];
                if (last) {
                    last.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                    const sel = last.querySelector('.adv-metric');
                    if (sel) sel.focus();
                }
            });
        }

        function clearMultiFilters() {
            state.filters.multi = [];
            renderMultiFilters();
            onMultiFilterChange();
        }

        function findHiddenSelectedPlayer() {
            if (state.selected == null) return null;
            const filteredIds = new Set(state.filtered.map(p => playerId(p)));
            const pid = state.selected;
            if (filteredIds.has(pid)) return null;
            const sep = pid.lastIndexOf('|');
            const name = pid.slice(0, sep);
            const season = parseInt(pid.slice(sep + 1), 10);
            return state.data.players.find(p => p.player === name && p.season === season) || null;
        }

        function renderEmptyState(el) {
            el.innerHTML = '';
            const f = state.filters;

            const msg = document.createElement('div');
            msg.className = 'empty-msg';
            const actions = document.createElement('div');
            actions.className = 'empty-actions';
            const addAction = (label, handler) => {
                const b = document.createElement('button');
                b.type = 'button';
                b.className = 'empty-action';
                b.textContent = label;
                b.addEventListener('click', handler);
                actions.appendChild(b);
            };

            if (f.search) {
                // Does the search match any player at all (ignoring other filters)?
                const ql = f.search.toLowerCase();
                const anyMatch = state.data.players.some(p => p.player.toLowerCase().includes(ql));
                if (!anyMatch) {
                    msg.textContent = `No players match "${f.search}".`;
                    addAction('Clear search', clearSearchOnly);
                } else {
                    msg.textContent = `No players match "${f.search}" with the current filters.`;
                    addAction('Clear search', clearSearchOnly);
                    addAction('Clear filters', clearAllFiltersExceptSearch);
                }
            } else {
                msg.textContent = 'No players match the current filters.';
                addAction('Clear filters', clearAllFiltersExceptSearch);
                addAction('Reset all', resetAll);
            }
            el.appendChild(msg);
            el.appendChild(actions);
        }

        function clearSearchOnly() {
            state.filters.search = '';
            document.getElementById('search').value = '';
            hideSuggestions();
            applyFilters();
        }

        // Clear position, season-narrowing, similarity, multi — but leave the
        // search box alone (user typed it intentionally).
        function clearAllFiltersExceptSearch() {
            const [smin, smax] = state.data.season_range;
            state.filters.bucket = '';
            state.filters.seasonMin = smax;
            state.filters.seasonMax = smax;
            state.filters.similarity = null;
            state.filters.multi = [];
            state.filters.tags = [];
            state.filters.workoutTeams = [];
            document.getElementById('bucket').value = '';
            document.getElementById('seasonMin').value = String(smax);
