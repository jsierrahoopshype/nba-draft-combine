            document.getElementById('seasonMax').value = String(smax);
            renderMultiFilters();
            applyFilters();
            syncUrl();
        }


        // Returns the page to its default state. Distinct from "Clear filters"
        // (which only empties the multi-filter rows). Reset all also clears
        // the search box, position dropdown, season range, sort, expanded
        // player, and the URL.
        function resetAll() {
            const [smin, smax] = state.data.season_range;
            state.filters.search = '';
            state.filters.bucket = '';
            state.filters.seasonMin = smax;
            state.filters.seasonMax = smax;
            state.filters.similarity = null;
            state.filters.multi = [];
            state.filters.tags = [];
            state.filters.workoutTeams = [];
            state.selected = null;
            state.selectionHistory = [];
            state.sort.key = 'overall';
            state.sort.dir = 'best';
            // Sync DOM controls
            const searchEl = document.getElementById('search');
            searchEl.value = '';
            document.getElementById('searchClear').hidden = true;
            hideSearchNote();
            document.getElementById('bucket').value = '';
            document.getElementById('seasonMin').value = String(smax);
            document.getElementById('seasonMax').value = String(smax);
            document.getElementById('sort').value = 'overall';
            hideSuggestions();
            renderHeader();
            renderMultiFilters();
            // Clear URL completely — replaceState so we don't pollute history
            history.replaceState({}, '', window.location.pathname);
            hideSelectionBanner();
            applyFilters();
            updateBackToSelectedButton();
        }

        function applyDeepLink() {
            // Apply ?player=, ?position=, ?season_start=, ?season_end=,
            // and any multi-filter params from the URL.
            const params = new URL(window.location.href).searchParams;
            const [smin, smax] = state.data.season_range;

            // Multi-filters first
            state.filters.multi = [];
            for (const [k, v] of params.entries()) {
                const m = k.match(/^([a-z]+)_(gte|lte|eq)$/);
                if (!m) continue;
                const pkey = m[1], op = m[2];
                const metric = PARAM_KEY_TO_METRIC[pkey];
                if (!metric) continue;
                const num = Number(v);
                if (!isFinite(num)) continue;
                state.filters.multi.push({ metric, op, value: num });
            }

            // Tag filters — multi-value ?tag=slug params. Drop unknown slugs
            // and de-dup. AND composition is enforced in passesTags().
            state.filters.tags = [];
            const knownTags = (state.data && state.data.tag_meta) || {};
            const seenTags = new Set();
            for (const v of params.getAll('tag')) {
                if (knownTags[v] && !seenTags.has(v)) {
                    seenTags.add(v);
                    state.filters.tags.push(v);
                }
            }

            // Workout teams — multi-value ?workout_team=Name params,
            // de-duplicated, AND composition (enforced in passesWorkoutTeams).
            state.filters.workoutTeams = [];
            const seenTeams = new Set();
            for (const v of params.getAll('workout_team')) {
                const t = (v || '').trim();
                if (t && !seenTeams.has(t)) {
                    seenTeams.add(t);
                    state.filters.workoutTeams.push(t);
                }
            }

            // Position
            const pos = params.get('position');
            if (pos === 'Guards' || pos === 'Wings' || pos === 'Bigs') {
                state.filters.bucket = pos;
                document.getElementById('bucket').value = pos;
            }

            // Season range — explicit overrides everything. Accept either
            // the canonical ?season_start=Y&season_end=Z pair, or the
            // single-year alias ?season=Y (used by the tag-click sort URLs).
            const seasonRaw = params.get('season');
            let ss = null, se = null;
            if (seasonRaw) {
                const y = parseInt(seasonRaw, 10);
                if (Number.isInteger(y)) { ss = y; se = y; }
            } else {
                const ssRaw = params.get('season_start');
                const seRaw = params.get('season_end');
                ss = ssRaw ? parseInt(ssRaw, 10) : null;
                se = seRaw ? parseInt(seRaw, 10) : null;
            }
            const validSeason = (n) => Number.isInteger(n) && n >= smin && n <= smax;
            if (validSeason(ss) || validSeason(se)) {
                const minV = validSeason(ss) ? ss : smin;
                const maxV = validSeason(se) ? se : smax;
                state.filters.seasonMin = Math.min(minV, maxV);
                state.filters.seasonMax = Math.max(minV, maxV);
                document.getElementById('seasonMin').value = String(state.filters.seasonMin);
                document.getElementById('seasonMax').value = String(state.filters.seasonMax);
            } else if (state.filters.multi.length || state.filters.tags.length || state.filters.workoutTeams.length || params.get('player')) {
                // Default "Best of {latest year}" filter would hide most shared
                // URLs. Broaden to full dataset when any filter/player param
                // exists but no explicit season range.
                state.filters.seasonMin = smin;
                state.filters.seasonMax = smax;
                document.getElementById('seasonMin').value = String(smin);
                document.getElementById('seasonMax').value = String(smax);
            }

            // Sort param. ?sort=<column_key> sets the active sort key with
            // direction 'best'. Unknown keys are ignored.
            const sortRaw = params.get('sort');
            if (sortRaw && ALL_COLUMNS[sortRaw]) {
                state.sort.key = sortRaw;
                state.sort.dir = 'best';
                const sortSel = document.getElementById('sort');
                if (sortSel) sortSel.value = sortRaw;
            }

            // ?player= is handled by routeFromUrl (v6 player view), not here.
            return null;
        }

        function setView(name) {
            state.view = name;
            document.body.dataset.view = name;
        }

        function routeFromUrl({ fromInit = false, fromPopstate = false } = {}) {
            const params = new URL(window.location.href).searchParams;
            const slug = params.get('player');
            if (slug) {
                hideSuggestions();
                const seasonStr = params.get('season');
                const seasonNum = (seasonStr && /^(?:19|20)\d{2}$/.test(seasonStr))
                    ? parseInt(seasonStr, 10) : null;
                const resolved = resolvePlayerSlug(slug, seasonNum);
                setView('player');
                if (resolved.player) {
                    // Rewrite URL in place when:
                    //   - we matched via the legacy slug-with-year form, OR
                    //   - the slug is canonical but a non-existent ?season=
                    //     was requested (drop the bogus param), OR
                    //   - canonical multi-combine URL had no ?season= (we
                    //     picked most-recent; bake that into the URL so
                    //     reloads land in the same spot), OR
                    //   - single-combine player has a redundant ?season=.
                    const canonical = playerUrl(resolved.player);
                    if (canonical !== window.location.search) {
                        history.replaceState(history.state, '', canonical);
                    }
                    renderPlayerView(resolved.player, {
                        missingSeason: !resolved.exactSeason ? seasonNum : null,
                    });
                } else {
                    renderPlayerNotFound(slug);
                }
                window.scrollTo({ top: 0, behavior: fromPopstate ? 'auto' : 'auto' });
                updatePageMeta();
                return;
            }
            // Dashboard view
            setView('dashboard');
            state.selected = null;
            state.selectionHistory = [];
            state.filters.similarity = null;
            applyDeepLink();
            renderMultiFilters();
            applyFilters();
            updatePageMeta();
        }

        // Push history for navigation events. Two flavors:
        // - navigateToPlayer(p, { fromComp = false }): pushes ?player=slug,
        //   with history.state.prev = previous slug (for inline back link).
        // - navigateToDashboard(): pushes pathname (no query) and re-renders.
        function navigateToPlayer(p, { fromComp = false } = {}) {
            const url = playerUrl(p);
            // prev is stored as a legacy season-qualified slug so it round-
            // trips uniquely even across multi-combine players (we want the
            // back link to land on the exact season the user came from).
            const prev = (state.view === 'player' && fromComp && state.currentPlayer)
                ? slugify(state.currentPlayer.player, state.currentPlayer.season)
                : null;
            history.pushState({ prev }, '', url);
            setView('player');
            renderPlayerView(p);
            window.scrollTo({ top: 0, behavior: 'auto' });
        }

        function navigateToDashboard() {
            history.pushState({}, '', window.location.pathname);
            routeFromUrl({});
        }

        // ---- Player view rendering ---------------------------------------
        function renderPlayerView(p, opts = {}) {
            state.currentPlayer = p;
            const body = document.getElementById('pvBody');
            body.innerHTML = '';
            document.getElementById('pvSearch').value = '';
            document.getElementById('pvSearchClear').hidden = true;
            hidePvSuggestions();

            // Missing-season notice: ?season=Y was set but Y isn't a combine
            // we have for this player. We render the most-recent combine
            // instead and surface a one-line explanation.
            if (opts.missingSeason != null) {
                const notice = document.createElement('div');
                notice.className = 'pv-missing-season';
                notice.textContent = `No ${opts.missingSeason} combine data for ${p.player} — showing ${p.season} instead.`;
                body.appendChild(notice);
            }

            // Hero block: name + meta on the left, Combine Rating on the right
            const hero = document.createElement('div');
            hero.className = 'pv-hero';

            const heroLeft = document.createElement('div');
            heroLeft.className = 'pv-hero-left';
            const heroName = document.createElement('div');
            heroName.className = 'pv-hero-name';
            heroName.textContent = p.player;
            const heroMeta = document.createElement('div');
            heroMeta.className = 'pv-hero-meta';
            heroMeta.appendChild(document.createTextNode(`${p.season} · ${p.position || '—'} ·`));
            const bb = document.createElement('span');
            bb.className = 'bucket-badge';
            bb.textContent = p.bucket;
            heroMeta.appendChild(bb);
            heroLeft.appendChild(heroName);
            heroLeft.appendChild(heroMeta);
            hero.appendChild(heroLeft);

            const heroRating = document.createElement('div');
            heroRating.className = 'pv-hero-rating';
            const rLabel = document.createElement('div');
            rLabel.className = 'pv-hero-rating-label';
            rLabel.textContent = 'Combine Rating';
            const rValue = document.createElement('div');
            rValue.className = 'pv-hero-rating-value';
            rValue.textContent = p.scores.overall == null ? '—' : p.scores.overall.toFixed(1);
            applyHeat(rValue, p.scores.overall);
            heroRating.appendChild(rLabel);
            heroRating.appendChild(rValue);
            hero.appendChild(heroRating);
            body.appendChild(hero);

            // Season toggle: only render when this player attended multiple
            // combines. Tabs are ordered most-recent-first (matches the
            // index). Active tab = the season being viewed.
            const seasons = getPlayerSlugIndex().get(p.player_slug) || [p];
            if (seasons.length > 1) {
                const tabs = document.createElement('div');
                tabs.className = 'pv-season-tabs';
                tabs.setAttribute('role', 'tablist');
                tabs.setAttribute('aria-label', 'Combine seasons');
                const label = document.createElement('span');
                label.className = 'pv-season-tabs-label';
                label.textContent = 'Combine season:';
                tabs.appendChild(label);
                seasons.forEach(rec => {
                    const tab = document.createElement('button');
                    tab.type = 'button';
                    tab.className = 'pv-season-tab' + (rec.season === p.season ? ' active' : '');
                    tab.setAttribute('role', 'tab');
                    tab.setAttribute('aria-selected', rec.season === p.season ? 'true' : 'false');
                    tab.textContent = String(rec.season);
                    tab.addEventListener('click', () => {
                        if (rec.season === p.season) return;
                        history.pushState({}, '', playerUrl(rec));
                        renderPlayerView(rec);
                        window.scrollTo({ top: 0, behavior: 'auto' });
                    });
                    tabs.appendChild(tab);
                });
                body.appendChild(tabs);
            }

            // Profile tag pills row, full-width below the hero. Render only
            // when the player has at least one tag — no empty placeholder.
            if (p.profile_tags && p.profile_tags.length) {
                const pillRow = document.createElement('div');
                pillRow.className = 'profile-pills';
                p.profile_tags.forEach(slug => {
                    const pill = buildTagPill(slug);
                    if (pill) pillRow.appendChild(pill);
                });
                body.appendChild(pillRow);
            }

            // Score cards (4)
            const scoreSect = document.createElement('div');
            scoreSect.className = 'pv-section pv-section-scores';
            const scoreH2 = document.createElement('h2');
            scoreH2.textContent = `Position-cohort scores · ${p.bucket}`;
            scoreSect.appendChild(scoreH2);
            const scWrap = document.createElement('div');
            scWrap.className = 'scores-summary';
            const orderedScores = [
                ['overall',  'Combine Rating'],
                ['anthro',   'Anthro'],
                ['athletic', 'Athletic'],
                ['shooting', 'Shooting'],
            ];
            orderedScores.forEach(([k, label]) => {
                const v = p.scores[k];
                const tile = document.createElement('div');
                tile.className = `score-tile ${k === 'overall' ? 'overall' : ''}`;
                applyHeat(tile, v);
                tile.innerHTML = `<div class="label">${label}</div><div class="value">${v == null ? '—' : v.toFixed(1)}</div>`;
                scWrap.appendChild(tile);
            });
            scoreSect.appendChild(scWrap);
            body.appendChild(scoreSect);

            // Anthro + Athletic side-by-side; Ratios full-width below
            const dualWrap = document.createElement('div');
            dualWrap.className = 'pv-grid-2col';
            dualWrap.appendChild(buildPvMetricSection('Anthro', ANTHRO_KEYS, p));
            dualWrap.appendChild(buildPvMetricSection('Athletic', ATHLETIC_KEYS, p));
            body.appendChild(dualWrap);

            const hasRatio = RATIO_KEYS.some(k => p.metrics[k] && p.metrics[k].raw != null);
            if (hasRatio) body.appendChild(buildPvMetricSection('Ratios', RATIO_KEYS, p));

            // Shooting drills section
            const shotInner = buildShootingSection(p);
            if (shotInner) {
                const sect = document.createElement('div');
                sect.className = 'pv-section';
                // Re-use the inner structure but lift the heading to pv-section style
                shotInner.firstChild?.remove(); // strip the original h3 inside detail-section
                const h2 = document.createElement('h2');
                h2.textContent = 'Shooting drills';
                sect.appendChild(h2);
                while (shotInner.firstChild) sect.appendChild(shotInner.firstChild);
                body.appendChild(sect);
            }

            // Pre-draft workouts section (between shooting drills and comps)
            const workoutsSect = buildWorkoutsSection(p);
            if (workoutsSect) body.appendChild(workoutsSect);

            // Comps with optional inline back link
            if (p.doppelgangers && p.doppelgangers.length) {
                const sect = document.createElement('div');
                sect.className = 'pv-section';
                const head = document.createElement('div');
                head.className = 'pv-comps-header';
                const h2 = document.createElement('h2');
                h2.textContent = 'Closest historical comps';
                head.appendChild(h2);
                const prevSlug = (history.state && history.state.prev) || null;
                if (prevSlug) {
                    const prev = findPlayerBySlug(prevSlug);
                    if (prev) {
                        const back = document.createElement('button');
                        back.type = 'button';
                        back.className = 'pv-back-prev';
                        back.textContent = `← Back to ${prev.player}`;
                        back.title = `Return to ${prev.player} ${prev.season}`;
                        back.addEventListener('click', () => history.back());
                        head.appendChild(back);
                    }
                }
                sect.appendChild(head);
                const helper = document.createElement('div');
                helper.className = 'pv-comps-helper';
                helper.textContent =
                    'Players with the most similar combine measurements, scored across height, length, athletic drills, and ratios.';
                sect.appendChild(helper);
                const grid = document.createElement('div');
                grid.className = 'dopp-grid';
                p.doppelgangers.forEach(c => grid.appendChild(buildCompCard(c)));
                sect.appendChild(grid);
                body.appendChild(sect);
            }

            // Footer note about cohort
            const cohortCount = state.data.buckets[p.bucket] || 0;
            const note = document.createElement('div');
            note.className = 'pv-footer-note';
            note.textContent = `Combine Rating computed against ${cohortCount.toLocaleString()} ${p.bucket} in the dataset.`;
            body.appendChild(note);

            updatePageMeta();
        }

        // Variant of buildMetricSection styled for player view (h2 head,
        // rounded card). Reuses the metric-grid + metric-cell internals.
        // ---- Profile tag pills -------------------------------------------
        // A pill is a clickable button that, when clicked, navigates to the
        // dashboard with that tag added as an active filter. Color-coded by
        // category (anthro / ratio / athletic).
        function buildTagPill(slug) {
            const meta = state.data && state.data.tag_meta && state.data.tag_meta[slug];
            if (!meta) return null;
            const pill = document.createElement('button');
            pill.type = 'button';
            pill.className = `tag-pill tag-${meta.category}`;
            pill.dataset.tag = slug;
            pill.textContent = meta.label;
            pill.title = `Filter dashboard to players tagged "${meta.label}"`;
            pill.addEventListener('click', e => {
                e.stopPropagation();
                navigateToTagFilter(slug);
            });
            return pill;
        }

        // Score for ranking shared tags between focal and comp. Higher score
        // = trait is more extreme on the side that triggered the tag, on
        // BOTH players. Tied scores fall back to category order anthro →
        // ratio → athletic for stable rendering.
        function tagExtremeness(slug, pct) {
            if (pct == null || isNaN(pct)) return 0;
            const meta = state.data && state.data.tag_meta && state.data.tag_meta[slug];
            if (!meta) return 0;
            if (meta.rule === 'pct_gte') return pct;
            if (meta.rule === 'pct_lte') return 100 - pct;
            if (meta.rule === 'pct_range') return 100 - Math.abs(pct - 50) * 2;
            return 0;
        }

        const TAG_CATEGORY_ORDER = { anthro: 0, ratio: 1, athletic: 2 };

        function rankSharedTags(focal, comp, limit) {
            const focalSet = new Set(focal.profile_tags || []);
            const shared = (comp.profile_tags || []).filter(t => focalSet.has(t));
            if (!shared.length) return [];
            const meta = state.data.tag_meta || {};
            const scored = shared.map(slug => {
                const m = meta[slug];
                const metric = m && m.metric;
                const fp = metric && focal.metrics[metric] ? focal.metrics[metric].pct : null;
                const cp = metric && comp.metrics[metric] ? comp.metrics[metric].pct : null;
                const score = Math.min(tagExtremeness(slug, fp), tagExtremeness(slug, cp));
                const cat = (m && TAG_CATEGORY_ORDER[m.category]) ?? 99;
                return { slug, score, cat };
            });
            scored.sort((a, b) =>
                b.score - a.score || a.cat - b.cat || a.slug.localeCompare(b.slug)
            );
            return scored.slice(0, limit).map(s => s.slug);
        }

        // Navigate to the dashboard with a tag filter active. Adds the tag
        // to state.filters.tags (initial array if currently in player view),
        // pushes URL, and routes from URL to render the dashboard.
        function navigateToTagFilter(slug) {
            // v10b: tag clicks now navigate to a SORTED dashboard view of
            // the player's own season ranked by the tag's underlying metric.
            // This makes a "Quick first step" pill on Cooper Flagg open the
            // 2025 leaderboard sorted by 3/4 Sprint, best at top — far more
            // useful than filtering to "top 25% of guards in sprint" alone.
            //
            // Two cases:
            //   1. Range tags (rule === 'pct_range', e.g. average-jumper)
            //      have no monotonic direction, so sorting doesn't make
            //      sense. Fall back to the legacy ?tag=<slug> filter.
            //   2. All other tags use ?season=<player's season>&sort=<col>.
            //      No ?tag= param — we want the full season's ranking on
            //      that metric, not the filtered subset.
            const meta = state.data && state.data.tag_meta && state.data.tag_meta[slug];
            const isRangeTag = meta && meta.rule === 'pct_range';
            const colKey = TAG_TO_COLUMN_KEY[slug];
            const playerSeason = state.currentPlayer ? state.currentPlayer.season : null;

            if (isRangeTag || !colKey || !ALL_COLUMNS[colKey] || playerSeason == null) {
                // Legacy filter behavior for range tags (or missing metadata).
                const existing = new Set(state.filters.tags || []);
                existing.add(slug);
                const tags = [...existing];
                const params = new URLSearchParams();
                if (state.view === 'dashboard') {
                    const cur = new URL(window.location.href).searchParams;
                    for (const [k, v] of cur.entries()) {
                        if (k !== 'tag') params.append(k, v);
                    }
                }
                tags.forEach(t => params.append('tag', t));
                const qs = params.toString();
                const newUrl = qs ? `${window.location.pathname}?${qs}` : window.location.pathname;
                history.pushState({}, '', newUrl);
                routeFromUrl({});
                return;
            }

            // Sort path: ?season=<year>&sort=<col_key>. Fresh URL — drop
            // any prior dashboard params so the click means exactly what
            // the spec says, no carry-over filters.
            const params = new URLSearchParams();
            params.set('season', String(playerSeason));
            params.set('sort', colKey);
            const newUrl = `${window.location.pathname}?${params.toString()}`;
            history.pushState({}, '', newUrl);
            routeFromUrl({});
        }

        // Navigate to the dashboard with a workout-team filter active. Mirrors
        // navigateToTagFilter but with ?workout_team=Name (URLSearchParams
        // handles the URL encoding of spaces and other special characters).
        function navigateToWorkoutTeamFilter(team) {
            const existing = new Set(state.filters.workoutTeams || []);
            existing.add(team);
            const teams = [...existing];
            const params = new URLSearchParams();
            if (state.view === 'dashboard') {
                const cur = new URL(window.location.href).searchParams;
                for (const [k, v] of cur.entries()) {
                    if (k !== 'workout_team') params.append(k, v);
                }
            }
            teams.forEach(t => params.append('workout_team', t));
            const qs = params.toString();
            const newUrl = qs ? `${window.location.pathname}?${qs}` : window.location.pathname;
            history.pushState({}, '', newUrl);
            routeFromUrl({});
        }

        // Build the PRE-DRAFT WORKOUTS section for player view. Returns
        // null when there's nothing to render (no workouts AND no
        // draft/real team info). Layout rules per the spec — see the
        // pill-state matrix in the v10 design doc.
        function buildWorkoutsSection(p) {
            const workouts = Array.isArray(p.workouts) ? p.workouts : [];
            const draft = p.draft_team || null;
            const real  = p.real_team  || null;
            if (!workouts.length && !draft && !real) return null;

            const sect = document.createElement('div');
            sect.className = 'pv-section';
            const h2 = document.createElement('h2');
            h2.textContent = 'Pre-draft workouts';
            sect.appendChild(h2);

            const helper = document.createElement('div');
            helper.className = 'pv-comps-helper';
            if (workouts.length) {
                helper.textContent = `Teams that hosted ${p.player} for a pre-draft workout in ${p.season}.`;
            } else if (draft && real && draft === real) {
                helper.textContent = `${p.player} was drafted and signed by ${draft}.`;
            } else if (draft) {
                helper.textContent = `${p.player} was drafted by ${draft}.`;
            } else if (real) {
                helper.textContent = `${p.player} signed with ${real}.`;
            }
            sect.appendChild(helper);

            // Caveat: the sheet is a manual compile, so what we have is
            // necessarily a subset of all the workouts that took place.
            // Render only when there are workout pills to render; the
            // draft/real-only branch above doesn't need the disclaimer.
            if (workouts.length) {
                const caveat = document.createElement('div');
                caveat.className = 'pv-workouts-caveat';
                caveat.textContent =
                    'Shows confirmed workouts. Others may have happened that weren’t publicly reported.';
                sect.appendChild(caveat);
            }

            const row = document.createElement('div');
            row.className = 'workout-pills';

            // Helper: classify a team relative to draft/real to pick the
            // pill's visual state and trailing label.
            const labelFor = (team) => {
                if (draft && real && team === draft && team === real) return { cls: 'wp-signed',     note: 'Drafted and signed here' };
                if (real  && team === real)                            return { cls: 'wp-signed',     note: 'Signed here' };
                if (draft && team === draft)                           return { cls: 'wp-drafted',    note: 'Drafted by' };
                return { cls: '', note: '' };
            };

            workouts.forEach(team => {
                const meta = labelFor(team);
                const pill = document.createElement('button');
                pill.type = 'button';
                pill.className = `workout-pill ${meta.cls}`.trim();
                pill.dataset.team = team;
                pill.innerHTML = `<span class="wp-team">${team}</span>` +
                    (meta.note ? `<span class="wp-note">${meta.note}</span>` : '');
                pill.title = `Filter dashboard to players who worked out with ${team}`;
                pill.addEventListener('click', e => {
                    e.stopPropagation();
                    navigateToWorkoutTeamFilter(team);
                });
                row.appendChild(pill);
            });

            // "Did not work out" extra pills — non-clickable spans for any
            // draft/real team that isn't in the workouts list. Surfaces the
            // team's role in the player's story even with no workout match.
            const workoutSet = new Set(workouts);
            const renderGhost = (team, note) => {
                if (!team || workoutSet.has(team)) return;
                const ghost = document.createElement('span');
                ghost.className = `workout-pill wp-ghost ${note === 'Signed here' || note === 'Drafted and signed here' ? 'wp-signed' : 'wp-drafted'}`;
                ghost.innerHTML = `<span class="wp-team">${team}</span>` +
                    `<span class="wp-note">${note} · Did not work out</span>`;
                row.appendChild(ghost);
            };
            if (draft && real && draft === real) {
                renderGhost(draft, 'Drafted and signed here');
            } else {
                if (real)  renderGhost(real,  'Signed here');
                if (draft) renderGhost(draft, 'Drafted by');
            }

            sect.appendChild(row);

            // Undrafted note when workouts exist but no draft data.
            if (workouts.length && !draft && !real) {
                const note = document.createElement('div');
                note.className = 'pv-comps-helper';
                note.style.marginTop = '0.75rem';
                note.style.marginBottom = '0';
                note.textContent = `${p.player} was not drafted.`;
                sect.appendChild(note);
            }

            return sect;
        }

        // ---- Comp card rendering (similarity / match labels) ------------
        // Distance tier thresholds come from build_data.py (computed
        // percentiles of the actual top-5 distance distribution); fallbacks
        // mirror the spec's defaults.
        function compSimilarityTier(distance) {
            const t = (state.data && state.data.comp_dist_tiers) || {
                very_similar: 12, similar: 16, somewhat_similar: 20, loosely_similar: 25,
            };
            if (distance <= t.very_similar)     return { label: 'Very similar',     cls: 'comp-tier-vsim' };
            if (distance <= t.similar)          return { label: 'Similar',          cls: 'comp-tier-sim'  };
            if (distance <= t.somewhat_similar) return { label: 'Somewhat similar', cls: 'comp-tier-some' };
            if (distance <= t.loosely_similar)  return { label: 'Loosely similar',  cls: 'comp-tier-loose'};
            return { label: 'Distant comp', cls: 'comp-tier-distant' };
        }
        function compMatchStrength(shared) {
            if (shared >= 11) return 'Strong match';
            if (shared >= 8)  return 'Decent match';
            return 'Limited data';
        }

        function buildCompCard(c) {
            const card = document.createElement('a');
            card.className = 'dopp-card';
            const compFull = state.data.players.find(q => q.player === c.player && q.season === c.season);
            card.href = compFull ? playerUrl(compFull) : `?player=${slugify(c.player, c.season)}`;
            card.title = `${c.player} ${c.season} — Distance ${c.distance.toFixed(2)} across ${c.shared_metrics} shared metrics`;

            const sim = compSimilarityTier(c.distance);
            const match = compMatchStrength(c.shared_metrics);

            // Header pieces (name / meta / bucket badge)
            const header = document.createElement('div');
            header.innerHTML =
                `<div class="name">${c.player}</div>` +
                `<div class="meta">${c.season} · ${c.position || '—'}</div>` +
                `<span class="bucket-badge">${c.bucket}</span>`;
            card.appendChild(header);

            // Shared tag pills (intersection with focal player). state.currentPlayer
            // is set in renderPlayerView before any comp cards render.
            const focal = state.currentPlayer;
            const sharedTags = (focal && compFull) ? rankSharedTags(focal, compFull, 3) : [];
            if (sharedTags.length) {
                const row = document.createElement('div');
                row.className = 'comp-tags';
                sharedTags.forEach(slug => {
                    const pill = buildTagPill(slug);
                    if (!pill) return;
                    pill.classList.add('comp-tag-pill');
                    // Stop the click from bubbling to the card's
                    // navigate-to-comp handler — the pill has its own action
                    // (filter dashboard by tag).
                    pill.addEventListener('click', e => e.stopPropagation());
                    row.appendChild(pill);
                });
                card.appendChild(row);
            } else {
                const fallback = document.createElement('div');
                fallback.className = 'comp-tags-empty';
                fallback.textContent = 'Similar all-around';
                card.appendChild(fallback);
            }

            // Similarity tier + match strength
            const simEl = document.createElement('div');
            simEl.className = `comp-similarity ${sim.cls}`;
            simEl.textContent = sim.label;
            card.appendChild(simEl);
            const matchEl = document.createElement('div');
            matchEl.className = 'comp-match';
            matchEl.textContent = match;
            card.appendChild(matchEl);

            card.addEventListener('click', e => {
                if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
                e.preventDefault();
                const cp = state.data.players.find(q => q.player === c.player && q.season === c.season);
                if (cp) navigateToPlayer(cp, { fromComp: true });
            });
            return card;
        }

        // ---- Player view header (back + search typeahead) ----------------
        function attachPlayerViewEvents() {
            const back = document.getElementById('pvBack');
            if (back) back.addEventListener('click', navigateToDashboard);

            const sEl = document.getElementById('pvSearch');
            const sClear = document.getElementById('pvSearchClear');
            if (!sEl) return;
            sEl.addEventListener('input', e => {
                const raw = e.target.value;
                sClear.hidden = raw.length === 0;
                renderPvSuggestions(raw.trim());
            });
            sEl.addEventListener('keydown', e => {
                const box = document.getElementById('pvSearchSuggestions');
                if (e.key === 'Escape') {
                    hidePvSuggestions();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (!box.hidden) {
                        const active = box.querySelector('.suggestion.active') || box.querySelector('.suggestion');
                        if (active && active.dataset.pid) pvSelectByPid(active.dataset.pid);
                    }
                } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                    if (box.hidden) return;
                    e.preventDefault();
                    const items = [...box.querySelectorAll('.suggestion')];
                    if (!items.length) return;
                    let idx = items.findIndex(i => i.classList.contains('active'));
                    items.forEach(i => i.classList.remove('active'));
                    idx = e.key === 'ArrowDown'
                        ? (idx + 1) % items.length
                        : (idx <= 0 ? items.length - 1 : idx - 1);
                    items[idx].classList.add('active');
                    items[idx].scrollIntoView({ block: 'nearest' });
                }
            });
            sClear.addEventListener('click', () => {
                sEl.value = '';
                sClear.hidden = true;
                hidePvSuggestions();
                sEl.focus();
            });
            document.addEventListener('click', e => {
                if (!e.target.closest('.pv-search-wrapper')) hidePvSuggestions();
            });
        }

        function renderPvSuggestions(query) {
            const box = document.getElementById('pvSearchSuggestions');
            const sEl = document.getElementById('pvSearch');
            if (!query || query.length < 2) return hidePvSuggestions();
            const ql = query.toLowerCase();
            const all = state.data.players;
            const prefix = [], substring = [];
            for (const p of all) {
                const name = p.player.toLowerCase();
                if (name.startsWith(ql)) prefix.push(p);
                else if (name.includes(ql)) substring.push(p);
                if (prefix.length >= 8) break;
            }
            const merged = prefix.concat(substring).slice(0, 8);
            if (!merged.length) return hidePvSuggestions();
            box.innerHTML = '';
            merged.forEach((p, idx) => {
                const item = document.createElement('div');
                item.className = 'suggestion' + (idx === 0 ? ' active' : '');
                item.dataset.pid = playerId(p);
                item.setAttribute('role', 'option');
                const name = document.createElement('span');
                name.className = 'name';
                name.textContent = p.player;
                const meta = document.createElement('span');
                meta.className = 'meta';
                const yr = document.createElement('span');
                yr.textContent = p.season;
                const badge = document.createElement('span');
                badge.className = 'bucket-badge';
                badge.textContent = p.bucket;
                meta.appendChild(yr);
                meta.appendChild(badge);
                item.appendChild(name);
                item.appendChild(meta);
                item.addEventListener('mousedown', e => {
                    e.preventDefault();
                    pvSelectByPid(item.dataset.pid);
                });
                box.appendChild(item);
            });
            box.hidden = false;
            sEl.setAttribute('aria-expanded', 'true');
        }

        function hidePvSuggestions() {
            const box = document.getElementById('pvSearchSuggestions');
            if (!box) return;
            box.hidden = true;
            box.innerHTML = '';
            const sEl = document.getElementById('pvSearch');
            if (sEl) sEl.setAttribute('aria-expanded', 'false');
        }

        function pvSelectByPid(pid) {
            const sep = pid.lastIndexOf('|');
            const name = pid.slice(0, sep);
            const season = parseInt(pid.slice(sep + 1), 10);
            const target = state.data.players.find(p => p.player === name && p.season === season);
            if (!target) return;
            navigateToPlayer(target, { fromComp: false });
        }

        function applyBucketFilter(bucket) {
            state.filters.bucket = bucket;
            document.getElementById('bucket').value = bucket;
            applyFilters();
        }

        function applySeasonFilter(year) {
            state.filters.seasonMin = year;
            state.filters.seasonMax = year;
            document.getElementById('seasonMin').value = year;
            document.getElementById('seasonMax').value = year;
            applyFilters();
        }

        function applySortByCategory(key) {
            state.sort.key = key;
            state.sort.dir = 'best';
            document.getElementById('sort').value = key;
            renderHeader();
            applyFilters();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyScoreSimilarity(scoreKey, scoreValue) {
            const v = Number(scoreValue);
            if (!isFinite(v)) return;
            state.filters.similarity = {
                key: 'score:' + scoreKey,
                center: v.toFixed(1),
                min: v - SCORE_SIMILARITY_TOL,
                max: v + SCORE_SIMILARITY_TOL,
                tol: SCORE_SIMILARITY_TOL,
            };
            applyFilters();
        }

        function applySimilarity(key, rawValue) {
            const tol = SIMILARITY_TOLERANCE[key];
            if (tol == null) return;
            const v = Number(rawValue);
            if (!isFinite(v)) return;
            const decimals = (key === 'wingspan_to_height' || key === 'reach_to_height') ? 3 :
                             (key === 'hand_area') ? 2 :
                             (key.includes('Sprint') || key.includes('Agility')) ? 2 :
                             (/Hand/.test(key) ||
                              key === 'Wingspan (in)' ||
                              key === 'Standing reach (in)' ||
                              key === 'Height without shoes (in)') ? 2 :
                             (key === 'Body Fat %') ? 1 : 1;
            state.filters.similarity = {
                key,
                center: v.toFixed(decimals),
                min: v - tol,
                max: v + tol,
            };
            // Don't auto-clear the season filter: user might want similar players
            // within the current season window. But the chip is the only signal
            // they need to clear it.
            applyFilters();
        }

        function cssEscape(s) {
            // Minimal escaping for our pid format (player|season)
            return s.replace(/["\\]/g, '\\$&');
        }

        function buildRow(p, rank, isExpandedRow) {
            const tr = document.createElement('tr');
            tr.dataset.pid = playerId(p);
            if (isExpandedRow) tr.classList.add('expanded');

            const tagColKeys = activeTagColumnKeys();
            getEffectiveColumns().forEach(h => {
                const td = document.createElement('td');
                if (h.cls) td.className = h.cls;
                if (h.key === state.sort.key) td.classList.add('sorted-by');
                if (h.key === 'rank') {
                    td.textContent = rank;
                } else if (h.key === 'player') {
                    td.classList.add('player');
                    const name = document.createElement('span');
                    name.className = 'player-name clickable-name';
                    name.textContent = p.player;
                    name.title = 'Open player details';
                    name.addEventListener('click', e => {
                        e.stopPropagation();
                        navigateToPlayer(p);
                    });
                    const meta = document.createElement('div');
                    meta.className = 'player-meta';
                    const seasonPill = document.createElement('span');
                    seasonPill.className = 'season-pill';
                    seasonPill.textContent = p.season;
                    seasonPill.title = `Filter to ${p.season}`;
                    seasonPill.addEventListener('click', e => {
                        e.stopPropagation();
                        applySeasonFilter(p.season);
                    });
                    meta.appendChild(seasonPill);
                    meta.appendChild(document.createTextNode(` · ${p.position || '—'}`));
                    const badge = document.createElement('span');
                    badge.className = 'bucket-badge clickable';
                    badge.textContent = p.bucket;
                    badge.title = `Filter to ${p.bucket}`;
                    badge.addEventListener('click', e => {
                        e.stopPropagation();
                        applyBucketFilter(p.bucket);
                    });
                    meta.appendChild(badge);
                    td.appendChild(name);
                    td.appendChild(meta);
                } else if (h.type === 'score') {
                    td.classList.add('cell-score');
                    const v = p.scores[h.key];
                    applyHeat(td, v);
                    if (v == null) {
                        td.innerHTML = '<span class="nodata">—</span>';
                    } else {
                        const span = document.createElement('span');
                        span.className = 'val clickable';
                        span.textContent = v.toFixed(1);
                        span.title = `Find players within ±5 of this ${SCORE_LABELS[h.key]}`;
                        span.addEventListener('click', e => {
                            e.stopPropagation();
                            applyScoreSimilarity(h.key, v);
                        });
                        td.appendChild(span);
                    }
                } else if (h.type === 'metric') {
                    td.classList.add('cell-metric');
                    const m = p.metrics[h.key];
                    if (!m || m.raw == null) {
                        td.innerHTML = '<span class="nodata">—</span>';
                    } else {
                        applyHeat(td, m.pct);
                        const span = document.createElement('span');
                        span.className = 'val';
                        span.textContent = fmtMetric(p, h.key);
                        if (SIMILARITY_TOLERANCE[h.key] != null) {
                            span.classList.add('clickable');
                            span.title = `Find players with similar ${METRIC_LABELS[h.key] || h.key}`;
                            span.addEventListener('click', e => {
                                e.stopPropagation();
                                applySimilarity(h.key, m.raw);
                            });
                        }
                        td.appendChild(span);
                        if (m.pct != null) {
                            const pct = document.createElement('span');
                            pct.className = 'pct';
                            pct.textContent = `${m.pct.toFixed(0)}%ile`;
                            td.appendChild(pct);
                        }
                    }
                } else if (h.type === 'workouts') {
                    td.classList.add('cell-workouts');
                    const list = p.workouts;
                    if (!list || !list.length) {
                        td.innerHTML = '<span class="nodata">—</span>';
                    } else {
                        td.textContent = String(list.length);
                        td.title = list.join(', ');
                    }
                }
                // Tag-injected column body cells get a softly colored top
                // border so the column reads as "this is the tag-filter
                // column" alongside the header emphasis.
                if (tagColKeys.has(h.key) && h.key !== state.sort.key) {
                    const cat = tagColumnCategory(h.key);
                    if (cat) td.classList.add(`tag-col-${cat}`);
                }
                tr.appendChild(td);
            });

            tr.addEventListener('click', () => navigateToPlayer(p));
            return tr;
        }

        function buildCard(p, isExpandedCard, rank) {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.dataset.pid = playerId(p);

            // Rank corner badge (mobile only via CSS positioning)
            if (rank != null) {
                const rankEl = document.createElement('span');
                rankEl.className = 'card-rank';
                rankEl.textContent = '#' + rank;
                card.appendChild(rankEl);
            }

            const head = document.createElement('div');
            head.className = 'card-head';
            const name = document.createElement('div');
            const meta = document.createElement('div');
            meta.className = 'meta';
            const seasonPill = document.createElement('span');
            seasonPill.className = 'season-pill';
            seasonPill.textContent = p.season;
            seasonPill.addEventListener('click', e => { e.stopPropagation(); applySeasonFilter(p.season); });
            meta.appendChild(seasonPill);
            meta.appendChild(document.createTextNode(` · ${p.position || '—'} · `));
            const bbadge = document.createElement('span');
            bbadge.className = 'bucket-badge clickable';
            bbadge.textContent = p.bucket;
            bbadge.addEventListener('click', e => { e.stopPropagation(); applyBucketFilter(p.bucket); });
            meta.appendChild(bbadge);
            const nameDiv = document.createElement('div');
            nameDiv.className = 'name';
            nameDiv.textContent = p.player;
            name.appendChild(nameDiv);
            name.appendChild(meta);
            head.appendChild(name);
            card.appendChild(head);

            // Active-sort row: prominent metric the user is currently sorting
            // by. Tap opens the sort picker. Click bubbling to card is
            // suppressed so it doesn't navigate away.
            card.appendChild(buildCardSortRow(p));

            // Score quartet (Combine / Anthro / Athletic / Shooting),
            // color-tinted by percentile.
            const sc = document.createElement('div');
            sc.className = 'card-scores';
            ['overall', 'anthro', 'athletic', 'shooting'].forEach(k => {
                const v = p.scores[k];
                const tile = document.createElement('div');
                tile.className = 'card-score';
                applyHeat(tile, v);
                const lab = (k === 'overall') ? 'Combine' : (k.charAt(0).toUpperCase() + k.slice(1));
                tile.innerHTML =
                    `<span class="lab">${lab}</span>` +
                    `<span class="val">${v == null ? '—' : v.toFixed(1)}</span>`;
                sc.appendChild(tile);
            });
            card.appendChild(sc);

            // Top 3 standout metrics by percentile
            const all = Object.entries(p.metrics)
                .filter(([_, m]) => m.pct != null)
                .sort((a, b) => b[1].pct - a[1].pct)
                .slice(0, 3);
            if (all.length) {
                const row = document.createElement('div');
                row.className = 'standout-row';
                all.forEach(([key, m]) => {
                    const pill = document.createElement('span');
                    pill.className = 'standout-pill';
                    pill.textContent = `${METRIC_LABELS[key] || key}: ${m.pct.toFixed(0)}%ile`;
                    row.appendChild(pill);
                });
                card.appendChild(row);
            }

            card.addEventListener('click', () => navigateToPlayer(p));

            if (isExpandedCard) {
                const detail = buildDetailContent(p);
                detail.style.marginTop = '0.875rem';
                card.appendChild(detail);
            }
            return card;
        }

        // The big "Combine Rating · 67.3" or "Wingspan · 7' 4.25'' (85%ile)"
        // row that lives between the player meta and the score quartet on
        // mobile cards. Tappable: opens the sort picker.
        function buildCardSortRow(p) {
            const wrap = document.createElement('div');
            wrap.className = 'card-active-sort clickable';
            wrap.title = 'Tap to change sort';
            const key = state.sort.key;
            // Shorter label for the card row — the value already shows the
            // unit (e.g. "7' 4.25''"), so a redundant "(in)" hurts more
            // than helps. Score keys still get their full label.
            const label = SCORE_LABELS[key] || METRIC_LABELS[key] || key;
            const labelSpan = document.createElement('span');
            labelSpan.className = 'cas-label';
            labelSpan.textContent = label;
            const sep = document.createElement('span');
            sep.className = 'cas-sep';
            sep.textContent = '·';
            const valSpan = document.createElement('span');
            valSpan.className = 'cas-val';

            // Score keys vs metric keys
            if (['overall', 'anthro', 'athletic', 'shooting'].includes(key)) {
                const v = p.scores[key];
                valSpan.textContent = v == null ? '—' : v.toFixed(1);
            } else {
                const m = p.metrics[key];
                if (!m || m.raw == null) {
                    valSpan.textContent = '—';
                } else {
                    valSpan.textContent = fmtMetric(p, key);
                    if (m.pct != null) {
                        const pct = document.createElement('span');
                        pct.className = 'cas-pct';
                        pct.textContent = `(${m.pct.toFixed(0)}%ile)`;
                        valSpan.appendChild(document.createTextNode(' '));
                        valSpan.appendChild(pct);
                    }
                }
            }
            wrap.appendChild(labelSpan);
            wrap.appendChild(sep);
            wrap.appendChild(valSpan);
            wrap.addEventListener('click', e => {
                e.stopPropagation();
                openSortPicker();
            });
            return wrap;
        }

        function buildDetailRow(p) {
            const tr = document.createElement('tr');
            tr.className = 'detail-row';
            const td = document.createElement('td');
            td.colSpan = getEffectiveColumns().length;
            td.appendChild(buildDetailContent(p));
            tr.appendChild(td);
            return tr;
        }

        function buildDetailContent(p) {
            const wrap = document.createElement('div');
            wrap.className = 'detail-panel';

            // Top-row actions: optional "back to previous" link, then close ×
            const actions = document.createElement('div');
            actions.className = 'detail-header-actions';
            if (state.selectionHistory.length > 0) {
                const prevPid = state.selectionHistory[state.selectionHistory.length - 1];
                const sep = prevPid.lastIndexOf('|');
                const prevName = prevPid.slice(0, sep);
                const prevSeason = parseInt(prevPid.slice(sep + 1), 10);
                const back = document.createElement('button');
                back.type = 'button';
                back.className = 'detail-back-link';
                back.textContent = `← Back to ${prevName}`;
                back.title = `Return to ${prevName} (${prevSeason})`;
                back.addEventListener('click', e => {
                    e.stopPropagation();
                    const prev = state.data.players.find(q => q.player === prevName && q.season === prevSeason);
                    if (!prev) return;
                    state.selectionHistory.pop();
                    // keepHistory prevents jumpToTarget from clearing what
                    // remains of the stack.
                    jumpToTarget(prev, { keepHistory: true });
                });
                actions.appendChild(back);
            }
            const closeBtn = document.createElement('button');
            closeBtn.type = 'button';
            closeBtn.className = 'detail-close';
            closeBtn.textContent = '×';
            closeBtn.title = 'Close player detail';
            closeBtn.setAttribute('aria-label', 'Close player detail');
            closeBtn.addEventListener('click', e => {
                e.stopPropagation();
                state.selected = null;
                state.selectionHistory = [];
                render();
                syncUrl();
                updateBackToSelectedButton();
                hideSelectionBanner();
            });
            actions.appendChild(closeBtn);
            wrap.appendChild(actions);

            // Score summary — category tiles are clickable to sort by that category
            const summary = document.createElement('div');
            summary.className = 'detail-section full';
            summary.innerHTML = `<h3>Position-cohort scores · ${p.bucket}</h3>`;
            const sc = document.createElement('div');
            sc.className = 'scores-summary';
            const orderedScores = [
                ['overall','Combine Rating'], ['anthro','Anthro'],
                ['athletic','Athletic'], ['shooting','Shooting'],
            ];
            orderedScores.forEach(([k, label]) => {
                const v = p.scores[k];
                const tile = document.createElement('div');
                tile.className = `score-tile ${k === 'overall' ? 'overall' : ''} clickable`;
                applyHeat(tile, v);
                tile.title = `Sort leaderboard by ${label} (desc)`;
                tile.innerHTML = `<div class="label">${label}</div><div class="value">${v == null ? '—' : v.toFixed(1)}</div>`;
                tile.addEventListener('click', e => {
                    e.stopPropagation();
                    applySortByCategory(k);
                });
                sc.appendChild(tile);
            });
            summary.appendChild(sc);
            wrap.appendChild(summary);

            wrap.appendChild(buildMetricSection('Anthro', ANTHRO_KEYS, p));
            wrap.appendChild(buildMetricSection('Athletic', ATHLETIC_KEYS, p));

            // Ratios — only render if at least one ratio has data
            const hasRatio = RATIO_KEYS.some(k => p.metrics[k] && p.metrics[k].raw != null);
            if (hasRatio) {
                const ratios = buildMetricSection('Ratios', RATIO_KEYS, p);
                ratios.classList.add('full');
                wrap.appendChild(ratios);
            }

            // Shooting sub-tables
            const shotSection = buildShootingSection(p);
            if (shotSection) wrap.appendChild(shotSection);

            // Doppelgängers
            if (p.doppelgangers && p.doppelgangers.length) {
                const sect = document.createElement('div');
                sect.className = 'detail-section full';
                sect.innerHTML = '<h3>Closest historical comps</h3>';
                const helper = document.createElement('div');
                helper.className = 'pv-comps-helper';
                helper.textContent =
                    'Players with the most similar combine measurements, scored across height, length, athletic drills, and ratios.';
                sect.appendChild(helper);
                const grid = document.createElement('div');
                grid.className = 'dopp-grid';
                p.doppelgangers.forEach(c => grid.appendChild(buildCompCard(c)));
                sect.appendChild(grid);
                wrap.appendChild(sect);
            }

            return wrap;
        }

        function buildMetricSection(title, keys, p) {
            const sect = document.createElement('div');
            sect.className = 'detail-section';
            sect.innerHTML = `<h3>${title}</h3>`;
            const grid = document.createElement('div');
            grid.className = 'metric-grid';
            keys.forEach(key => {
                if (!(key in p.metrics)) return;
                const m = p.metrics[key];
                const cell = document.createElement('div');
                cell.className = 'metric-cell';
                if (m) applyHeat(cell, m.pct);

                const nameSpan = document.createElement('span');
                nameSpan.className = 'name';
                nameSpan.textContent = METRIC_LABELS[key] || key;

                const valWrap = document.createElement('span');
                const v = document.createElement('span');
                v.className = 'v';
                v.textContent = m && m.raw != null ? fmtMetric(p, key) : '—';
                if (m && m.raw != null && SIMILARITY_TOLERANCE[key] != null) {
                    v.classList.add('clickable');
                    v.title = `Find players with similar ${METRIC_LABELS[key] || key}`;
                    v.addEventListener('click', e => {
                        e.stopPropagation();
                        applySimilarity(key, m.raw);
                    });
                }
                const pct = document.createElement('span');
                pct.className = 'pct';
                pct.textContent = m && m.pct != null ? `${m.pct.toFixed(0)}%ile` : '';

                valWrap.appendChild(v);
                valWrap.appendChild(pct);
                cell.appendChild(nameSpan);
                cell.appendChild(valWrap);
                grid.appendChild(cell);
            });
            sect.appendChild(grid);
            return sect;
        }

        function buildShootingSection(p) {
            // For each layout family, render a sub-table only if the player has at
            // least one drill recorded in that family.
            const blocks = [];
            SHOT_LAYOUTS.forEach(layout => {
                if (layout.twoCells) {
                    const cells = layout.twoCells.map(c => {
                        const drillName = `${layout.family} ${c.match}`;
                        return { label: c.label, drill: p.drills[drillName] };
                    });
                    if (cells.every(c => !c.drill)) return;
                    const block = document.createElement('div');
                    block.className = 'shot-block';
                    block.innerHTML = `<h4>${layout.title}</h4>`;
                    const grid = document.createElement('div');
                    grid.className = 'shot-table cols-2';
                    cells.forEach(c => {
                        const wrap = document.createElement('div');
                        wrap.className = 'shot-twocell-cell';
                        const lbl = document.createElement('div');
                        lbl.className = 'shot-twocell-label';
                        lbl.textContent = c.label;
                        wrap.appendChild(lbl);
                        wrap.appendChild(buildShotCell(c.drill));
                        grid.appendChild(wrap);
                    });
                    block.appendChild(grid);
                    blocks.push(block);
                    return;
                }

                // Per-range decision:
                //   PER-POSITION mode if any per-position cell has data
                //   (pre-2021 breakdown), else AGGREGATE mode if the synthetic
                //   "<family> <range> All" cell has data (2021+ totals
                //   shipped as the whole-drill number), else the range has
                //   no data and is skipped.
                const rangeModes = layout.ranges.map(r => {
                    const perPos = layout.spots.map(s => p.drills[`${layout.family} ${r.match} ${s.match}`]);
                    const anyPerPos = perPos.some(Boolean);
                    if (anyPerPos) return { range: r, mode: 'per', cells: perPos };
                    const all = p.drills[`${layout.family} ${r.match} All`];
                    if (all) return { range: r, mode: 'agg', all };
                    return { range: r, mode: 'empty' };
                }).filter(rm => rm.mode !== 'empty');
                if (!rangeModes.length) return;

                // No player in the dataset mixes per-position and aggregate
                // rows within a single family — they're either pre-2021 (all
                // per-position) or 2021+ (all aggregate). Pick the family's
                // header style from the first live range and trust it.
                const familyMode = rangeModes[0].mode;

                const block = document.createElement('div');
                block.className = 'shot-block';
                block.innerHTML = `<h4>${layout.title}</h4>`;

                if (familyMode === 'agg') {
                    // Single wide column per row: row label on the left,
                    // single "All positions" cell on the right.
                    const colHead = document.createElement('div');
                    colHead.className = 'shot-col-headers cols-1';
                    const blank = document.createElement('span'); colHead.appendChild(blank);
                    const allHead = document.createElement('span');
                    allHead.textContent = 'All positions';
                    colHead.appendChild(allHead);
                    block.appendChild(colHead);

                    const grid = document.createElement('div');
                    grid.className = 'shot-table cols-1';
                    rangeModes.forEach(rm => {
                        const lbl = document.createElement('div');
                        lbl.className = 'shot-row-label';
                        lbl.textContent = rm.range.label;
                        grid.appendChild(lbl);
                        grid.appendChild(buildShotCell(rm.all));
                    });
                    block.appendChild(grid);
                    blocks.push(block);
                    return;
                }

                // PER-POSITION (existing behavior)
                const colsCls = `cols-${layout.spots.length}`;

                const colHead = document.createElement('div');
                colHead.className = `shot-col-headers ${colsCls}`;
                const blank = document.createElement('span');
                colHead.appendChild(blank);
                layout.spots.forEach(s => {
                    const span = document.createElement('span');
                    span.textContent = s.label;
                    colHead.appendChild(span);
                });
                block.appendChild(colHead);

                const grid = document.createElement('div');
                grid.className = `shot-table ${colsCls}`;
                rangeModes.forEach(rm => {
                    const lbl = document.createElement('div');
                    lbl.className = 'shot-row-label';
                    lbl.textContent = rm.range.label;
                    grid.appendChild(lbl);
                    layout.spots.forEach((s, i) => {
                        grid.appendChild(buildShotCell(rm.cells[i]));
                    });
                });
                block.appendChild(grid);
                blocks.push(block);
            });

            if (!blocks.length) {
                if (p.shooting && p.shooting.attempts) {
                    const sect = document.createElement('div');
                    sect.className = 'detail-section full';
                    sect.innerHTML = `<h3>Shooting</h3>` +
                        `<div style="font-size:0.875rem;color:var(--text-secondary)">` +
                            `${p.shooting.made}/${p.shooting.attempts}` +
                            `${p.shooting.pct != null ? ' (' + p.shooting.pct.toFixed(1) + '%)' : ''}` +
                        `</div>`;
                    return sect;
                }
                return null;
            }

            const sect = document.createElement('div');
            sect.className = 'detail-section full';
            sect.innerHTML = '<h3>Shooting drills</h3>';
            blocks.forEach(b => sect.appendChild(b));
            return sect;
        }

        function buildShotCell(drill) {
            const cell = document.createElement('div');
            if (!drill) {
                cell.className = 'shot-cell empty';
                cell.innerHTML = `<div class="pct">—</div>`;
                return cell;
            }
            cell.className = 'shot-cell';
            applyHeat(cell, drill.rank_pct);
            const pctTxt = drill.pct == null ? '—' : `${drill.pct.toFixed(0)}%`;
            cell.innerHTML =
                `<div class="pct">${pctTxt}</div>` +
                `<div class="ratio">${drill.made}/${drill.att}</div>` +
                (drill.rank_pct != null
                    ? `<div class="pctile">${drill.rank_pct.toFixed(0)}%ile</div>`
                    : '');
            return cell;
        }

        // ---- Loading / error UI -------------------------------------------
        const CONTROL_IDS = ['search','bucket','seasonMin','seasonMax','sort',
                             'resetAll','advToggle','advAdd','advClear'];
        function setControlsDisabled(disabled) {
            CONTROL_IDS.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = disabled;
            });
        }
        function setStatus(status) {
            document.getElementById('content').dataset.status = status;
        }
        function showLoadingPlaceholder() {
            const el = document.getElementById('emptyState');
            el.innerHTML =
                '<div class="empty-loading">' +
                  '<div class="spinner"></div>' +
                  '<div class="empty-msg">Loading combine data…</div>' +
                '</div>';
            el.style.display = '';
        }
        function showErrorPlaceholder(message) {
            const el = document.getElementById('emptyState');
            el.innerHTML = '';
            const msg = document.createElement('div');
            msg.className = 'empty-msg empty-error';
            msg.textContent = 'Could not load combine data.';
            const detail = document.createElement('div');
            detail.className = 'empty-error-detail';
            detail.textContent = message;
            const actions = document.createElement('div');
            actions.className = 'empty-actions';
            const retry = document.createElement('button');
            retry.type = 'button';
            retry.className = 'empty-action';
            retry.textContent = 'Retry';
            retry.addEventListener('click', loadData);
            actions.appendChild(retry);
            el.appendChild(msg);
            el.appendChild(detail);
            el.appendChild(actions);
            el.style.display = '';
        }

        function loadData() {
            setStatus('loading');
            setControlsDisabled(true);
            showLoadingPlaceholder();
            fetch('data/combine.json', { cache: 'no-cache' })
                .then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(data => {
                    setStatus('ready');
                    setControlsDisabled(false);
                    init(data);
                })
                .catch(err => {
                    setStatus('error');
                    // Keep controls disabled while broken so the user can't
                    // poke filters that have no data behind them.
                    setControlsDisabled(true);
                    showErrorPlaceholder(err && err.message ? err.message : String(err));
                });
        }

        loadData();
    </script>
</body>
</html>
