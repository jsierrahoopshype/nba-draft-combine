<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Draft Prospect Central | HoopsMatic</title>
    <meta name="description" content="Explore measurements, athletic scores, shooting drills, and historical comparisons for every NBA Draft Combine attendee since 2000.">
    <meta property="og:title" content="NBA Draft Prospect Central | HoopsMatic">
    <meta property="og:description" content="Explore measurements, athletic scores, shooting drills, and historical comparisons for every NBA Draft Combine attendee since 2000.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="NBA Draft Prospect Central | HoopsMatic">
    <meta name="twitter:description" content="Explore measurements, athletic scores, shooting drills, and historical comparisons for every NBA Draft Combine attendee since 2000.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface-hover: #f0f0f2;
            --border: #d1d1d6;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent: #3b82f6;
            --accent-dim: rgba(59, 130, 246, 0.15);
            --green: #34c759;
            --green-dim: rgba(52, 199, 89, 0.15);
            --green-strong: rgba(52, 199, 89, 0.35);
            --orange: #f59e0b;
            --orange-dim: rgba(245, 158, 11, 0.15);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.15);
            --red-strong: rgba(239, 68, 68, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* View visibility — controlled by data-view on body */
        body[data-view="player"] #dashboardView { display: none; }
        body[data-view="dashboard"] #playerView { display: none; }

        /* ---- Player view ------------------------------------------------ */
        .pv-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .pv-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.5rem 0.875rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .pv-back:hover { color: var(--accent); border-color: var(--accent); }
        .pv-back-arrow { font-size: 1rem; line-height: 1; }
        .pv-search-wrapper {
            flex: 1;
            max-width: 28rem;
        }

        .pv-hero {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1.5rem;
            align-items: end;
            padding: 1rem 0 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .pv-hero-name {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 0.4rem;
        }
        .pv-hero-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9375rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }
        .pv-hero-meta .bucket-badge { font-size: 0.6875rem; }
        .pv-hero-rating {
            text-align: right;
        }
        .pv-hero-rating-label {
            font-size: 0.6875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .pv-hero-rating-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.75rem;
            font-weight: 700;
            line-height: 1;
            padding: 0.4rem 0.875rem;
            border-radius: 10px;
            display: inline-block;
        }

        .pv-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .pv-section h2 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.875rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent);
        }
        .pv-grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .pv-grid-2col > .pv-section { margin-bottom: 0; }
        .pv-comps-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.875rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent);
        }
        .pv-comps-header h2 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin: 0;
            padding: 0;
            border: 0;
        }
        .pv-back-prev {
            font-size: 0.75rem;
            color: var(--accent);
            text-decoration: none;
            background: transparent;
            border: 0;
            cursor: pointer;
            font-family: inherit;
            padding: 0;
        }
        .pv-back-prev:hover { text-decoration: underline; }
        .pv-footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 1.25rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .pv-not-found {
            text-align: center;
            padding: 4rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .pv-not-found-msg {
            font-size: 1.125rem;
            color: var(--text);
            margin-bottom: 1rem;
        }
        .pv-not-found-detail {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .pv-not-found .pv-back { margin: 0 auto; }

        .pv-season-tabs {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .pv-season-tabs-label {
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 600;
            margin-right: 0.25rem;
        }
        .pv-season-tab {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            padding: 0.4rem 0.75rem;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s, color 0.12s;
        }
        .pv-season-tab:hover { border-color: var(--accent); color: var(--accent); }
        .pv-season-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            cursor: default;
        }
        .pv-missing-season {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            padding: 0.625rem 0.875rem;
            border-radius: 6px;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .pv-header { flex-direction: column; align-items: stretch; gap: 0.75rem; }
            .pv-search-wrapper { max-width: 100%; }
            /* Compact hero on mobile: name + Combine Rating share one row,
               meta line stretches across the row below. heroLeft uses
               display:contents so its children participate directly in
               the parent grid. */
            .pv-hero {
                display: grid;
                grid-template-columns: 1fr auto;
                grid-template-areas:
                    "name rating"
                    "meta meta";
                gap: 0.3rem 0.875rem;
                align-items: baseline;
                padding: 0.75rem 0 1rem;
                margin-bottom: 1rem;
            }
            .pv-hero-left { display: contents; }
            .pv-hero-name {
                grid-area: name;
                font-size: 1.5rem;
                margin-bottom: 0;
                line-height: 1.15;
            }
            .pv-hero-meta {
                grid-area: meta;
                font-size: 0.8125rem;
            }
            .pv-hero-rating {
                grid-area: rating;
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                text-align: right;
                gap: 0.1rem;
            }
            .pv-hero-rating-label {
                font-size: 0.5625rem;
                margin-bottom: 0;
            }
            .pv-hero-rating-value {
                font-size: 1.5rem;
                padding: 0.2rem 0.5rem;
                border-radius: 6px;
            }
            /* Score-tile section: drop the "Position-cohort scores ·" h2,
               keep 4 tiles in one row, tighten padding. */
            .pv-section-scores { padding: 0.75rem; }
            .pv-section-scores h2 { display: none; }
            .scores-summary {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.375rem;
                margin-bottom: 0;
            }
            .pv-section-scores .score-tile {
                padding: 0.4rem 0.25rem;
            }
            .pv-section-scores .score-tile .label {
                font-size: 0.5rem;
                margin-bottom: 0.15rem;
            }
            .pv-section-scores .score-tile .value {
                font-size: 1rem;
            }
            .pv-grid-2col { grid-template-columns: 1fr; }
        }


        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9375rem;
        }

        /* Filter bar */
        .filters {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding: 0.75rem 0 1rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .filter-row {
            display: grid;
            grid-template-columns: 2fr 1.1fr 1.4fr 1.3fr auto;
            gap: 0.75rem;
            align-items: end;
        }

        /* Mobile filters toggle — hidden on desktop, shown <=768px */
        .filters-toggle { display: none; }

        .filter-group { display: flex; flex-direction: column; gap: 0.375rem; }

        .filter-group label {
            font-size: 0.6875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        input[type="text"], select {
            width: 100%;
            padding: 0.55rem 0.875rem;
            font-size: 0.875rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            transition: all 0.15s;
        }

        input[type="text"]:hover, select:hover { border-color: var(--accent); }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .reset-group { justify-self: end; align-self: end; }
        .reset-btn {
            padding: 0.55rem 0.875rem;
            font-size: 0.75rem;
            font-family: inherit;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .reset-btn:hover {
            color: var(--text);
            border-color: var(--text-secondary);
            background: var(--surface-hover);
        }
        .reset-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .season-group { min-width: 0; }
        .season-range {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            gap: 0.4rem;
        }
        .season-cell { display: flex; flex-direction: column; gap: 0.375rem; min-width: 0; }
        .season-arrow {
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding-bottom: 0.6rem;
        }

        .filter-summary {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            text-align: right;
        }
        .filter-summary strong { color: var(--text); font-weight: 600; }

        /* Table */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table.leaderboard {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        table.leaderboard thead th {
            background: var(--surface-hover);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-size: 0.6875rem;
            font-weight: 600;
            padding: 0.75rem 0.625rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: color 0.15s;
        }
        table.leaderboard thead th:hover { color: var(--accent); }
        table.leaderboard thead th.active { color: var(--accent); }

        /* Active-sort column emphasis: subtle background tint on header
           and body cells for the column the user is currently sorting by. */
        table.leaderboard thead th.sorted-by {
            background: var(--accent-dim);
            color: var(--accent);
            font-weight: 700;
        }
        table.leaderboard tbody td.sorted-by {
            background: rgba(59, 130, 246, 0.06);
        }
        table.leaderboard thead th .sort-arrow { font-size: 0.6rem; opacity: 0.6; margin-left: 0.2rem; }
        table.leaderboard thead th.player-col { text-align: left; }

        table.leaderboard tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            cursor: pointer;
        }
        table.leaderboard tbody tr:last-child { border-bottom: none; }
        table.leaderboard tbody tr:hover { background: var(--surface-hover); }
        table.leaderboard tbody tr.expanded {
            background: var(--surface-hover);
            box-shadow: inset 3px 0 0 var(--accent);
        }
        .player-card.expanded { box-shadow: inset 3px 0 0 var(--accent); }

        /* Detail-panel close + back row */
        .detail-header-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.5rem;
            grid-column: 1 / -1;
            margin-bottom: -0.5rem;
        }
        .detail-back-link {
            background: transparent;
            border: 0;
            font: inherit;
            font-size: 0.8125rem;
            color: var(--accent);
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .detail-back-link:hover { background: var(--accent-dim); text-decoration: underline; }
        .detail-close {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            width: 1.75rem;
            height: 1.75rem;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0;
            transition: all 0.15s;
        }
        .detail-close:hover { color: var(--red); border-color: var(--red); }

        /* Floating "back to selected" button */
        .back-to-selected {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            z-index: 1500;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 999px;
            padding: 0.55rem 1rem;
            font-family: inherit;
            font-size: 0.8125rem;
            color: var(--text);
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.18s, transform 0.18s;
            pointer-events: none;
            max-width: calc(100vw - 2rem);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .back-to-selected.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

        /* Hidden-by-filters banner */
        .selection-hidden-banner {
            margin-top: 0.75rem;
            border: 1px solid var(--orange);
            border-radius: 8px;
            font-size: 0.875rem;
            background: var(--surface);
            overflow: hidden;
        }
        .selection-hidden-banner .banner-top {
            padding: 0.875rem 1rem;
            background: var(--orange-dim);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .selection-hidden-banner .msg { color: var(--text); flex: 1; min-width: 0; }
        .selection-hidden-banner .actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .selection-hidden-banner .banner-detail {
            border-top: 1px solid var(--orange);
            background: var(--bg);
        }
        .selection-hidden-banner .banner-detail .detail-panel {
            padding: 1.25rem 1.25rem 1.5rem;
        }
        .selection-hidden-banner button {
            padding: 0.4rem 0.75rem;
            font-size: 0.8125rem;
            font-family: inherit;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
        }
        .selection-hidden-banner button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .selection-hidden-banner .close-btn:hover {
            border-color: var(--red);
            color: var(--red);
        }

        table.leaderboard td {
            padding: 0.6rem 0.625rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            white-space: nowrap;
        }
        table.leaderboard td.rank {
            color: var(--text-secondary);
            font-size: 0.8125rem;
            width: 3rem;
        }
        table.leaderboard td.player {
            text-align: left;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            color: var(--text);
            max-width: 18rem;
        }
        .player-name { font-weight: 600; }
        .player-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .bucket-badge {
            display: inline-block;
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            background: var(--accent-dim);
            color: var(--accent);
            margin-left: 0.375rem;
            vertical-align: middle;
        }

        td.cell-score, td.cell-metric { position: relative; }
        td.cell-score .pct,
        td.cell-metric .pct {
            display: block;
            font-size: 0.625rem;
            color: var(--text-secondary);
            margin-top: 0.1rem;
        }

        .nodata { font-style: italic; color: var(--text-secondary); font-family: 'DM Sans', sans-serif; }

        /* Heat colors via inline background-color attribute would be cleaner, but we apply via class to keep lighter DOM */
        /* Heat colors are now applied as inline background-color via applyHeat()
           so the tint scales continuously with percentile. */

        /* Expanded panel */
        tr.detail-row > td {
            padding: 0;
            background: var(--bg);
        }
        .detail-panel {
            padding: 1.25rem 1.25rem 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .detail-panel h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid var(--accent);
        }
        .detail-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
        .detail-section.full { grid-column: 1 / -1; }

        .scores-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.625rem;
            margin-bottom: 0.5rem;
        }
        .score-tile {
            text-align: center;
            padding: 0.75rem 0.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .score-tile .label {
            font-size: 0.625rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .score-tile .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .score-tile.overall { background: var(--accent-dim); border-color: var(--accent); }
        .score-tile.overall .value { color: var(--accent); }

        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.4rem;
        }
        .metric-cell {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.625rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.8125rem;
        }
        .metric-cell .name { color: var(--text-secondary); }
        .metric-cell .v {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }
        .metric-cell .pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-secondary);
            margin-left: 0.5rem;
        }

        .drill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 0.4rem;
        }
        .drill-cell {
            padding: 0.5rem 0.625rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.75rem;
        }
        .drill-cell .name { color: var(--text-secondary); margin-bottom: 0.2rem; line-height: 1.2; }
        .drill-cell .num {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .drill-cell .meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-secondary);
        }

        .standout-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .standout-pill {
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
            border-radius: 999px;
            background: var(--green-dim);
            color: #1d8a40;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
            font-size: 0.9375rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-top: 1rem;
        }
        .empty-state .empty-msg {
            color: var(--text);
            margin-bottom: 1rem;
        }
        .empty-state .empty-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .empty-state .empty-action {
            padding: 0.5rem 0.875rem;
            font-size: 0.8125rem;
            font-family: inherit;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
        }
        .empty-state .empty-action:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }
        .empty-loading { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
        .empty-error { color: var(--red); font-weight: 600; }
        .empty-error-detail {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin: 0.5rem 0 1rem;
        }

        /* Disabled controls during load/error */
        #content[data-status="loading"] select,
        #content[data-status="loading"] input,
        #content[data-status="loading"] button:not(.empty-action),
        #content[data-status="error"]   select,
        #content[data-status="error"]   input,
        #content[data-status="error"]   button:not(.empty-action) {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #content[data-status="loading"] .table-wrap,
        #content[data-status="error"]   .table-wrap { display: none; }
        #content[data-status="loading"] .leaderboard-heading,
        #content[data-status="error"]   .leaderboard-heading { display: none !important; }
        #content[data-status="loading"] .filter-summary,
        #content[data-status="error"]   .filter-summary { visibility: hidden; }
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        .spinner {
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            margin: 0 auto 1rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .footer-stamp { font-family: 'JetBrains Mono', monospace; opacity: 0.8; }

        /* Mobile cards */
        .cards { display: none; }
        .player-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            margin-bottom: 0.625rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .player-card:hover { border-color: var(--accent); }
        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
            gap: 0.5rem;
        }
        .card-head .name { font-weight: 600; font-size: 0.95rem; }
        .card-head .meta { font-size: 0.75rem; color: var(--text-secondary); }

        /* Rank corner (mobile only — display set in mobile media query) */
        .card-rank {
            display: none;
            position: absolute;
            top: 0.625rem;
            right: 0.875rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            font-weight: 500;
            color: var(--text-secondary);
            opacity: 0.85;
        }

        /* Active-sort row on mobile cards (shown via mobile media query) */
        .card-active-sort {
            display: none;
            margin: 0.5rem 0;
            padding: 0.5rem 0.625rem;
            background: var(--surface-hover);
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.15s;
            line-height: 1.3;
        }
        .card-active-sort:hover { background: var(--accent-dim); }
        .card-active-sort .cas-label {
            color: var(--text-secondary);
            font-weight: 500;
        }
        .card-active-sort .cas-sep {
            color: var(--text-secondary);
            margin: 0 0.4rem;
        }
        .card-active-sort .cas-val {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--text);
        }
        .card-active-sort .cas-pct {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 0.8125rem;
        }

        /* Score quartet on mobile cards */
        .card-scores {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.4rem;
            margin: 0.5rem 0 0.625rem;
        }
        .card-score {
            text-align: center;
            padding: 0.4rem 0.25rem;
            border-radius: 6px;
            font-size: 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
        }
        .card-score .lab {
            display: block;
            font-size: 0.5625rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 0.15rem;
        }
        .card-score .val {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
        }

        /* Sort picker bottom sheet (mobile only). Hidden until JS adds the
           .open class. Critical: keep display:none here so the position:
           fixed overlay doesn't cover the page and swallow clicks before
           the user opens the picker. */
        .sort-picker {
            position: fixed;
            inset: 0;
            z-index: 2500;
            display: none;
            flex-direction: column;
            justify-content: flex-end;
        }
        .sort-picker.open { display: flex; }
        .sort-picker-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
            opacity: 0;
            transition: opacity 0.18s;
        }
        .sort-picker.open .sort-picker-backdrop { opacity: 1; }
        .sort-picker-sheet {
            position: relative;
            background: var(--surface);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            padding: 1.25rem 0.5rem 1.5rem;
            transform: translateY(100%);
            transition: transform 0.22s;
            max-height: 75vh;
            overflow-y: auto;
        }
        .sort-picker.open .sort-picker-sheet { transform: translateY(0); }
        .sort-picker-handle {
            width: 2.5rem;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            margin: 0 auto 1rem;
        }
        .sort-picker-title {
            text-align: center;
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        .sort-picker-list {
            display: flex;
            flex-direction: column;
        }
        .sort-picker-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: transparent;
            border: 0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9375rem;
            color: var(--text);
            cursor: pointer;
            text-align: left;
        }
        .sort-picker-item:hover { background: var(--surface-hover); }
        .sort-picker-item.active { color: var(--accent); font-weight: 600; }
        .sort-picker-item .item-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Typeahead suggestions */
        .search-wrapper { position: relative; }
        .search-wrapper input { padding-right: 2rem; }
        .search-clear {
            position: absolute;
            right: 0.55rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1.4rem;
            height: 1.4rem;
            border-radius: 50%;
            border: 0;
            background: var(--surface-hover);
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.12s;
        }
        .search-clear:hover { background: var(--accent-dim); color: var(--accent); }
        .search-note {
            margin-top: 0.4rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-note button {
            background: transparent;
            border: 0;
            font: inherit;
            color: var(--accent);
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .search-note button:hover { color: #2563eb; }

        /* Toasts (top-of-table info banners) */
        .toast-stack {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            pointer-events: none;
            max-width: calc(100vw - 2rem);
        }
        .toast {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            border-radius: 8px;
            padding: 0.55rem 0.875rem;
            font-size: 0.8125rem;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.18s, transform 0.18s;
            pointer-events: auto;
        }
        .toast.in { opacity: 1; transform: translateY(0); }

        /* Row highlight pulse after search jump */
        @keyframes rowFlash {
            0%   { background-color: rgba(59, 130, 246, 0.30); }
            70%  { background-color: rgba(59, 130, 246, 0.30); }
            100% { background-color: transparent; }
        }
        tr.flash > td, .player-card.flash {
            animation: rowFlash 1.2s ease-out;
        }
        .suggestions {
            position: absolute;
            top: calc(100% + 2px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 8px;
            max-height: 320px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .suggestion {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.875rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
            gap: 0.75rem;
        }
        .suggestion:last-child { border-bottom: none; }
        .suggestion:hover, .suggestion.active { background: var(--surface-hover); }
        .suggestion .name { font-weight: 500; color: var(--text); flex: 1; min-width: 0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .suggestion .meta {
            display: flex; gap: 0.4rem; align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .suggestion .meta .bucket-badge { margin: 0; }

        /* Clickable in-row affordances */
        td.cell-score .val.clickable,
        td.cell-metric .val.clickable {
            cursor: pointer;
            border-radius: 4px;
            padding: 1px 3px;
            transition: background 0.12s;
        }
        td.cell-score .val.clickable:hover,
        td.cell-metric .val.clickable:hover {
            background: var(--accent-dim);
            color: var(--accent);
        }
        .clickable-name {
            cursor: pointer;
            transition: color 0.12s;
        }
        .clickable-name:hover {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* Advanced (multi) filter panel */
        .adv-filters { margin-top: 0.5rem; }
        .adv-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: transparent;
            border: 0;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0;
            transition: color 0.15s;
        }
        .adv-toggle:hover { color: var(--accent); }
        .adv-toggle-caret { transition: transform 0.15s; display: inline-block; font-size: 0.75rem; }
        .adv-toggle[aria-expanded="true"] .adv-toggle-caret { transform: rotate(90deg); }
        .adv-count {
            color: var(--accent);
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0;
            text-transform: none;
        }
        .adv-count::before { content: '('; }
        .adv-count::after  { content: ')'; }
        .adv-body {
            margin-top: 0.5rem;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
        }
        .adv-rows { display: flex; flex-direction: column; gap: 0.4rem; }
        .adv-row {
            display: grid;
            grid-template-columns: minmax(0, 2fr) auto minmax(0, 1fr) auto auto;
            gap: 0.4rem;
            align-items: center;
        }
        .adv-row select, .adv-row input {
            padding: 0.4rem 0.6rem;
            font-size: 0.8125rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            min-width: 0;
        }
        .adv-row input {
            font-family: 'JetBrains Mono', monospace;
        }
        .adv-row .adv-unit {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            min-width: 2.4rem;
        }
        .adv-row .adv-remove {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            padding: 0.3rem 0.5rem;
            cursor: pointer;
            font-size: 0.8125rem;
            transition: all 0.15s;
        }
        .adv-row .adv-remove:hover { color: var(--red); border-color: var(--red); }
        .adv-empty {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            padding: 0.25rem 0.1rem;
        }
        .adv-helper {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            padding-left: 0.1rem;
        }
        .adv-row.incomplete {
            opacity: 0.7;
            border-left: 2px solid var(--text-secondary);
            padding-left: 0.35rem;
            transition: opacity 0.15s, border-color 0.15s;
        }
        .adv-row.incomplete .adv-metric:invalid,
        .adv-row.incomplete .adv-value { border-color: var(--text-secondary); }
        .adv-row.row-focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 6px;
            transition: outline-color 0.4s;
        }
        .adv-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.625rem;
        }
        .adv-btn {
            padding: 0.4rem 0.75rem;
            font-size: 0.8125rem;
            font-family: inherit;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            transition: all 0.15s;
        }
        .adv-btn:hover { border-color: var(--accent); color: var(--accent); }
        .adv-btn-add { background: var(--accent-dim); color: var(--accent); border-color: transparent; }
        .adv-btn-add:hover { background: var(--accent); color: white; }
        .adv-btn-clear { color: var(--text-secondary); }
        .adv-btn-clear:hover { color: var(--red); border-color: var(--red); }

        @media (max-width: 768px) {
            .adv-row {
                grid-template-columns: 1fr 1fr;
                grid-template-areas:
                  "metric metric"
                  "op value"
                  "unit remove";
                gap: 0.4rem;
            }
            .adv-row > select:first-child { grid-area: metric; }
            .adv-row > select:nth-of-type(2) { grid-area: op; }
            .adv-row > input { grid-area: value; }
            .adv-row > .adv-unit { grid-area: unit; }
            .adv-row > .adv-remove { grid-area: remove; justify-self: end; }
        }

        /* Active filter chips (similarity, etc.) */
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            background: var(--accent-dim);
            color: var(--accent);
            padding: 0.25rem 0.4rem 0.25rem 0.625rem;
            border-radius: 999px;
            border: 1px solid transparent;
        }
        .chip button {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 0.875rem;
            line-height: 1;
            padding: 0 0.25rem;
            border-radius: 999px;
        }
        .chip button:hover { background: rgba(59, 130, 246, 0.25); }
        .chip .chip-label {
            font-family: inherit;
            font-size: inherit;
            background: transparent;
            border: 0;
            color: inherit;
            cursor: pointer;
            padding: 0;
            text-align: left;
        }
        .chip .chip-label:hover { text-decoration: underline; text-underline-offset: 2px; }
        /* Hide the chips wrapper entirely when there are no chips, so it
           doesn't introduce vertical space. */
        .chips:empty { display: none; }

        /* "Best of YYYY" heading */
        .leaderboard-heading {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.625rem;
            letter-spacing: -0.01em;
        }
        .leaderboard-heading .muted {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
            margin-left: 0.5rem;
        }

        /* Clickable in-detail interactions */
        .clickable {
            cursor: pointer;
            transition: color 0.15s, background 0.15s;
        }
        .clickable:hover { color: var(--accent); }
        .player-card .bucket-badge.clickable:hover,
        td.player .bucket-badge.clickable:hover { filter: brightness(0.92); }

        .player-meta .season-pill {
            cursor: pointer;
            font-weight: 600;
            color: inherit;
            transition: color 0.15s;
        }
        .player-meta .season-pill:hover { color: var(--accent); }

        .score-tile.clickable:hover { box-shadow: 0 0 0 2px var(--accent); }
        .metric-cell .v.clickable { text-decoration: underline dotted var(--text-secondary); text-underline-offset: 3px; }
        .metric-cell .v.clickable:hover { color: var(--accent); text-decoration-color: var(--accent); }

        /* Shooting sub-tables */
        .shot-block { margin-bottom: 1rem; }
        .shot-block:last-child { margin-bottom: 0; }
        .shot-block h4 {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .shot-table {
            display: grid;
            gap: 4px;
        }
        .shot-table.cols-5 { grid-template-columns: 78px repeat(5, minmax(0, 1fr)); }
        .shot-table.cols-3 { grid-template-columns: 78px repeat(3, minmax(0, 1fr)); }
        .shot-table.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
        /* Aggregate-mode row: row label + single wide "All positions" cell. */
        .shot-table.cols-1 { grid-template-columns: 78px minmax(0, 1fr); }
        .shot-col-headers.cols-1 { grid-template-columns: 78px minmax(0, 1fr); }
        .shot-cell {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.45rem 0.4rem;
            text-align: center;
            min-height: 56px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.1rem;
            background: var(--surface);
        }
        .shot-cell .pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
        }
        .shot-cell .ratio,
        .shot-cell .pctile {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            color: var(--text-secondary);
            line-height: 1.1;
        }
        .shot-cell.empty { background: transparent; border-style: dashed; opacity: 0.5; }
        .shot-cell.empty .pct { color: var(--text-secondary); font-weight: 400; }
        .shot-row-label {
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding-right: 0.4rem;
        }
        .shot-col-headers {
            display: grid;
            gap: 4px;
            margin-bottom: 4px;
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .shot-col-headers.cols-5 { grid-template-columns: 78px repeat(5, minmax(0, 1fr)); }
        .shot-col-headers.cols-3 { grid-template-columns: 78px repeat(3, minmax(0, 1fr)); }
        .shot-col-headers > span { text-align: center; }
        .shot-col-headers > span:first-child { text-align: left; }
        .shot-twocell-label {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            font-weight: 600;
            text-align: center;
            margin-bottom: 0.2rem;
        }
        .shot-twocell-cell { display: flex; flex-direction: column; }

        /* Doppelgängers */
        .dopp-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
        }
        .dopp-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.625rem 0.6rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .dopp-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px var(--accent-dim); }
        .dopp-card .name { font-weight: 600; font-size: 0.8125rem; line-height: 1.2; }
        .dopp-card .meta { font-size: 0.6875rem; color: var(--text-secondary); }
        .dopp-card .dist {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }
        .dopp-card .bucket-badge { margin: 0.2rem auto 0; }

        /* Comp similarity tier label (color-coded) and match strength
           subtitle. Replaces the d= / x/13 internal numbers. */
        .dopp-card .comp-similarity {
            margin-top: 0.4rem;
            font-size: 0.6875rem;
            font-weight: 600;
            padding: 0.2rem 0.5rem;
            border-radius: 999px;
            display: inline-block;
        }
        .dopp-card .comp-tier-vsim    { background: var(--green-strong); color: #1b6b30; }
        .dopp-card .comp-tier-sim     { background: var(--green-dim);    color: #1d8a40; }
        .dopp-card .comp-tier-some    { background: var(--surface-hover); color: var(--text-secondary); }
        .dopp-card .comp-tier-loose   { background: var(--orange-dim);   color: #8a5d00; }
        .dopp-card .comp-tier-distant { background: var(--surface-hover); color: var(--text-secondary); opacity: 0.7; }
        .dopp-card .comp-match {
            margin-top: 0.2rem;
            font-size: 0.625rem;
            color: var(--text-secondary);
        }

        /* Helper line above the comp grid */
        .pv-comps-helper {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.875rem;
            line-height: 1.4;
        }
        /* Disclaimer caption above the workout pill grid */
        .pv-workouts-caveat {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-style: italic;
            line-height: 1.4;
            margin-top: -0.375rem;
            margin-bottom: 0.75rem;
        }

        /* Profile tag pills (player view hero + comp cards) ---------------
           Color-coded by category. Negative-side tags share the same color
           as their positive-side counterparts; the label communicates the
           direction, not the color. */
        .profile-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 0.5rem;
            margin: -0.25rem 0 1.5rem;
        }
        .tag-pill {
            border-radius: 999px;
            padding: 0.25rem 0.625rem;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            background: var(--surface-hover);
            color: var(--text);
            transition: filter 0.12s, box-shadow 0.12s;
        }
        .tag-pill:hover { filter: brightness(0.96); box-shadow: 0 0 0 2px rgba(0,0,0,0.05); }
        .tag-pill.tag-anthro   { background: var(--green-dim);  color: #1d8a40; border-color: var(--green); }
        .tag-pill.tag-ratio    { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
        .tag-pill.tag-athletic { background: var(--orange-dim); color: #8a5d00; border-color: var(--orange); }

        /* Comp-card tag intersection */
        .dopp-card .comp-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            justify-content: center;
            margin: 0.4rem 0 0.2rem;
        }
        .dopp-card .comp-tag-pill {
            font-size: 0.625rem;
            padding: 0.15rem 0.45rem;
        }
        .dopp-card .comp-tags-empty {
            font-size: 0.6875rem;
            color: var(--text-secondary);
            font-style: italic;
            margin: 0.4rem 0 0.2rem;
        }

        /* Pre-draft workouts pills (player view) ------------------------- */
        .workout-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .workout-pill {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 0.15rem;
            min-height: 44px;
            padding: 0.4rem 0.875rem;
            border-radius: 999px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.8125rem;
            cursor: pointer;
            transition: filter 0.12s, box-shadow 0.12s;
            justify-content: center;
        }
        .workout-pill:hover { filter: brightness(0.97); box-shadow: 0 0 0 2px rgba(0,0,0,0.05); }
        .workout-pill .wp-team { font-weight: 500; }
        .workout-pill .wp-note {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-secondary);
        }
        .workout-pill.wp-signed {
            background: var(--green-dim);
            border-color: var(--green);
            font-weight: 700;
        }
        .workout-pill.wp-signed .wp-note { color: #1d8a40; }
        .workout-pill.wp-drafted {
            background: var(--accent-dim);
            border-color: var(--accent);
        }
        .workout-pill.wp-drafted .wp-note { color: var(--accent); }
        /* Non-clickable "did not work out" ghost pill */
        .workout-pill.wp-ghost {
            cursor: default;
            opacity: 0.85;
        }
        .workout-pill.wp-ghost:hover { filter: none; box-shadow: none; }

        /* Tag-driven column emphasis on dashboard table — soft category-
           colored top border so users see which column is keyed off the
           active tag filter. Lighter weight than the sort-column .sorted-by
           highlight so the two compose without fighting. */
        table.leaderboard thead th.tag-col-anthro,
        table.leaderboard tbody td.tag-col-anthro   { border-top: 2px solid var(--green); }
        table.leaderboard thead th.tag-col-ratio,
        table.leaderboard tbody td.tag-col-ratio    { border-top: 2px solid var(--accent); }
        table.leaderboard thead th.tag-col-athletic,
        table.leaderboard tbody td.tag-col-athletic { border-top: 2px solid var(--orange); }

        /* Workouts cell on dashboard */
        table.leaderboard tbody td.cell-workouts {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem 0.875rem 3rem; }
            h1 { font-size: 1.25rem; }
            .subtitle { font-size: 0.8125rem; margin-bottom: 1rem; }

            /* Mobile: page title block + collapsed-filters bar are hidden;
               the filter panel renders inline at the top of the view,
               always open. Desktop keeps the original collapse behavior. */
            #dashboardView > h1,
            #dashboardView > p.subtitle,
            #dashboardView > .filters-toggle { display: none; }
            #dashboardView > .filters[data-collapsed="true"] { display: block; }

            /* Filters collapse behind a toggle button on mobile */
            .filters-toggle {
                display: flex;
                width: 100%;
                align-items: center;
                gap: 0.5rem;
                padding: 0.6rem 0.875rem;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                font-family: inherit;
                font-size: 0.8125rem;
                color: var(--text);
                cursor: pointer;
                margin-bottom: 0.75rem;
                text-align: left;
            }
            .filters-toggle .ft-label { font-weight: 600; }
            .filters-toggle .ft-summary {
                flex: 1;
                color: var(--text-secondary);
                font-size: 0.75rem;
                font-family: 'JetBrains Mono', monospace;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .filters-toggle .ft-caret {
                color: var(--text-secondary);
                transition: transform 0.15s;
            }
            .filters-toggle[aria-expanded="true"] .ft-caret { transform: rotate(180deg); }
            .filters[data-collapsed="true"] { display: none; }

            .filter-row {
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
            }
            .filter-row .filter-group:first-child { grid-column: 1 / -1; }
            .filter-row .filter-group:nth-child(4) { grid-column: 1 / -1; }
            .filter-row .reset-group { grid-column: 1 / -1; justify-self: stretch; }
            .reset-btn { width: 100%; }

            .table-wrap { display: none; }
            .cards { display: block; }

            /* Mobile-only card additions */
            .card-rank { display: block; }
            .card-active-sort { display: block; }
            .card-scores { display: grid; }
            .player-card { padding-right: 2.75rem; }  /* room for rank badge */

            .detail-panel { grid-template-columns: 1fr; gap: 0.875rem; padding: 0.875rem; }
            .metric-grid { grid-template-columns: 1fr; }

            .shot-table.cols-5,
            .shot-col-headers.cols-5 { grid-template-columns: 60px repeat(5, minmax(0, 1fr)); }
            .shot-table.cols-3,
            .shot-col-headers.cols-3 { grid-template-columns: 60px repeat(3, minmax(0, 1fr)); }
            .shot-table.cols-1,
            .shot-col-headers.cols-1 { grid-template-columns: 60px minmax(0, 1fr); }
            .shot-cell { min-height: 50px; padding: 0.35rem 0.25rem; }
            .shot-cell .pct { font-size: 0.875rem; }
            .shot-row-label { font-size: 0.6875rem; padding-right: 0.25rem; }

            .dopp-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body data-view="dashboard">

            <div id="content" data-status="loading">

                </button>
                <div class="pv-search-wrapper search-wrapper">
                    <input id="pvSearch" type="text" placeholder="Search another player…" autocomplete="off"
                           role="combobox" aria-autocomplete="list" aria-controls="pvSearchSuggestions" aria-expanded="false">
                    <button id="pvSearchClear" type="button" class="search-clear" aria-label="Clear search" hidden>×</button>

            <div class="sort-picker-backdrop" data-close="1"></div>
            <div class="sort-picker-sheet">
                <div class="sort-picker-handle"></div>
                <div class="sort-picker-title">Sort by</div>
                <div class="sort-picker-list" id="sortPickerList"></div>
            </div>

    </div>

    <script>
        // ---- Column registry --------------------------------------------
        // ALL_COLUMNS holds every column the table knows how to render —
        // both the always-on defaults and the tag-injected ones (Hand area,
        // Weight, Body Fat, Reach:Height, Wingspan:Height, Bench).
        // DEFAULT_COLUMN_ORDER lists which columns render with no sort or
        // tag filter active. v8 (sort first) and v10 (tag-driven injection)
        // both flow through getEffectiveColumns().
        const ALL_COLUMNS = {
            'rank':     { key: 'rank',     label: '#',        sortable: false, cls: 'rank' },
            'player':   { key: 'player',   label: 'Player',   sortable: true,  cls: 'player-col' },
            'overall':  { key: 'overall',  label: 'Combine',  sortable: true,  type: 'score' },
            'anthro':   { key: 'anthro',   label: 'Anthro',   sortable: true,  type: 'score' },
            'athletic': { key: 'athletic', label: 'Athletic', sortable: true,  type: 'score' },
            'shooting': { key: 'shooting', label: 'Shooting', sortable: true,  type: 'score' },
            'Height without shoes (in)': { key: 'Height without shoes (in)', label: 'Height',   sortable: true, type: 'metric', display: 'Height without shoes' },
            'Wingspan (in)':             { key: 'Wingspan (in)',             label: 'Wingspan', sortable: true, type: 'metric', display: 'Wingspan' },
            'Standing reach (in)':       { key: 'Standing reach (in)',       label: 'Reach',    sortable: true, type: 'metric', display: 'Standing reach' },
            'Max Vertical Leap (in)':    { key: 'Max Vertical Leap (in)',    label: 'Max Vert', sortable: true, type: 'metric', unit: '"' },
            '3/4 Court Sprint (sec)':    { key: '3/4 Court Sprint (sec)',    label: 'Sprint',   sortable: true, type: 'metric', unit: 's' },
            'Lane Agility (sec)':        { key: 'Lane Agility (sec)',        label: 'Agility',  sortable: true, type: 'metric', unit: 's' },
            'workouts':                  { key: 'workouts',                  label: 'Workouts', sortable: true, type: 'workouts' },
            // Tag-injected (not in DEFAULT_COLUMN_ORDER; appear only when a
            // tag filter or sort points to them)
            'hand_area':                 { key: 'hand_area',                 label: 'Hand Area',sortable: true, type: 'metric' },
            'Weight (lbs)':              { key: 'Weight (lbs)',              label: 'Weight',   sortable: true, type: 'metric' },
            'Body Fat %':                { key: 'Body Fat %',                label: 'Body Fat', sortable: true, type: 'metric' },
            'reach_to_height':           { key: 'reach_to_height',           label: 'Reach:Ht', sortable: true, type: 'metric' },
            'wingspan_to_height':        { key: 'wingspan_to_height',        label: 'Wing:Ht',  sortable: true, type: 'metric' },
            'Bench Press (reps)':        { key: 'Bench Press (reps)',        label: 'Bench',    sortable: true, type: 'metric' },
        };

        const DEFAULT_COLUMN_ORDER = [
            'rank', 'player',
            'overall', 'anthro', 'athletic', 'shooting',
            'Height without shoes (in)', 'Wingspan (in)', 'Standing reach (in)',
            'Max Vertical Leap (in)', '3/4 Court Sprint (sec)', 'Lane Agility (sec)',
            'workouts',
        ];

        // Tag slug → underlying column key that fires the tag (used for
        // both the dynamic-injection logic and the visual emphasis colors).
        const TAG_TO_COLUMN_KEY = {
            'long-arms':                 'Wingspan (in)',
            'short-arms':                'Wingspan (in)',
            'big-hands':                 'hand_area',
            'small-hands':               'hand_area',
            'tall-frame':                'Height without shoes (in)',
            'short-frame':               'Height without shoes (in)',
            'heavy-build':               'Weight (lbs)',
            'light-frame':               'Weight (lbs)',
            'lean-build':                'Body Fat %',
            'high-body-fat':             'Body Fat %',
            'long-reach':                'reach_to_height',
            'short-reach-for-height':    'reach_to_height',
            'stretchy-wingspan':         'wingspan_to_height',
            'compact-wingspan':          'wingspan_to_height',
            'explosive-jumper':          'Max Vertical Leap (in)',
            'limited-bounce':            'Max Vertical Leap (in)',
            'average-jumper':            'Max Vertical Leap (in)',
            'quick-first-step':          '3/4 Court Sprint (sec)',
            'slower-burst':              '3/4 Court Sprint (sec)',
            'smooth-mover':              'Lane Agility (sec)',
            'limited-lateral-quickness': 'Lane Agility (sec)',
            'strong':                    'Bench Press (reps)',
            'below-average-strength':    'Bench Press (reps)',
        };

        // Compute the columns to render right now. Order:
        //   1. rank, player (always position 0 and 1)
        //   2. Active sort column (if non-default and in ALL_COLUMNS)
        //   3. Tag-driven columns in order of state.filters.tags
        //   4. Remaining DEFAULT_COLUMN_ORDER entries
        // De-duplicated end to end, so the same metric never appears twice.
        function getEffectiveColumns() {
            const front = [];
            const sortKey = state.sort.key;
            // The sort column "moves to position 2" only when it's non-default.
            // 'overall' is the canonical default and stays at index 2 of the
            // remaining defaults — i.e. don't pin it to the front. Any other
            // known sort key gets pinned.
            if (sortKey && sortKey !== 'overall' && ALL_COLUMNS[sortKey]) {
                front.push(sortKey);
            }
            // Tag columns next, preserving application order.
            (state.filters.tags || []).forEach(slug => {
                const colKey = TAG_TO_COLUMN_KEY[slug];
                if (colKey && ALL_COLUMNS[colKey] && !front.includes(colKey)) {
                    front.push(colKey);
                }
            });
            const placed = new Set(['rank', 'player', ...front]);
            const rest = DEFAULT_COLUMN_ORDER.filter(k => !placed.has(k));
            const finalOrder = ['rank', 'player', ...front, ...rest];
            return finalOrder.map(k => ALL_COLUMNS[k]).filter(Boolean);
        }

        // Which tag column keys are currently active (for visual emphasis).
        function activeTagColumnKeys() {
            const set = new Set();
            (state.filters.tags || []).forEach(slug => {
                const colKey = TAG_TO_COLUMN_KEY[slug];
                if (colKey) set.add(colKey);
            });
            return set;
        }

        // Category for the tag-driven column (anthro / ratio / athletic) —
        // used to pick the top-border color on the injected column header.
        function tagColumnCategory(colKey) {
            for (const slug of (state.filters.tags || [])) {
                if (TAG_TO_COLUMN_KEY[slug] === colKey) {
                    const meta = state.data && state.data.tag_meta && state.data.tag_meta[slug];
                    if (meta) return meta.category;
                }
            }
            return null;
        }

        const ANTHRO_KEYS = [
            'Height without shoes (in)', 'Height with shoes (in)', 'Wingspan (in)',
            'Standing reach (in)', 'Weight (lbs)', 'Body Fat %', 'Hand Length (in)', 'Hand Width (in)',
        ];
        const ATHLETIC_KEYS = [
            'Max Vertical Leap (in)', 'Standing Vertical Leap (in)',
            '3/4 Court Sprint (sec)', 'Lane Agility (sec)', 'Modified Lane Agility (sec)', 'Bench Press (reps)',
        ];
        const RATIO_KEYS = ['wingspan_to_height', 'reach_to_height', 'hand_area'];

        const METRIC_LABELS = {
            'Height without shoes (in)': 'Height (no shoes)',
            'Height with shoes (in)': 'Height (shoes)',
            'Wingspan (in)': 'Wingspan',
            'Standing reach (in)': 'Standing reach',
            'Weight (lbs)': 'Weight',
            'Body Fat %': 'Body fat',
            'Hand Length (in)': 'Hand length',
            'Hand Width (in)': 'Hand width',
            'Max Vertical Leap (in)': 'Max vertical',
            'Standing Vertical Leap (in)': 'Standing vertical',
            '3/4 Court Sprint (sec)': '3/4 sprint',
            'Lane Agility (sec)': 'Lane agility',
            'Modified Lane Agility (sec)': 'Mod. lane agility',
            'Bench Press (reps)': 'Bench press',
            'wingspan_to_height': 'Wingspan : Height',
            'reach_to_height': 'Reach : Height',
            'hand_area': 'Hand area',
        };

        const METRIC_DISPLAY_KEYS = {
            'Height without shoes (in)': 'Height without shoes',
            'Wingspan (in)': 'Wingspan',
            'Standing reach (in)': 'Standing reach',
        };

        const METRIC_UNITS = {
            'Body Fat %': '%',
            'Weight (lbs)': ' lbs',
            'Bench Press (reps)': ' reps',
            'Max Vertical Leap (in)': '"',
            'Standing Vertical Leap (in)': '"',
            'Hand Length (in)': '"',
            'Hand Width (in)': '"',
            '3/4 Court Sprint (sec)': 's',
            'Lane Agility (sec)': 's',
            'Modified Lane Agility (sec)': 's',
            'hand_area': ' in²',
