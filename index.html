            const btn = document.getElementById('advToggle');
            const body = document.getElementById('advBody');
            btn.setAttribute('aria-expanded', open ? 'true' : 'false');
            body.hidden = !open;
        }

        function renderMultiFilters() {
            const rows = document.getElementById('advRows');
            const count = document.getElementById('advCount');
            if (!rows) return;
            rows.innerHTML = '';

            const helper = document.createElement('div');
            helper.className = 'adv-helper';
            helper.textContent = 'Stack filters to narrow the table. All filters apply together (AND).';
            rows.appendChild(helper);

            if (!state.filters.multi.length) {
                const empty = document.createElement('div');
                empty.className = 'adv-empty';
                empty.textContent = 'No advanced filters yet. Click "+ Add filter" to stack a condition.';
                rows.appendChild(empty);
            } else {
                state.filters.multi.forEach((f, idx) => {
                    rows.appendChild(buildAdvRow(f, idx));
                });
            }
            // Count = complete (active) rows only
            const activeCount = state.filters.multi.filter(isCompleteFilter).length;
            if (activeCount) { count.hidden = false; count.textContent = `${activeCount} active`; }
            else             { count.hidden = true;  count.textContent = ''; }
            // Auto-open the panel when at least one row exists so the user
            // can see what they've drafted (complete or not).
            if (state.filters.multi.length) setAdvancedOpen(true);
        }

        function buildAdvRow(f, idx) {
            const row = document.createElement('div');
            row.className = 'adv-row';
            row.dataset.rowidx = String(idx);
            if (!isCompleteFilter(f)) row.classList.add('incomplete');

            const metricSel = document.createElement('select');
            metricSel.className = 'adv-metric';
            // "Select metric…" placeholder option (disabled, selected when blank)
            const placeholder = new Option('Select metric…', '');
            placeholder.disabled = true;
            placeholder.selected = !f.metric;
            metricSel.appendChild(placeholder);
            FILTER_METRICS.forEach(k => {
                const label = METRIC_LABELS_WITH_UNITS[k] || METRIC_LABELS[k] || k;
                const opt = new Option(label, k);
                if (k === f.metric) opt.selected = true;
                metricSel.appendChild(opt);
            });
            metricSel.addEventListener('change', () => {
                state.filters.multi[idx].metric = metricSel.value;
                onRowEdited(idx);
            });
            row.appendChild(metricSel);

            const opSel = document.createElement('select');
            opSel.className = 'adv-op';
            ['gte', 'lte', 'eq'].forEach(op => {
                const opt = new Option(OPERATOR_LABEL[op], op);
                if (op === f.op) opt.selected = true;
                opSel.appendChild(opt);
            });
            opSel.addEventListener('change', () => {
                state.filters.multi[idx].op = opSel.value;
                onRowEdited(idx);
            });
            row.appendChild(opSel);

            const valInput = document.createElement('input');
            valInput.type = 'number';
            valInput.min = '0';                         // negatives are nonsensical for our metrics
            valInput.inputMode = 'decimal';
            valInput.placeholder = 'value';
            valInput.className = 'adv-value';
            valInput.step = numericStepFor(f.metric);
            valInput.value = (f.value === '' || f.value == null) ? '' : String(f.value);
            // Select-on-first-focus per session (let subsequent clicks place caret)
            valInput.addEventListener('focus', e => {
                if (e.target.dataset.focused === '1') return;
                e.target.dataset.focused = '1';
                requestAnimationFrame(() => e.target.select());
            });
            valInput.addEventListener('blur', e => { delete e.target.dataset.focused; });
            valInput.addEventListener('input', () => {
                const raw = valInput.value;
                state.filters.multi[idx].value = raw === '' ? '' : Number(raw);
                onRowEdited(idx);
            });
            row.appendChild(valInput);

            const unit = document.createElement('span');
            unit.className = 'adv-unit';
            unit.textContent = metricUnitHint(f.metric);
            row.appendChild(unit);

            const remove = document.createElement('button');
            remove.type = 'button';
            remove.className = 'adv-remove';
            remove.textContent = '×';
            remove.title = 'Remove this filter';
            remove.addEventListener('click', () => {
                state.filters.multi.splice(idx, 1);
                renderMultiFilters();
                onMultiFilterChange();
            });
            row.appendChild(remove);

            return row;
        }

        function numericStepFor(metric) {
            return (metric === 'wingspan_to_height' || metric === 'reach_to_height') ? '0.001' :
                   (metric === 'hand_area') ? '0.5' :
                   (metric && (metric.includes('Sprint') || metric.includes('Agility'))) ? '0.01' :
                   (metric === 'Body Fat %') ? '0.1' : '0.5';
        }

        // After the user edits a single row (metric/op/value): de-duplicate
        // against existing complete rows, then apply.
        function onRowEdited(idx) {
            const f = state.filters.multi[idx];

            // If a row's metric just changed and the value's previous step
            // doesn't suit the new metric, refresh the input step. We re-render
            // wholesale only when state was mutated by dedup; a step refresh
            // can be done in place but it's simpler to re-render once below.

            if (isCompleteFilter(f)) {
                // 1. Same-metric+same-op replacement (only for gte/lte; eq stacks).
                if (f.op === 'gte' || f.op === 'lte') {
                    for (let i = 0; i < state.filters.multi.length; i++) {
                        if (i === idx) continue;
                        const g = state.filters.multi[i];
                        if (!isCompleteFilter(g)) continue;
                        if (g.metric === f.metric && g.op === f.op) {
                            // Drop the old row; the user's most recent edit wins.
                            // Maintain idx so the focused row stays put.
                            state.filters.multi.splice(i, 1);
                            if (i < idx) idx--;
                            showToast('Updated existing filter.', 3000);
                            renderMultiFilters();
                            onMultiFilterChange();
                            return;
                        }
                    }
                }
                // 2. Exact duplicate (metric+op+value) → drop the new one.
                for (let i = 0; i < state.filters.multi.length; i++) {
                    if (i === idx) continue;
                    const g = state.filters.multi[i];
                    if (!isCompleteFilter(g)) continue;
                    if (g.metric === f.metric && g.op === f.op && Number(g.value) === Number(f.value)) {
                        state.filters.multi.splice(idx, 1);
                        showToast('That filter is already active.', 3000);
                        renderMultiFilters();
                        onMultiFilterChange();
                        return;
                    }
                }
            }

            // No dedup; just sync UI state (toggle .incomplete) and re-apply.
            const rowEl = document.querySelector(`.adv-row[data-rowidx="${idx}"]`);
            if (rowEl) rowEl.classList.toggle('incomplete', !isCompleteFilter(f));
            // Refresh the step attribute on the value input if the metric changed
            const valEl = rowEl ? rowEl.querySelector('input.adv-value') : null;
            if (valEl) valEl.step = numericStepFor(f.metric);
            // Refresh the unit hint
            const unitEl = rowEl ? rowEl.querySelector('.adv-unit') : null;
            if (unitEl) unitEl.textContent = metricUnitHint(f.metric);
            onMultiFilterChange();
        }

        function onMultiFilterChange() {
            applyFilters();
            syncUrl();
        }

        function addBlankMultiFilter() {
            state.filters.multi.push({ metric: '', op: 'gte', value: '' });
            renderMultiFilters();
            // Auto-open and scroll the new (last) row into view
            setAdvancedOpen(true);
            requestAnimationFrame(() => {
                const rows = document.querySelectorAll('.adv-row');
                const last = rows[rows.length - 1];
                if (last) {
                    last.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                    const sel = last.querySelector('.adv-metric');
                    if (sel) sel.focus();
                }
            });
        }

        function clearMultiFilters() {
            state.filters.multi = [];
            renderMultiFilters();
            onMultiFilterChange();
        }

        function findHiddenSelectedPlayer() {
            if (state.expanded.size === 0) return null;
            const filteredIds = new Set(state.filtered.map(p => playerId(p)));
            for (const pid of state.expanded) {
                if (!filteredIds.has(pid)) {
                    const sep = pid.lastIndexOf('|');
                    const name = pid.slice(0, sep);
                    const season = parseInt(pid.slice(sep + 1), 10);
                    return state.data.players.find(p => p.player === name && p.season === season) || null;
                }
            }
            return null;
        }

        function renderEmptyState(el, hiddenPlayer) {
            el.innerHTML = '';
            const f = state.filters;

            const msg = document.createElement('div');
            msg.className = 'empty-msg';
            const actions = document.createElement('div');
            actions.className = 'empty-actions';
            const addAction = (label, handler) => {
                const b = document.createElement('button');
                b.type = 'button';
                b.className = 'empty-action';
                b.textContent = label;
                b.addEventListener('click', handler);
                actions.appendChild(b);
            };

            if (hiddenPlayer) {
                msg.textContent = `${hiddenPlayer.player} is hidden by the current filters.`;
                addAction('Clear filters', () => { clearAllFiltersExceptSearch(); });
                addAction('Show selected player anyway', () => { showSelectedAnyway(hiddenPlayer); });
            } else if (f.search) {
                // Does the search match any player at all (ignoring other filters)?
                const ql = f.search.toLowerCase();
                const anyMatch = state.data.players.some(p => p.player.toLowerCase().includes(ql));
                if (!anyMatch) {
                    msg.textContent = `No players match "${f.search}".`;
                    addAction('Clear search', clearSearchOnly);
                } else {
                    msg.textContent = `No players match "${f.search}" with the current filters.`;
                    addAction('Clear search', clearSearchOnly);
                    addAction('Clear filters', clearAllFiltersExceptSearch);
                }
            } else {
                msg.textContent = 'No players match the current filters.';
                addAction('Clear filters', clearAllFiltersExceptSearch);
                addAction('Reset all', resetAll);
            }
            el.appendChild(msg);
            el.appendChild(actions);
        }

        function clearSearchOnly() {
            state.filters.search = '';
            document.getElementById('search').value = '';
            hideSuggestions();
            applyFilters();
        }

        // Clear position, season-narrowing, similarity, multi — but leave the
        // search box alone (user typed it intentionally).
        function clearAllFiltersExceptSearch() {
            const [smin, smax] = state.data.season_range;
            state.filters.bucket = '';
            state.filters.seasonMin = smax;
            state.filters.seasonMax = smax;
            state.filters.similarity = null;
            state.filters.multi = [];
            document.getElementById('bucket').value = '';
            document.getElementById('seasonMin').value = String(smax);
            document.getElementById('seasonMax').value = String(smax);
            renderMultiFilters();
            applyFilters();
            syncUrl();
        }

        function showSelectedAnyway(target) {
            // Broaden seasons to include them; drop bucket if conflicts.
            // Leave search and advanced multi-filters intact (per spec).
            if (target.season < state.filters.seasonMin) {
                state.filters.seasonMin = target.season;
                document.getElementById('seasonMin').value = String(target.season);
            }
            if (target.season > state.filters.seasonMax) {
                state.filters.seasonMax = target.season;
                document.getElementById('seasonMax').value = String(target.season);
            }
            if (state.filters.bucket && state.filters.bucket !== target.bucket) {
                state.filters.bucket = '';
                document.getElementById('bucket').value = '';
            }
            // Clear similarity if it would still hide them
            const sim = state.filters.similarity;
            if (sim) {
                if (sim.key.startsWith('score:')) {
                    const sk = sim.key.slice(6);
                    const sv = target.scores[sk];
                    if (sv == null || sv < sim.min || sv > sim.max) state.filters.similarity = null;
                } else {
                    const m = target.metrics[sim.key];
                    const v = m && m.raw != null ? Number(m.raw) : null;
                    if (v == null || v < sim.min || v > sim.max) state.filters.similarity = null;
                }
            }
            applyFilters();
            syncUrl();
        }

        // Returns the page to its default state. Distinct from "Clear filters"
        // (which only empties the multi-filter rows). Reset all also clears
        // the search box, position dropdown, season range, sort, expanded
        // player, and the URL.
        function resetAll() {
            const [smin, smax] = state.data.season_range;
            state.filters.search = '';
            state.filters.bucket = '';
            state.filters.seasonMin = smax;
            state.filters.seasonMax = smax;
            state.filters.similarity = null;
            state.filters.multi = [];
            state.expanded.clear();
            state.sort.key = 'overall';
            state.sort.dir = 'desc';
            // Sync DOM controls
            const searchEl = document.getElementById('search');
            searchEl.value = '';
            document.getElementById('searchClear').hidden = true;
            hideSearchNote();
            document.getElementById('bucket').value = '';
            document.getElementById('seasonMin').value = String(smax);
            document.getElementById('seasonMax').value = String(smax);
            document.getElementById('sort').value = 'overall';
            hideSuggestions();
            renderHeader();
            renderMultiFilters();
            // Clear URL completely — replaceState so we don't pollute history
            history.replaceState({}, '', window.location.pathname);
            applyFilters();
        }

        function applyDeepLink() {
            // Apply ?player=, ?position=, ?season_start=, ?season_end=,
            // and any multi-filter params from the URL.
            const params = new URL(window.location.href).searchParams;
            const [smin, smax] = state.data.season_range;

            // Multi-filters first
            state.filters.multi = [];
            for (const [k, v] of params.entries()) {
                const m = k.match(/^([a-z]+)_(gte|lte|eq)$/);
                if (!m) continue;
                const pkey = m[1], op = m[2];
                const metric = PARAM_KEY_TO_METRIC[pkey];
                if (!metric) continue;
                const num = Number(v);
                if (!isFinite(num)) continue;
                state.filters.multi.push({ metric, op, value: num });
            }

            // Position
            const pos = params.get('position');
            if (pos === 'Guards' || pos === 'Wings' || pos === 'Bigs') {
                state.filters.bucket = pos;
                document.getElementById('bucket').value = pos;
            }

            // Season range — explicit overrides everything
            const ssRaw = params.get('season_start');
            const seRaw = params.get('season_end');
            const ss = ssRaw ? parseInt(ssRaw, 10) : null;
            const se = seRaw ? parseInt(seRaw, 10) : null;
            const validSeason = (n) => Number.isInteger(n) && n >= smin && n <= smax;
            if (validSeason(ss) || validSeason(se)) {
                const minV = validSeason(ss) ? ss : smin;
                const maxV = validSeason(se) ? se : smax;
                state.filters.seasonMin = Math.min(minV, maxV);
                state.filters.seasonMax = Math.max(minV, maxV);
                document.getElementById('seasonMin').value = String(state.filters.seasonMin);
                document.getElementById('seasonMax').value = String(state.filters.seasonMax);
            } else if (state.filters.multi.length || params.get('player')) {
                // Default "Best of {latest year}" filter would hide most shared
                // URLs. Broaden to full dataset when filter/player params exist
                // but no explicit season range.
                state.filters.seasonMin = smin;
                state.filters.seasonMax = smax;
                document.getElementById('seasonMin').value = String(smin);
                document.getElementById('seasonMax').value = String(smax);
            }

            // Deep-link player
            const slug = params.get('player');
            if (slug) {
                const target = findPlayerBySlug(slug);
                if (target) {
                    // If a player slug is set but conflicts with the explicit
                    // position filter, prefer the player (drop the bucket).
                    if (state.filters.bucket && state.filters.bucket !== target.bucket) {
                        state.filters.bucket = '';
                        document.getElementById('bucket').value = '';
                    }
                    state.expanded.add(playerId(target));
                    return target;
                }
            }
            return null;
        }

        function applyBucketFilter(bucket) {
            state.filters.bucket = bucket;
            document.getElementById('bucket').value = bucket;
            applyFilters();
        }

        function applySeasonFilter(year) {
            state.filters.seasonMin = year;
            state.filters.seasonMax = year;
            document.getElementById('seasonMin').value = year;
            document.getElementById('seasonMax').value = year;
            applyFilters();
        }

        function applySortByCategory(key) {
            state.sort.key = key;
            state.sort.dir = 'desc';
            document.getElementById('sort').value = key;
            renderHeader();
            applyFilters();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyScoreSimilarity(scoreKey, scoreValue) {
            const v = Number(scoreValue);
            if (!isFinite(v)) return;
            state.filters.similarity = {
                key: 'score:' + scoreKey,
                center: v.toFixed(1),
                min: v - SCORE_SIMILARITY_TOL,
                max: v + SCORE_SIMILARITY_TOL,
                tol: SCORE_SIMILARITY_TOL,
            };
            applyFilters();
        }

        function applySimilarity(key, rawValue) {
            const tol = SIMILARITY_TOLERANCE[key];
            if (tol == null) return;
            const v = Number(rawValue);
            if (!isFinite(v)) return;
            const decimals = (key === 'wingspan_to_height' || key === 'reach_to_height') ? 3 :
                             (key === 'hand_area') ? 2 :
                             (key.includes('Sprint') || key.includes('Agility')) ? 2 :
                             (/Hand/.test(key) ||
                              key === 'Wingspan (in)' ||
                              key === 'Standing reach (in)' ||
                              key === 'Height without shoes (in)') ? 2 :
                             (key === 'Body Fat %') ? 1 : 1;
            state.filters.similarity = {
                key,
                center: v.toFixed(decimals),
                min: v - tol,
                max: v + tol,
            };
            // Don't auto-clear the season filter: user might want similar players
            // within the current season window. But the chip is the only signal
            // they need to clear it.
            applyFilters();
        }

        function jumpToPlayer(name, season) {
            // Expand the named player and (if needed) loosen filters so they show.
            const target = state.data.players.find(p => p.player === name && p.season === season);
            if (!target) return;
            // Make sure the season range covers it
            if (state.filters.seasonMin > season || state.filters.seasonMax < season) {
                state.filters.seasonMin = Math.min(state.filters.seasonMin, season);
                state.filters.seasonMax = Math.max(state.filters.seasonMax, season);
                document.getElementById('seasonMin').value = state.filters.seasonMin;
                document.getElementById('seasonMax').value = state.filters.seasonMax;
            }
            // Drop bucket filter if it would hide them
            if (state.filters.bucket && state.filters.bucket !== target.bucket) {
                state.filters.bucket = '';
                document.getElementById('bucket').value = '';
            }
            // Clear similarity filter (it would almost certainly hide them)
            state.filters.similarity = null;
            // Clear search to ensure visibility
            state.filters.search = '';
            document.getElementById('search').value = '';

            // Replace any other expansion: jumping to a comp shouldn't leave
            // the source player and the comp both expanded.
            state.expanded.clear();
            state.expanded.add(playerId(target));
            applyFilters();
            syncUrl({ player: slugify(target.player, target.season), pushExpand: true });

            // Scroll to the row
            requestAnimationFrame(() => {
                const row = document.querySelector(`tr[data-pid="${cssEscape(playerId(target))}"]`) ||
                            document.querySelector(`.player-card[data-pid="${cssEscape(playerId(target))}"]`);
                if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        }

        function cssEscape(s) {
            // Minimal escaping for our pid format (player|season)
            return s.replace(/["\\]/g, '\\$&');
        }

        function buildRow(p, rank, isExpandedRow) {
            const tr = document.createElement('tr');
            tr.dataset.pid = playerId(p);
            if (isExpandedRow) tr.classList.add('expanded');

            HEADERS.forEach(h => {
                const td = document.createElement('td');
                if (h.cls) td.className = h.cls;
                if (h.key === 'rank') {
                    td.textContent = rank;
                } else if (h.key === 'player') {
                    td.classList.add('player');
                    const name = document.createElement('span');
                    name.className = 'player-name clickable-name';
                    name.textContent = p.player;
                    name.title = 'Open player details';
                    name.addEventListener('click', e => {
                        e.stopPropagation();
                        toggleExpand(p);
                    });
                    const meta = document.createElement('div');
                    meta.className = 'player-meta';
                    const seasonPill = document.createElement('span');
                    seasonPill.className = 'season-pill';
                    seasonPill.textContent = p.season;
                    seasonPill.title = `Filter to ${p.season}`;
                    seasonPill.addEventListener('click', e => {
                        e.stopPropagation();
                        applySeasonFilter(p.season);
                    });
                    meta.appendChild(seasonPill);
                    meta.appendChild(document.createTextNode(` · ${p.position || '—'}`));
                    const badge = document.createElement('span');
                    badge.className = 'bucket-badge clickable';
                    badge.textContent = p.bucket;
                    badge.title = `Filter to ${p.bucket}`;
                    badge.addEventListener('click', e => {
                        e.stopPropagation();
                        applyBucketFilter(p.bucket);
                    });
                    meta.appendChild(badge);
                    td.appendChild(name);
                    td.appendChild(meta);
                } else if (h.type === 'score') {
                    td.classList.add('cell-score');
                    const v = p.scores[h.key];
                    applyHeat(td, v);
                    if (v == null) {
                        td.innerHTML = '<span class="nodata">—</span>';
                    } else {
                        const span = document.createElement('span');
                        span.className = 'val clickable';
                        span.textContent = v.toFixed(1);
                        span.title = `Find players within ±5 of this ${SCORE_LABELS[h.key]}`;
                        span.addEventListener('click', e => {
                            e.stopPropagation();
                            applyScoreSimilarity(h.key, v);
                        });
                        td.appendChild(span);
                    }
                } else if (h.type === 'metric') {
                    td.classList.add('cell-metric');
                    const m = p.metrics[h.key];
                    if (!m || m.raw == null) {
                        td.innerHTML = '<span class="nodata">—</span>';
                    } else {
                        applyHeat(td, m.pct);
                        const span = document.createElement('span');
                        span.className = 'val';
                        span.textContent = fmtMetric(p, h.key);
                        if (SIMILARITY_TOLERANCE[h.key] != null) {
                            span.classList.add('clickable');
                            span.title = `Find players with similar ${METRIC_LABELS[h.key] || h.key}`;
                            span.addEventListener('click', e => {
                                e.stopPropagation();
                                applySimilarity(h.key, m.raw);
                            });
                        }
                        td.appendChild(span);
                        if (m.pct != null) {
                            const pct = document.createElement('span');
                            pct.className = 'pct';
                            pct.textContent = `${m.pct.toFixed(0)}%ile`;
                            td.appendChild(pct);
                        }
                    }
                }
                tr.appendChild(td);
            });

            tr.addEventListener('click', () => toggleExpand(p));
            return tr;
        }

        function buildCard(p, isExpandedCard) {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.dataset.pid = playerId(p);

            const head = document.createElement('div');
            head.className = 'card-head';
            const name = document.createElement('div');
            const meta = document.createElement('div');
            meta.className = 'meta';
            const seasonPill = document.createElement('span');
            seasonPill.className = 'season-pill';
            seasonPill.textContent = p.season;
            seasonPill.addEventListener('click', e => { e.stopPropagation(); applySeasonFilter(p.season); });
            meta.appendChild(seasonPill);
            meta.appendChild(document.createTextNode(` · ${p.position || '—'} · `));
            const bbadge = document.createElement('span');
            bbadge.className = 'bucket-badge clickable';
            bbadge.textContent = p.bucket;
            bbadge.addEventListener('click', e => { e.stopPropagation(); applyBucketFilter(p.bucket); });
            meta.appendChild(bbadge);
            const nameDiv = document.createElement('div');
            nameDiv.className = 'name';
            nameDiv.textContent = p.player;
            name.appendChild(nameDiv);
            name.appendChild(meta);
            head.appendChild(name);
            card.appendChild(head);

            // Top 3 standout metrics by percentile
            const all = Object.entries(p.metrics)
                .filter(([_, m]) => m.pct != null)
                .sort((a, b) => b[1].pct - a[1].pct)
                .slice(0, 3);
            if (all.length) {
                const row = document.createElement('div');
                row.className = 'standout-row';
                all.forEach(([key, m]) => {
                    const pill = document.createElement('span');
                    pill.className = 'standout-pill';
                    pill.textContent = `${METRIC_LABELS[key] || key}: ${m.pct.toFixed(0)}%ile`;
                    row.appendChild(pill);
                });
                card.appendChild(row);
            }

            card.addEventListener('click', () => toggleExpand(p));

            if (isExpandedCard) {
                const detail = buildDetailContent(p);
                detail.style.marginTop = '0.875rem';
                card.appendChild(detail);
            }
            return card;
        }

        function buildDetailRow(p) {
            const tr = document.createElement('tr');
            tr.className = 'detail-row';
            const td = document.createElement('td');
            td.colSpan = HEADERS.length;
            td.appendChild(buildDetailContent(p));
            tr.appendChild(td);
            return tr;
        }

        function buildDetailContent(p) {
            const wrap = document.createElement('div');
            wrap.className = 'detail-panel';

            // Score summary — category tiles are clickable to sort by that category
            const summary = document.createElement('div');
            summary.className = 'detail-section full';
            summary.innerHTML = `<h3>Position-cohort scores · ${p.bucket}</h3>`;
            const sc = document.createElement('div');
            sc.className = 'scores-summary';
            const orderedScores = [
                ['overall','Combine Rating'], ['anthro','Anthro'],
                ['athletic','Athletic'], ['shooting','Shooting'],
            ];
            orderedScores.forEach(([k, label]) => {
                const v = p.scores[k];
                const tile = document.createElement('div');
                tile.className = `score-tile ${k === 'overall' ? 'overall' : ''} clickable`;
                applyHeat(tile, v);
                tile.title = `Sort leaderboard by ${label} (desc)`;
                tile.innerHTML = `<div class="label">${label}</div><div class="value">${v == null ? '—' : v.toFixed(1)}</div>`;
                tile.addEventListener('click', e => {
                    e.stopPropagation();
                    applySortByCategory(k);
                });
                sc.appendChild(tile);
            });
            summary.appendChild(sc);
            wrap.appendChild(summary);

            wrap.appendChild(buildMetricSection('Anthro', ANTHRO_KEYS, p));
            wrap.appendChild(buildMetricSection('Athletic', ATHLETIC_KEYS, p));

            // Ratios — only render if at least one ratio has data
            const hasRatio = RATIO_KEYS.some(k => p.metrics[k] && p.metrics[k].raw != null);
            if (hasRatio) {
                const ratios = buildMetricSection('Ratios', RATIO_KEYS, p);
                ratios.classList.add('full');
                wrap.appendChild(ratios);
            }

            // Shooting sub-tables
            const shotSection = buildShootingSection(p);
            if (shotSection) wrap.appendChild(shotSection);

            // Doppelgängers
            if (p.doppelgangers && p.doppelgangers.length) {
                const sect = document.createElement('div');
                sect.className = 'detail-section full';
                sect.innerHTML = '<h3>Closest historical comps</h3>';
                const grid = document.createElement('div');
                grid.className = 'dopp-grid';
                p.doppelgangers.forEach(c => {
                    const card = document.createElement('a');
                    card.className = 'dopp-card';
                    card.href = `?player=${slugify(c.player, c.season)}`;
                    card.title = `Open ${c.player} ${c.season}`;
                    card.innerHTML =
                        `<div class="name">${c.player}</div>` +
                        `<div class="meta">${c.season} · ${c.position || '—'}</div>` +
                        `<span class="bucket-badge">${c.bucket}</span>` +
                        `<div class="dist">d=${c.distance.toFixed(2)} · ${c.shared_metrics}/13 shared</div>`;
                    card.addEventListener('click', e => {
                        // Honor cmd/ctrl-click and middle-click as "open in new tab".
                        if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
                        e.preventDefault();
                        e.stopPropagation();
                        jumpToPlayer(c.player, c.season);
                    });
                    grid.appendChild(card);
                });
                sect.appendChild(grid);
                wrap.appendChild(sect);
            }

            return wrap;
        }

        function buildMetricSection(title, keys, p) {
            const sect = document.createElement('div');
            sect.className = 'detail-section';
            sect.innerHTML = `<h3>${title}</h3>`;
            const grid = document.createElement('div');
            grid.className = 'metric-grid';
            keys.forEach(key => {
                if (!(key in p.metrics)) return;
                const m = p.metrics[key];
                const cell = document.createElement('div');
                cell.className = 'metric-cell';
                if (m) applyHeat(cell, m.pct);

                const nameSpan = document.createElement('span');
                nameSpan.className = 'name';
                nameSpan.textContent = METRIC_LABELS[key] || key;

                const valWrap = document.createElement('span');
                const v = document.createElement('span');
                v.className = 'v';
                v.textContent = m && m.raw != null ? fmtMetric(p, key) : '—';
                if (m && m.raw != null && SIMILARITY_TOLERANCE[key] != null) {
                    v.classList.add('clickable');
                    v.title = `Find players with similar ${METRIC_LABELS[key] || key}`;
                    v.addEventListener('click', e => {
                        e.stopPropagation();
                        applySimilarity(key, m.raw);
                    });
                }
                const pct = document.createElement('span');
                pct.className = 'pct';
                pct.textContent = m && m.pct != null ? `${m.pct.toFixed(0)}%ile` : '';

                valWrap.appendChild(v);
                valWrap.appendChild(pct);
                cell.appendChild(nameSpan);
                cell.appendChild(valWrap);
                grid.appendChild(cell);
            });
            sect.appendChild(grid);
            return sect;
        }

        function buildShootingSection(p) {
            // For each layout family, render a sub-table only if the player has at
            // least one drill recorded in that family.
            const blocks = [];
            SHOT_LAYOUTS.forEach(layout => {
                if (layout.twoCells) {
                    const cells = layout.twoCells.map(c => {
                        const drillName = `${layout.family} ${c.match}`;
                        return { label: c.label, drill: p.drills[drillName] };
                    });
                    if (cells.every(c => !c.drill)) return;
                    const block = document.createElement('div');
                    block.className = 'shot-block';
                    block.innerHTML = `<h4>${layout.title}</h4>`;
                    const grid = document.createElement('div');
                    grid.className = 'shot-table cols-2';
                    cells.forEach(c => {
                        const wrap = document.createElement('div');
                        wrap.className = 'shot-twocell-cell';
                        const lbl = document.createElement('div');
                        lbl.className = 'shot-twocell-label';
                        lbl.textContent = c.label;
                        wrap.appendChild(lbl);
                        wrap.appendChild(buildShotCell(c.drill));
                        grid.appendChild(wrap);
                    });
                    block.appendChild(grid);
                    blocks.push(block);
                    return;
                }

                // Determine which ranges actually have data for this player
                const liveRanges = layout.ranges.filter(r =>
                    layout.spots.some(s => p.drills[`${layout.family} ${r.match} ${s.match}`])
                );
                if (!liveRanges.length) return;

                const block = document.createElement('div');
                block.className = 'shot-block';
                block.innerHTML = `<h4>${layout.title}</h4>`;
                const colsCls = `cols-${layout.spots.length}`;

                const colHead = document.createElement('div');
                colHead.className = `shot-col-headers ${colsCls}`;
                const blank = document.createElement('span');
                colHead.appendChild(blank);
                layout.spots.forEach(s => {
                    const span = document.createElement('span');
                    span.textContent = s.label;
                    colHead.appendChild(span);
                });
                block.appendChild(colHead);

                const grid = document.createElement('div');
                grid.className = `shot-table ${colsCls}`;
                liveRanges.forEach(r => {
                    const lbl = document.createElement('div');
                    lbl.className = 'shot-row-label';
                    lbl.textContent = r.label;
                    grid.appendChild(lbl);
                    layout.spots.forEach(s => {
                        const drill = p.drills[`${layout.family} ${r.match} ${s.match}`];
                        grid.appendChild(buildShotCell(drill));
                    });
                });
                block.appendChild(grid);
                blocks.push(block);
            });

            if (!blocks.length) {
                if (p.shooting && p.shooting.attempts) {
                    const sect = document.createElement('div');
                    sect.className = 'detail-section full';
                    sect.innerHTML = `<h3>Shooting</h3>` +
                        `<div style="font-size:0.875rem;color:var(--text-secondary)">` +
                            `${p.shooting.made}/${p.shooting.attempts}` +
                            `${p.shooting.pct != null ? ' (' + p.shooting.pct.toFixed(1) + '%)' : ''}` +
                        `</div>`;
                    return sect;
                }
                return null;
            }

            const sect = document.createElement('div');
            sect.className = 'detail-section full';
            sect.innerHTML = '<h3>Shooting drills</h3>';
            blocks.forEach(b => sect.appendChild(b));
            return sect;
        }

        function buildShotCell(drill) {
            const cell = document.createElement('div');
            if (!drill) {
                cell.className = 'shot-cell empty';
                cell.innerHTML = `<div class="pct">—</div>`;
                return cell;
            }
            cell.className = 'shot-cell';
            applyHeat(cell, drill.rank_pct);
            const pctTxt = drill.pct == null ? '—' : `${drill.pct.toFixed(0)}%`;
            cell.innerHTML =
                `<div class="pct">${pctTxt}</div>` +
                `<div class="ratio">${drill.made}/${drill.att}</div>` +
                (drill.rank_pct != null
                    ? `<div class="pctile">${drill.rank_pct.toFixed(0)}%ile</div>`
                    : '');
            return cell;
        }

        function toggleExpand(p) {
            const id = playerId(p);
            const wasExpanded = state.expanded.has(id);
            if (wasExpanded) state.expanded.delete(id);
            else state.expanded.add(id);
            render();
            // Push to history when opening a player (so it lives in back-button
            // history and is shareable); replace silently when closing.
            syncUrl({ pushExpand: !wasExpanded });
        }

        // ---- Loading / error UI -------------------------------------------
        const CONTROL_IDS = ['search','bucket','seasonMin','seasonMax','sort',
                             'resetAll','advToggle','advAdd','advClear'];
        function setControlsDisabled(disabled) {
            CONTROL_IDS.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = disabled;
            });
        }
        function setStatus(status) {
            document.getElementById('content').dataset.status = status;
        }
        function showLoadingPlaceholder() {
            const el = document.getElementById('emptyState');
            el.innerHTML =
                '<div class="empty-loading">' +
                  '<div class="spinner"></div>' +
                  '<div class="empty-msg">Loading combine data…</div>' +
                '</div>';
            el.style.display = '';
        }
        function showErrorPlaceholder(message) {
            const el = document.getElementById('emptyState');
            el.innerHTML = '';
            const msg = document.createElement('div');
            msg.className = 'empty-msg empty-error';
            msg.textContent = 'Could not load combine data.';
            const detail = document.createElement('div');
            detail.className = 'empty-error-detail';
            detail.textContent = message;
            const actions = document.createElement('div');
            actions.className = 'empty-actions';
            const retry = document.createElement('button');
            retry.type = 'button';
            retry.className = 'empty-action';
            retry.textContent = 'Retry';
            retry.addEventListener('click', loadData);
            actions.appendChild(retry);
            el.appendChild(msg);
            el.appendChild(detail);
            el.appendChild(actions);
            el.style.display = '';
        }

        function loadData() {
            setStatus('loading');
            setControlsDisabled(true);
            showLoadingPlaceholder();
            fetch('data/combine.json', { cache: 'no-cache' })
                .then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(data => {
                    setStatus('ready');
                    setControlsDisabled(false);
                    init(data);
                })
                .catch(err => {
                    setStatus('error');
                    // Keep controls disabled while broken so the user can't
                    // poke filters that have no data behind them.
                    setControlsDisabled(true);
                    showErrorPlaceholder(err && err.message ? err.message : String(err));
                });
        }

        loadData();
    </script>
</body>
</html>
